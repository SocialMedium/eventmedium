<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Network · EventMedium</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Instrument+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<style>
:root {
  --cream:    #f8f6f1;
  --paper:    #fdfcf9;
  --paper2:   #f4f1ea;
  --ink:      #1a1714;
  --ink-2:    #3d3830;
  --ink-3:    #7a6f62;
  --ink-4:    #b5a99a;
  --bdr:      #e2ddd5;
  --accent:   #c8602a;
  --accent-2: #1d4e6b;
  --accent-3: #4a7c59;
  --sb-w:     280px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;background:var(--cream);color:var(--ink);font-family:'Instrument Sans',system-ui,sans-serif}

/* ── Top bar ── */
#topbar{
  position:fixed;top:0;left:0;right:0;height:52px;
  background:var(--paper);border-bottom:1px solid var(--bdr);
  display:flex;align-items:center;gap:0;z-index:50;
}
#topbar-brand{
  width:var(--sb-w);min-width:var(--sb-w);
  padding:0 20px;
  font-family:'Libre Baskerville',Georgia,serif;font-style:italic;
  font-size:17px;color:var(--ink);letter-spacing:-.3px;
  border-right:1px solid var(--bdr);
  display:flex;align-items:center;gap:8px;
}
#topbar-brand a{color:var(--ink);text-decoration:none}
#topbar-brand a:hover{color:var(--accent)}
#city-pills{
  flex:1;display:flex;align-items:center;gap:6px;padding:0 16px;
  overflow-x:auto;scrollbar-width:none;
}
#city-pills::-webkit-scrollbar{display:none}
.city-pill{
  flex-shrink:0;padding:4px 12px;border-radius:100px;
  font-size:12px;font-weight:500;cursor:pointer;
  border:1px solid var(--bdr);background:transparent;color:var(--ink-2);
  transition:all .15s;white-space:nowrap;
}
.city-pill:hover{background:var(--paper2);border-color:var(--ink-4)}
.city-pill.active{background:var(--ink);color:var(--paper);border-color:var(--ink)}
#topbar-actions{padding:0 16px;display:flex;align-items:center;gap:8px}
.tb-btn{
  padding:6px 14px;border-radius:8px;font-size:12px;font-weight:500;
  border:1px solid var(--bdr);background:transparent;color:var(--ink-2);
  cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:5px;
  transition:all .15s;
}
.tb-btn:hover{background:var(--paper2)}
.tb-btn svg{width:13px;height:13px}

/* ── Layout ── */
#shell{display:flex;position:fixed;top:52px;left:0;right:0;bottom:0}

/* ── Sidebar ── */
#sidebar{
  width:var(--sb-w);min-width:var(--sb-w);
  background:var(--paper);border-right:1px solid var(--bdr);
  overflow-y:auto;scrollbar-width:thin;
  display:flex;flex-direction:column;
}
#sidebar::-webkit-scrollbar{width:4px}
#sidebar::-webkit-scrollbar-thumb{background:var(--bdr);border-radius:2px}

.sb-section{padding:16px 20px;border-bottom:1px solid var(--bdr)}
.sb-label{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-3);margin-bottom:10px}

/* View mode */
.view-btns{display:flex;gap:4px}
.view-btn{
  flex:1;padding:7px 4px;border-radius:8px;font-size:11px;font-weight:500;
  border:1px solid var(--bdr);background:transparent;color:var(--ink-2);
  cursor:pointer;text-align:center;transition:all .15s;
}
.view-btn:hover{background:var(--paper2)}
.view-btn.active{background:var(--ink);color:var(--paper);border-color:var(--ink)}

/* Stats grid */
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.stat-box{
  background:var(--paper2);border-radius:10px;padding:10px;
  display:flex;flex-direction:column;gap:2px;
}
.stat-val{font-size:22px;font-weight:600;color:var(--ink);line-height:1}
.stat-lbl{font-size:10px;color:var(--ink-3);font-weight:500}

/* Filter chips */
.filter-list{display:flex;flex-direction:column;gap:4px}
.filter-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:6px 8px;border-radius:8px;cursor:pointer;
  border:1px solid transparent;transition:all .15s;
}
.filter-row:hover{background:var(--paper2)}
.filter-row.active{background:var(--paper2);border-color:var(--bdr)}
.filter-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.filter-name{font-size:12px;font-weight:500;color:var(--ink-2);margin-left:8px;flex:1}
.filter-count{font-size:11px;color:var(--ink-3);font-family:'DM Mono',monospace}
.filter-check{width:14px;height:14px;border-radius:3px;border:1.5px solid var(--bdr);flex-shrink:0;display:flex;align-items:center;justify-content:center}
.filter-row.active .filter-check{background:var(--ink);border-color:var(--ink)}
.filter-row.active .filter-check::after{content:'';width:6px;height:4px;border-left:1.5px solid #fff;border-bottom:1.5px solid #fff;transform:rotate(-45deg) translateY(-1px)}

/* Theme filter */
.theme-chips{display:flex;flex-wrap:wrap;gap:5px}
.theme-chip{
  padding:3px 9px;border-radius:100px;font-size:11px;font-weight:500;
  border:1px solid var(--bdr);background:transparent;color:var(--ink-2);
  cursor:pointer;transition:all .15s;
}
.theme-chip:hover{background:var(--paper2)}
.theme-chip.active{background:var(--accent);color:#fff;border-color:var(--accent)}

/* ── Canvas ── */
#canvas-wrap{flex:1;position:relative;overflow:hidden;background:var(--cream)}
#canvas-wrap svg{width:100%;height:100%;cursor:grab}
#canvas-wrap svg.panning{cursor:grabbing}

/* SVG elements */
.halo-city{fill-opacity:.06;stroke:none}
.arc-corridor{fill:none;stroke-opacity:.45;stroke-linecap:round}
.arc-corridor.animated{stroke-dasharray:4 4;animation:flowArc 1.6s linear infinite}
@keyframes flowArc{to{stroke-dashoffset:-16}}
.node-city{cursor:pointer}
.node-city circle.bg{stroke-width:1.5;fill:var(--paper)}
.node-city .label-city{
  font-family:'Libre Baskerville',Georgia,serif;font-style:italic;
  pointer-events:none;text-anchor:middle;dominant-baseline:hanging;
  fill:var(--ink-2);
}
.node-city .label-count{
  font-family:'DM Mono',monospace;font-size:9px;
  pointer-events:none;text-anchor:middle;dominant-baseline:auto;
  fill:var(--ink-3);
}
.node-member{cursor:pointer;transition:opacity .2s}
.node-member circle{stroke-width:1;fill-opacity:.9}
.node-event{cursor:pointer}
.node-event rect{stroke-width:1.5;rx:4}
.node-theme{cursor:pointer}
.theme-bubble circle{stroke-width:1.5}
.theme-bubble text{font-family:'Instrument Sans',system-ui,sans-serif;font-size:10px;font-weight:600;text-anchor:middle;dominant-baseline:middle;pointer-events:none}

/* ── Zoom controls ── */
#zoom-ctrls{
  position:absolute;bottom:80px;right:20px;
  display:flex;flex-direction:column;gap:4px;z-index:20;
}
.zoom-btn{
  width:34px;height:34px;border-radius:8px;
  background:var(--paper);border:1px solid var(--bdr);
  font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;
  color:var(--ink-2);box-shadow:0 1px 4px rgba(0,0,0,.07);transition:background .15s;
}
.zoom-btn:hover{background:var(--paper2)}

/* ── Legend ── */
#legend{
  position:absolute;bottom:20px;left:20px;
  background:var(--paper);border:1px solid var(--bdr);border-radius:12px;
  padding:12px 14px;z-index:20;min-width:160px;
}
.legend-title{font-size:10px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--ink-3);margin-bottom:8px}
.legend-row{display:flex;align-items:center;gap:8px;margin-bottom:5px;font-size:11px;color:var(--ink-2)}
.legend-swatch{width:12px;height:12px;border-radius:50%;flex-shrink:0}
.legend-line{width:20px;height:2px;flex-shrink:0;border-radius:1px}

/* ── Detail panel ── */
#detail-panel{
  position:absolute;bottom:0;left:0;right:0;
  background:var(--paper);border-top:1px solid var(--bdr);
  border-radius:16px 16px 0 0;
  padding:20px 24px 28px;
  transform:translateY(100%);
  transition:transform .4s cubic-bezier(.22,1,.36,1);
  z-index:40;max-height:55%;overflow-y:auto;
}
#detail-panel.open{transform:translateY(0)}
#detail-close{
  position:absolute;top:14px;right:16px;
  width:28px;height:28px;border-radius:50%;border:1px solid var(--bdr);
  background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;
  color:var(--ink-3);font-size:16px;line-height:1;transition:background .15s;
}
#detail-close:hover{background:var(--paper2)}
.dp-tag{font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-3);margin-bottom:4px}
.dp-title{font-family:'Libre Baskerville',Georgia,serif;font-size:20px;color:var(--ink);margin-bottom:12px}
.dp-meta-grid{display:flex;gap:20px;margin-bottom:14px;flex-wrap:wrap}
.dp-meta{display:flex;flex-direction:column;gap:2px}
.dp-meta-val{font-size:18px;font-weight:600;color:var(--ink)}
.dp-meta-lbl{font-size:10px;color:var(--ink-3);font-weight:500}
.dp-section{margin-top:14px}
.dp-section-lbl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--ink-3);margin-bottom:7px}
.dp-chips{display:flex;flex-wrap:wrap;gap:5px}
.dp-chip{
  padding:3px 9px;border-radius:100px;font-size:11px;font-weight:500;
  border:1px solid var(--bdr);color:var(--ink-2);background:var(--paper2);
}
.dp-archetypes{display:flex;gap:8px;flex-wrap:wrap}
.dp-archetype{
  display:flex;align-items:center;gap:6px;padding:5px 10px;
  background:var(--paper2);border-radius:8px;border:1px solid var(--bdr);
}
.dp-arch-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.dp-arch-name{font-size:11px;font-weight:500;color:var(--ink-2)}
.dp-arch-cnt{font-size:11px;color:var(--ink-3);font-family:'DM Mono',monospace}
.dp-corridor-list{display:flex;flex-direction:column;gap:5px}
.dp-corridor{display:flex;align-items:center;gap:10px;font-size:12px;color:var(--ink-2)}
.dp-corr-bar{height:4px;border-radius:2px;background:var(--accent-2);opacity:.5}

/* ── Tooltip ── */
#tooltip{
  position:fixed;background:var(--ink);color:var(--paper);
  border-radius:8px;padding:7px 11px;font-size:12px;line-height:1.4;
  pointer-events:none;z-index:100;opacity:0;transition:opacity .15s;
  max-width:180px;
}
#tooltip.show{opacity:1}

/* ── Loading ── */
#loading{
  position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  background:var(--cream);z-index:30;flex-direction:column;gap:16px;
}
.loading-word{
  font-family:'Libre Baskerville',Georgia,serif;font-style:italic;
  font-size:24px;color:var(--ink);animation:pulse 1.6s ease-in-out infinite;
}
@keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}
.loading-sub{font-size:12px;color:var(--ink-3)}

/* ── Empty state ── */
.empty-canvas{
  position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  flex-direction:column;gap:10px;pointer-events:none;
}
.empty-canvas p{font-size:14px;color:var(--ink-3);text-align:center}

/* ── Responsive ── */
@media(max-width:768px){
  :root{--sb-w:0px}
  #sidebar{display:none}
  #topbar-brand{width:auto;min-width:unset}
}
</style>
</head>
<body>

<!-- Top bar -->
<div id="topbar">
  <div id="topbar-brand">
    <a href="/">EventMedium</a>
    <span style="color:var(--ink-4);font-style:normal;font-size:13px">/</span>
    <span>Network</span>
  </div>
  <div id="city-pills">
    <button class="city-pill active" data-city="__global__">Global</button>
  </div>
  <div id="topbar-actions">

      Profile
    </a>
    <a href="/network-graph.html" class="tb-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
      Graph View

  </div>
</div>

<!-- Main shell -->
<div id="shell">

  <!-- Sidebar -->
  <aside id="sidebar">

    <div class="sb-section">
      <div class="sb-label">View</div>
      <div class="view-btns">
        <button class="view-btn active" data-view="location">By Location</button>
        <button class="view-btn" data-view="theme">By Theme</button>
        <button class="view-btn" data-view="force">Force</button>
      </div>
    </div>

    <div class="sb-section">
      <div class="sb-label">Overview</div>
      <div class="stats-grid" id="stats-grid">
        <div class="stat-box"><div class="stat-val" id="stat-members">—</div><div class="stat-lbl">Members</div></div>
        <div class="stat-box"><div class="stat-val" id="stat-cities">—</div><div class="stat-lbl">Cities</div></div>
        <div class="stat-box"><div class="stat-val" id="stat-events">—</div><div class="stat-lbl">Events</div></div>
        <div class="stat-box"><div class="stat-val" id="stat-corridors">—</div><div class="stat-lbl">Corridors</div></div>
      </div>
    </div>

    <div class="sb-section">
      <div class="sb-label">Stakeholder Type</div>
      <div class="filter-list" id="arch-filters"></div>
    </div>

    <div class="sb-section">
      <div class="sb-label">Theme</div>
      <div class="theme-chips" id="theme-chips"></div>
    </div>

  </aside>

  <!-- Canvas -->
  <div id="canvas-wrap">
    <div id="loading">
      <div class="loading-word">EventMedium</div>
      <div class="loading-sub">Mapping the network…</div>
    </div>
    <svg id="main-svg">
      <defs>
        <filter id="halo-blur"><feGaussianBlur stdDeviation="18"/></filter>
        <filter id="soft-blur"><feGaussianBlur stdDeviation="6"/></filter>
        <marker id="arrow" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
          <path d="M0,0 L0,6 L6,3 Z" fill="var(--accent-2)" opacity=".5"/>
        </marker>
      </defs>
      <g id="zoom-g">
        <g id="halos-g"></g>
        <g id="corridors-g"></g>
        <g id="cities-g"></g>
        <g id="members-g"></g>
        <g id="force-g"></g>
        <g id="themes-g"></g>
      </g>
    </svg>

    <!-- Zoom controls -->
    <div id="zoom-ctrls">
      <button class="zoom-btn" id="zoom-in">+</button>
      <button class="zoom-btn" id="zoom-fit">⊡</button>
      <button class="zoom-btn" id="zoom-out">−</button>
    </div>

    <!-- Legend -->
    <div id="legend">
      <div class="legend-title">Legend</div>
      <div class="legend-row"><div class="legend-swatch" style="background:var(--accent)"></div>Investor / VC</div>
      <div class="legend-row"><div class="legend-swatch" style="background:var(--accent-2)"></div>Startup / Founder</div>
      <div class="legend-row"><div class="legend-swatch" style="background:var(--accent-3)"></div>Operator / Exec</div>
      <div class="legend-row"><div class="legend-swatch" style="background:#8b5cf6"></div>Academic / Research</div>
      <div class="legend-row"><div class="legend-swatch" style="background:var(--ink-3)"></div>Other</div>
      <div style="margin-top:8px;border-top:1px solid var(--bdr);padding-top:8px">
        <div class="legend-row"><div class="legend-line" style="background:var(--accent-2);opacity:.5"></div>Match corridor</div>
        <div class="legend-row"><div class="legend-line" style="background:var(--bdr)"></div>Weak corridor</div>
      </div>
    </div>

    <!-- Detail panel -->
    <div id="detail-panel">
      <button id="detail-close" onclick="closeDetail()">×</button>
      <div id="detail-content"></div>
    </div>
  </div>
</div>

<!-- Tooltip -->
<div id="tooltip"></div>

function cityPos(name) {
  if (!name) return null;
  var trimmed = name.trim();
  if (CITY_POS[trimmed]) return CITY_POS[trimmed];

  for (var k in CITY_POS) {
    if (k.toLowerCase().startsWith(trimmed.toLowerCase().split(' ')[0].toLowerCase())) return CITY_POS[k];
  }
  return null;
}

var tip = document.getElementById('tooltip');
function showTip(html, evt) {
  tip.innerHTML = html;
  tip.classList.add('show');
  moveTip(evt);
}
function moveTip(evt) {
  var x = evt.clientX + 14, y = evt.clientY - 10;
  var tw = tip.offsetWidth, th = tip.offsetHeight;
  if (x + tw > window.innerWidth - 10) x = evt.clientX - tw - 10;
  if (y + th > window.innerHeight - 10) y = evt.clientY - th - 10;
  tip.style.left = x + 'px'; tip.style.top = y + 'px';
}
function hideTip() { tip.classList.remove('show'); }

// ── Boot ─────────────────────────────────────────────────────────────────────
async function init() {
  G.svgEl  = d3.select('#main-svg');
  G.zoomG  = d3.select('#zoom-g');
  var wrap = document.getElementById('canvas-wrap');
  G.width  = wrap.clientWidth;
  G.height = wrap.clientHeight;

  // Zoom behaviour
  G.zoom = d3.zoom()
    .scaleExtent([0.15, 6])
    .on('zoom', function(event) { G.zoomG.attr('transform', event.transform); });
  G.svgEl
    .call(G.zoom)
    .on('mousedown.svg', function() { G.svgEl.classed('panning', true); })
    .on('mouseup.svg',   function() { G.svgEl.classed('panning', false); })
    .on('dblclick.zoom', null);

  // Zoom buttons
  document.getElementById('zoom-in').onclick  = function(){ G.svgEl.transition().duration(300).call(G.zoom.scaleBy, 1.5); };
  document.getElementById('zoom-out').onclick = function(){ G.svgEl.transition().duration(300).call(G.zoom.scaleBy, 0.67); };
  document.getElementById('zoom-fit').onclick = zoomFit;

  // View buttons
  document.querySelectorAll('.view-btn').forEach(function(btn) {
    btn.onclick = function() {
      document.querySelectorAll('.view-btn').forEach(function(b){ b.classList.remove('active'); });
      btn.classList.add('active');
      G.view = btn.dataset.view;
      render();
    };
  });

  // Fetch data
  var data = null;
  try {
    var r = await fetch('/api/network/graph');
    if (r.ok) data = await r.json();
  } catch(e) {}
  if (!data || !data.members || data.members.length < 3) {
    // Build geo_clusters from fallback
    data = buildClusters(FALLBACK);
  } else {
    data = buildClusters(data);
  }
  G.data = data;

  document.getElementById('loading').style.display = 'none';
  populateSidebar();
  populateCityPills();
  render();
}

function buildClusters(data) {
  if (!data.geo_clusters || !data.geo_clusters.length) {
    var cityMap = {};
    (data.members || []).forEach(function(m) {
      var city = m.geography;
      if (!city) return;
      if (!cityMap[city]) cityMap[city] = { city: city, member_count: 0, event_count: 0, theme_freq: {}, arc_freq: {}, total_matches: 0 };
      cityMap[city].member_count++;
      cityMap[city].total_matches += (m.match_count || 0);
      if (m.stakeholder_type) cityMap[city].arc_freq[m.stakeholder_type] = (cityMap[city].arc_freq[m.stakeholder_type] || 0) + 1;
      (m.themes || []).forEach(function(t) { cityMap[city].theme_freq[t] = (cityMap[city].theme_freq[t] || 0) + 1; });
    });
    (data.events || []).forEach(function(e) {
      var city = e.city;
      if (!city) return;
      if (!cityMap[city]) cityMap[city] = { city: city, member_count: 0, event_count: 0, theme_freq: {}, arc_freq: {}, total_matches: 0 };
      cityMap[city].event_count++;
    });
    data.geo_clusters = Object.values(cityMap).map(function(c) {
      return {
        city:         c.city,
        member_count: c.member_count,
        event_count:  c.event_count,
        top_themes:   Object.keys(c.theme_freq).sort(function(a,b){ return c.theme_freq[b]-c.theme_freq[a]; }).slice(0,5).map(function(t){ return {theme:t,count:c.theme_freq[t]}; }),
        archetype_breakdown: Object.keys(c.arc_freq).sort(function(a,b){ return c.arc_freq[b]-c.arc_freq[a]; }).map(function(t){ return {type:t,count:c.arc_freq[t]}; }),
        total_matches: c.total_matches
      };
    }).filter(function(c){ return c.member_count > 0 || c.event_count > 0; }).sort(function(a,b){ return b.member_count - a.member_count; });
  }
  return data;
}

// ── Sidebar ──────────────────────────────────────────────────────────────────
function populateSidebar() {
  var d = G.data;
  document.getElementById('stat-members').textContent   = d.members.length;
  document.getElementById('stat-cities').textContent    = d.geo_clusters.length;
  document.getElementById('stat-events').textContent    = d.events.length;
  document.getElementById('stat-corridors').textContent = d.corridors.length;

  // Archetype filters
  var arcCounts = {};
  d.members.forEach(function(m) {
    var t = m.stakeholder_type || 'other';
    arcCounts[t] = (arcCounts[t] || 0) + 1;
  });
  var arcList = document.getElementById('arch-filters');
  arcList.innerHTML = '';
  Object.keys(arcCounts).sort(function(a,b){ return arcCounts[b]-arcCounts[a]; }).forEach(function(type) {
    var row = document.createElement('div');
    row.className = 'filter-row';
    row.innerHTML =
      '<div class="filter-dot" style="background:' + archColour(type) + '"></div>' +
      '<span class="filter-name">' + capitalize(type) + '</span>' +
      '<span class="filter-count">' + arcCounts[type] + '</span>' +
      '<div class="filter-check"></div>';
    row.onclick = function() {
      if (G.archFilter.has(type)) { G.archFilter.delete(type); row.classList.remove('active'); }
      else { G.archFilter.add(type); row.classList.add('active'); }
      render();
    };
    arcList.appendChild(row);
  });

  // Theme chips
  var themeCounts = {};
  d.members.forEach(function(m) {
    (m.themes || []).forEach(function(t) { themeCounts[t] = (themeCounts[t] || 0) + 1; });
  });
  var themeWrap = document.getElementById('theme-chips');
  themeWrap.innerHTML = '';
  Object.keys(themeCounts).sort(function(a,b){ return themeCounts[b]-themeCounts[a]; }).slice(0,20).forEach(function(t) {
    var chip = document.createElement('button');
    chip.className = 'theme-chip';
    chip.textContent = t;
    chip.onclick = function() {
      if (G.themeFilter.has(t)) { G.themeFilter.delete(t); chip.classList.remove('active'); }
      else { G.themeFilter.add(t); chip.classList.add('active'); }
      render();
    };
    themeWrap.appendChild(chip);
  });
}

function populateCityPills() {
  var pills = document.getElementById('city-pills');
  // Remove old city pills (keep only global)
  Array.from(pills.querySelectorAll('[data-city]:not([data-city="__global__"])')).forEach(function(p){ p.remove(); });
  var topCities = G.data.geo_clusters.slice(0, 12);
  topCities.forEach(function(cluster) {
    var btn = document.createElement('button');
    btn.className = 'city-pill';
    btn.dataset.city = cluster.city;
    btn.textContent = cluster.city;
    btn.onclick = function() { selectCity(cluster.city); };
    pills.appendChild(btn);
  });
  document.querySelector('[data-city="__global__"]').onclick = function() { selectCity('__global__'); };
}

function selectCity(city) {
  G.city = city;
  document.querySelectorAll('.city-pill').forEach(function(p){ p.classList.toggle('active', p.dataset.city === city); });
  render();
}

// ── Filtered data ─────────────────────────────────────────────────────────────
function filteredMembers() {
  var m = G.data.members;
  if (G.archFilter.size) m = m.filter(function(x){ return G.archFilter.has(x.stakeholder_type || 'other'); });
  if (G.themeFilter.size) m = m.filter(function(x){ return (x.themes||[]).some(function(t){ return G.themeFilter.has(t); }); });
  if (G.city !== '__global__') m = m.filter(function(x){ return x.geography === G.city; });
  return m;
}

// ── Main render ───────────────────────────────────────────────────────────────
function render() {
  // Clear all layers
  d3.select('#halos-g').selectAll('*').remove();
  d3.select('#corridors-g').selectAll('*').remove();
  d3.select('#cities-g').selectAll('*').remove();
  d3.select('#members-g').selectAll('*').remove();
  d3.select('#themes-g').selectAll('*').remove();
  d3.select('#force-g').selectAll('*').remove();
  if (G.simulation) { G.simulation.stop(); G.simulation = null; }
  closeDetail();

  if (G.view === 'location') renderLocation();
  else if (G.view === 'theme') renderTheme();
  else if (G.view === 'force') renderForce();

  setTimeout(zoomFit, 60);
}

// ── Location view ─────────────────────────────────────────────────────────────
function renderLocation() {
  var wrap    = document.getElementById('canvas-wrap');
  var W       = wrap.clientWidth - 280;  // account for sidebar
  var H       = wrap.clientHeight;
  var members = filteredMembers();
  var clusters= G.data.geo_clusters.filter(function(c){
    return G.city === '__global__' || c.city === G.city;
  });
  var corridors = G.data.corridors;
  var events    = G.data.events;

  // Map city → pixel position
  function cityXY(name) {
    var pos = cityPos(name);
    if (!pos) return null;
    return [pos[0] * W, pos[1] * H];
  }

  // Scale city radius by member count
  var maxM = d3.max(clusters, function(c){ return c.member_count; }) || 1;
  var rScale = d3.scaleSqrt().domain([0, maxM]).range([20, 80]);

  if (G.city === '__global__') {
    // ── Draw corridors ──
    var corrG = d3.select('#corridors-g');
    var maxCorr = d3.max(corridors, function(c){ return c.match_count; }) || 1;
    corridors.forEach(function(corr) {
      var a = cityXY(corr.from), b = cityXY(corr.to);
      if (!a || !b) return;
      var mx = (a[0]+b[0])/2, my = (a[1]+b[1])/2 - Math.hypot(b[0]-a[0],b[1]-a[1])*0.25;
      var strokeW = 1 + (corr.match_count / maxCorr) * 3;
      var isStrong = corr.avg_score >= 0.65;
      corrG.append('path')
        .attr('class', 'arc-corridor' + (isStrong ? ' animated' : ''))
        .attr('d', 'M' + a[0] + ',' + a[1] + ' Q' + mx + ',' + my + ' ' + b[0] + ',' + b[1])
        .attr('stroke', isStrong ? '#1d4e6b' : '#b5a99a')
        .attr('stroke-width', strokeW)
        .on('mouseover', function(evt){ showTip('<b>' + corr.from + ' → ' + corr.to + '</b><br>' + corr.match_count + ' matches · score ' + corr.avg_score, evt); })
        .on('mousemove', moveTip)
        .on('mouseout', hideTip);
    });

    // ── Draw city halos ──
    var haloG = d3.select('#halos-g');
    clusters.forEach(function(c) {
      var xy = cityXY(c.city);
      if (!xy) return;
      var r = rScale(c.member_count);
      haloG.append('circle')
        .attr('class', 'halo-city')
        .attr('cx', xy[0]).attr('cy', xy[1])
        .attr('r', r + 40)
        .attr('fill', '#c8602a')
        .attr('filter', 'url(#halo-blur)');
    });

    // ── Draw city nodes ──
    var citiesG = d3.select('#cities-g');
    clusters.forEach(function(c) {
      var xy = cityXY(c.city);
      if (!xy) return;
      var r = rScale(c.member_count);
      var g = citiesG.append('g')
        .attr('class', 'node-city')
        .attr('transform', 'translate(' + xy[0] + ',' + xy[1] + ')')
        .on('mouseover', function(evt){
          showTip('<b>' + c.city + '</b><br>' + c.member_count + ' members · ' + c.event_count + ' events', evt);
        })
        .on('mousemove', moveTip)
        .on('mouseout', hideTip)
        .on('click', function() { selectCity(c.city); showCityDetail(c); });

      // Halo ring
      g.append('circle')
        .attr('r', r)
        .attr('fill', '#f8f6f1')
        .attr('stroke', '#e2ddd5')
        .attr('stroke-width', 1);

      // Archetype donut segments
      var total = c.archetype_breakdown.reduce(function(s, a){ return s + a.count; }, 0) || 1;
      var innerR = r * 0.68, outerR = r + 8;
      var arcGen = d3.arc().innerRadius(innerR).outerRadius(outerR).padAngle(0.03);
      var pie = d3.pie().value(function(x){ return x.count; }).sort(null);
      pie(c.archetype_breakdown).forEach(function(seg) {
        g.append('path')
          .attr('d', arcGen(seg))
          .attr('fill', archColour(seg.data.type))
          .attr('opacity', .85);
      });

      // Inner fill
      g.append('circle').attr('r', innerR - 1).attr('fill', '#fdfcf9').attr('stroke', 'none');

      // Member count
      g.append('text')
        .attr('class', 'label-count')
        .attr('y', 4)
        .text(c.member_count)
        .attr('text-anchor', 'middle')
        .attr('dominant-baseline', 'middle')
        .attr('font-size', Math.min(14, r * 0.35) + 'px')
        .attr('font-family', "'DM Mono',monospace")
        .attr('fill', '#1a1714');

      // City name label
      g.append('text')
        .attr('class', 'label-city')
        .attr('y', r + 18)
        .attr('font-size', '11px')
        .text(c.city);

      // Event badge
      if (c.event_count > 0) {
        var badge = g.append('g').attr('transform', 'translate(' + (r - 2) + ',' + (-r + 2) + ')');
        badge.append('circle').attr('r', 9).attr('fill', '#c8602a');
        badge.append('text').attr('text-anchor','middle').attr('dominant-baseline','middle').attr('font-size','8px').attr('fill','#fff').attr('font-weight','600').text(c.event_count);
      }
    });

    // ── Event markers ──
    var evtsG = d3.select('#members-g');
    G.data.events.forEach(function(ev) {
      var xy = cityXY(ev.city);
      if (!xy) return;
      var cx = cityXY(ev.city)[0] + 25, cy = cityXY(ev.city)[1] - 25;
      var eg = evtsG.append('g').attr('transform', 'translate(' + cx + ',' + cy + ')')
        .attr('class', 'node-event')
        .on('mouseover', function(evt){ showTip('<b>' + ev.name + '</b><br>' + ev.city + ' · ' + fmtDate(ev.event_date) + '<br>' + ev.registered_count + ' registered', evt); })
        .on('mousemove', moveTip).on('mouseout', hideTip)
        .on('click', function(){ showEventDetail(ev); });
      eg.append('rect').attr('x',-16).attr('y',-9).attr('width',32).attr('height',18).attr('rx',4)
        .attr('fill','#1d4e6b').attr('stroke','none').attr('opacity',.85);
      eg.append('text').attr('text-anchor','middle').attr('dominant-baseline','middle')
        .attr('font-size','8px').attr('font-weight','600').attr('fill','#fff')
        .text(ev.name.split(' ').slice(0,2).join(' '));
    });

  } else {
    // ── City focus: scatter member nodes in radial layout ──
    var cityMembers = members.filter(function(m){ return m.geography === G.city; });
    var cluster     = G.data.geo_clusters.find(function(c){ return c.city === G.city; });
    var cx = W / 2, cy = H / 2;

    // Central city label
    d3.select('#cities-g').append('text')
      .attr('x', cx).attr('y', cy - 100)
      .attr('text-anchor', 'middle')
      .attr('font-family', "'Libre Baskerville',Georgia,serif")
      .attr('font-style', 'italic')
      .attr('font-size', '22px')
      .attr('fill', '#1a1714')
      .text(G.city);

    if (cluster) {
      d3.select('#cities-g').append('text')
        .attr('x', cx).attr('y', cy - 78)
        .attr('text-anchor', 'middle')
        .attr('font-size', '12px')
        .attr('fill', '#7a6f62')
        .text(cluster.member_count + ' members · ' + cluster.event_count + ' events');
    }

    // Scatter members
    var mG = d3.select('#members-g');
    cityMembers.forEach(function(m, i) {
      var angle = (i / cityMembers.length) * 2 * Math.PI - Math.PI/2;
      var radius = 80 + (i % 3) * 30;
      var mx = cx + radius * Math.cos(angle);
      var my = cy + radius * Math.sin(angle) * 0.8;
      var mg = mG.append('g').attr('transform', 'translate(' + mx + ',' + my + ')')
        .attr('class', 'node-member')
        .on('mouseover', function(evt){ showTip('<b>' + capitalize(m.stakeholder_type || 'member') + '</b><br>' + (m.themes||[]).slice(0,2).join(', ') + '<br>' + m.event_count + ' events · ' + m.match_count + ' matches', evt); })
        .on('mousemove', moveTip).on('mouseout', hideTip);
      mg.append('circle').attr('r', 7)
        .attr('fill', archColour(m.stakeholder_type))
        .attr('stroke', '#fdfcf9').attr('stroke-width', 1.5);
    });

    // City corridors
    var cityCorridors = G.data.corridors.filter(function(c){ return c.from === G.city || c.to === G.city; });
    var othersG = d3.select('#corridors-g');
    cityCorridors.forEach(function(corr, i) {
      var otherCity = corr.from === G.city ? corr.to : corr.from;
      var angle = (i / cityCorridors.length) * 2 * Math.PI;
      var ex = cx + 250 * Math.cos(angle), ey = cy + 250 * Math.sin(angle);
      othersG.append('line')
        .attr('x1', cx).attr('y1', cy)
        .attr('x2', ex).attr('y2', ey)
        .attr('stroke', '#b5a99a').attr('stroke-width', 1.5).attr('stroke-dasharray', '4 4');
      othersG.append('text')
        .attr('x', ex).attr('y', ey)
        .attr('text-anchor', 'middle').attr('dominant-baseline', 'middle')
        .attr('font-size', '11px').attr('font-style', 'italic')
        .attr('font-family', "'Libre Baskerville',Georgia,serif")
        .attr('fill', '#7a6f62')
        .text(otherCity + ' (' + corr.match_count + ')');
    });
  }
}

// ── Theme view ────────────────────────────────────────────────────────────────
function renderTheme() {
  var wrap = document.getElementById('canvas-wrap');
  var W = wrap.clientWidth - 280, H = wrap.clientHeight;

  var THEMES = ['Climate Tech','FinTech','HealthTech','DeepTech','AI','Web3',
    'Impact','EdTech','FutureOfWork','AgriTech','SocialImpact','Space',
    'Mobility','GovTech','Sustainability','Biotech'];

  // Count members per theme
  var themeCounts = {};
  var themeArch   = {};
  G.data.members.forEach(function(m) {
    (m.themes || []).forEach(function(t) {
      themeCounts[t] = (themeCounts[t] || 0) + 1;
      if (!themeArch[t]) themeArch[t] = {};
      var arch = m.stakeholder_type || 'other';
      themeArch[t][arch] = (themeArch[t][arch] || 0) + 1;
    });
  });

  var allThemes = Object.keys(themeCounts).length ? Object.keys(themeCounts) : THEMES;
  var maxCnt = d3.max(allThemes.map(function(t){ return themeCounts[t] || 2; })) || 1;
  var rScale = d3.scaleSqrt().domain([0, maxCnt]).range([18, 60]);

  // Grid layout
  var cols = Math.ceil(Math.sqrt(allThemes.length * W/H));
  var rows = Math.ceil(allThemes.length / cols);
  var cellW = W / cols, cellH = H / rows;

  var tG = d3.select('#themes-g');
  allThemes.slice(0,32).forEach(function(theme, i) {
    var col = i % cols, row = Math.floor(i / cols);
    var cx = cellW * (col + 0.5), cy = cellH * (row + 0.5);
    var cnt = themeCounts[theme] || 2;
    var r = rScale(cnt);
    var colour = THEME_COLOURS[i % THEME_COLOURS.length];
    var archs = Object.keys(themeArch[theme] || {}).map(function(k){ return {type:k,count:themeArch[theme][k]}; });
    var total = archs.reduce(function(s,a){ return s+a.count; },0) || 1;

    var g = tG.append('g').attr('class', 'theme-bubble node-theme')
      .attr('transform', 'translate(' + cx + ',' + cy + ')')
      .on('mouseover', function(evt){ showTip('<b>' + theme + '</b><br>' + cnt + ' members', evt); })
      .on('mousemove', moveTip).on('mouseout', hideTip)
      .on('click', function(){ showThemeDetail(theme, cnt, archs); });

    g.append('circle').attr('r', r).attr('fill', colour).attr('fill-opacity', .15).attr('stroke', colour).attr('stroke-width', 1.5).attr('stroke-opacity', .6);

    // Archetype donut ring
    if (archs.length) {
      var arcGen = d3.arc().innerRadius(r).outerRadius(r + 7).padAngle(0.04);
      var pie = d3.pie().value(function(x){ return x.count; }).sort(null);
      pie(archs).forEach(function(seg) {
        g.append('path').attr('d', arcGen(seg)).attr('fill', archColour(seg.data.type)).attr('opacity', .8);
      });
    }

    g.append('text').attr('text-anchor','middle').attr('dominant-baseline','middle')
      .attr('font-size', Math.min(11, r * 0.28) + 'px').attr('font-weight', '600')
      .attr('fill', colour).text(theme.length > 12 ? theme.slice(0,10)+'…' : theme);

    g.append('text').attr('y', r * 0.5).attr('text-anchor','middle').attr('dominant-baseline','middle')
      .attr('font-family', "'DM Mono',monospace").attr('font-size', '9px').attr('fill', '#7a6f62').text(cnt);
  });
}

// ── Force view ────────────────────────────────────────────────────────────────
function renderForce() {
  var wrap = document.getElementById('canvas-wrap');
  var W = wrap.clientWidth - 280, H = wrap.clientHeight;

  var members  = filteredMembers().slice(0, 150); // cap for perf
  var clusters = G.data.geo_clusters;
  var corridors = G.data.corridors;

  // Create nodes
  var citySet = new Set(clusters.map(function(c){ return c.city; }));
  var cityNodes = clusters.map(function(c, i) {
    var pos = cityPos(c.city);
    return { id: 'city:' + c.city, type: 'city', label: c.city, cluster: c,
      x: pos ? pos[0] * W : W/2 + (i%5-2)*80, y: pos ? pos[1] * H : H/2 + (Math.floor(i/5)-2)*80 };
  });
  var memberNodes = members.map(function(m, i) {
    var pos = cityPos(m.geography);
    return { id: 'member:' + m.id, type: 'member', member: m,
      x: pos ? pos[0]*W + (Math.random()-0.5)*40 : W/2, y: pos ? pos[1]*H + (Math.random()-0.5)*40 : H/2 };
  });
  var nodes = cityNodes.concat(memberNodes);

  // Create links
  var links = [];
  memberNodes.forEach(function(mn) {
    var city = mn.member.geography;
    var cn = cityNodes.find(function(c){ return c.label === city; });
    if (cn) links.push({ source: cn.id, target: mn.id, type: 'member' });
  });
  corridors.forEach(function(corr) {
    var a = cityNodes.find(function(c){ return c.label === corr.from; });
    var b = cityNodes.find(function(c){ return c.label === corr.to; });
    if (a && b) links.push({ source: a.id, target: b.id, type: 'corridor', weight: corr.match_count });
  });

  var nodeMap = {};
  nodes.forEach(function(n){ nodeMap[n.id] = n; });
  var linkObjs = links.map(function(l){ return { source: nodeMap[l.source] || l.source, target: nodeMap[l.target] || l.target, type: l.type, weight: l.weight }; });

  G.simulation = d3.forceSimulation(nodes)
    .force('link', d3.forceLink(linkObjs).id(function(d){ return d.id; }).distance(function(l){ return l.type==='corridor' ? 200 : 40; }).strength(function(l){ return l.type==='corridor' ? 0.05 : 0.3; }))
    .force('charge', d3.forceManyBody().strength(function(d){ return d.type==='city' ? -300 : -20; }))
    .force('collide', d3.forceCollide(function(d){ return d.type==='city' ? 50 : 8; }))
    .force('x', d3.forceX(function(d){ var pos = cityPos(d.type==='city' ? d.label : (d.member ? d.member.geography : null)); return pos ? pos[0]*W : W/2; }).strength(0.15))
    .force('y', d3.forceY(function(d){ var pos = cityPos(d.type==='city' ? d.label : (d.member ? d.member.geography : null)); return pos ? pos[1]*H : H/2; }).strength(0.15));

  var fG = d3.select('#force-g');

  // Links
  var linkSel = fG.selectAll('.f-link').data(linkObjs).enter().append('line').attr('class','f-link')
    .attr('stroke', function(l){ return l.type==='corridor' ? '#1d4e6b' : '#e2ddd5'; })
    .attr('stroke-width', function(l){ return l.type==='corridor' ? (l.weight||1)*0.4+0.5 : 0.5; })
    .attr('stroke-opacity', function(l){ return l.type==='corridor' ? 0.4 : 0.3; });

  // Member nodes
  var mSel = fG.selectAll('.f-member').data(memberNodes).enter().append('circle').attr('class','f-member')
    .attr('r', 5).attr('fill', function(d){ return archColour(d.member.stakeholder_type); })
    .attr('stroke', '#fdfcf9').attr('stroke-width', 1).attr('fill-opacity', .85)
    .on('mouseover', function(evt, d){ showTip(capitalize(d.member.stakeholder_type||'member') + '<br>' + d.member.geography + '<br>' + (d.member.themes||[]).slice(0,2).join(', '), evt); })
    .on('mousemove', moveTip).on('mouseout', hideTip)
    .call(d3.drag().on('start', dragStart).on('drag', dragged).on('end', dragEnd));

  // City nodes
  var cSel = fG.selectAll('.f-city').data(cityNodes).enter().append('g').attr('class','f-city')
    .on('click', function(evt, d){ selectCity(d.label); })
    .call(d3.drag().on('start', dragStart).on('drag', dragged).on('end', dragEnd));
  cSel.append('circle').attr('r', 20).attr('fill', '#fdfcf9').attr('stroke', '#e2ddd5').attr('stroke-width', 1.5);
  cSel.append('text').attr('text-anchor','middle').attr('dominant-baseline','middle')
    .attr('font-family', "'Libre Baskerville',Georgia,serif").attr('font-style','italic').attr('font-size','8px').attr('fill','#1a1714')
    .text(function(d){ return d.label.length > 8 ? d.label.slice(0,7)+'…' : d.label; });

  G.simulation.on('tick', function() {
    linkSel.attr('x1', function(l){ return l.source.x; }).attr('y1', function(l){ return l.source.y; })
      .attr('x2', function(l){ return l.target.x; }).attr('y2', function(l){ return l.target.y; });
    mSel.attr('cx', function(d){ return d.x; }).attr('cy', function(d){ return d.y; });
    cSel.attr('transform', function(d){ return 'translate(' + d.x + ',' + d.y + ')'; });
  });

  function dragStart(evt, d) { if (!evt.active) G.simulation.alphaTarget(0.3).restart(); d.fx=d.x; d.fy=d.y; }
  function dragged(evt, d)   { d.fx=evt.x; d.fy=evt.y; }
  function dragEnd(evt, d)   { if (!evt.active) G.simulation.alphaTarget(0); d.fx=null; d.fy=null; }
}

// ── Detail panels ─────────────────────────────────────────────────────────────
function showCityDetail(c) {
  var topCorridors = G.data.corridors.filter(function(r){ return r.from===c.city||r.to===c.city; }).slice(0,5);
  var html =
    '<div class="dp-tag">City Cluster</div>' +
    '<div class="dp-title">' + c.city + '</div>' +
    '<div class="dp-meta-grid">' +
      metaBox(c.member_count, 'Members') +
      metaBox(c.event_count, 'Events') +
      metaBox(c.total_matches, 'Total Matches') +
    '</div>';
  if (c.archetype_breakdown && c.archetype_breakdown.length) {
    html += '<div class="dp-section"><div class="dp-section-lbl">Stakeholder Mix</div><div class="dp-archetypes">' +
      c.archetype_breakdown.map(function(a){
        return '<div class="dp-archetype"><div class="dp-arch-dot" style="background:' + archColour(a.type) + '"></div><span class="dp-arch-name">' + capitalize(a.type) + '</span><span class="dp-arch-cnt">' + a.count + '</span></div>';
      }).join('') + '</div></div>';
  }
  if (c.top_themes && c.top_themes.length) {
    html += '<div class="dp-section"><div class="dp-section-lbl">Top Themes</div><div class="dp-chips">' +
      c.top_themes.map(function(t){ return '<div class="dp-chip">' + t.theme + ' <span style="color:var(--ink-3)">' + t.count + '</span></div>'; }).join('') +
    '</div></div>';
  }
  if (topCorridors.length) {
    html += '<div class="dp-section"><div class="dp-section-lbl">Top Corridors</div><div class="dp-corridor-list">' +
      topCorridors.map(function(corr){
        var other = corr.from === c.city ? corr.to : corr.from;
        return '<div class="dp-corridor"><span style="font-weight:500">' + other + '</span><div class="dp-corr-bar" style="width:' + Math.min(80, corr.match_count * 6) + 'px"></div><span style="color:var(--ink-3)">' + corr.match_count + ' matches</span></div>';
      }).join('') + '</div></div>';
  }
  openDetail(html);
}

function showEventDetail(ev) {
  var html =
    '<div class="dp-tag">Event</div>' +
    '<div class="dp-title">' + ev.name + '</div>' +
    '<div class="dp-meta-grid">' +
      metaBox(ev.registered_count, 'Registered') +
      metaBox(ev.match_count, 'Matches') +
      metaBox(ev.revealed_count, 'Revealed') +
    '</div>' +
    '<div class="dp-section"><div class="dp-section-lbl">Location & Date</div><p style="font-size:13px;color:var(--ink-2)">' + ev.city + (ev.country?' · '+ev.country:'') + ' · ' + fmtDate(ev.event_date) + '</p></div>';
  if (ev.themes && ev.themes.length) {
    html += '<div class="dp-section"><div class="dp-section-lbl">Themes</div><div class="dp-chips">' +
      ev.themes.map(function(t){ return '<div class="dp-chip">'+t+'</div>'; }).join('') + '</div></div>';
  }
  if (ev.slug) {
    html += '<div style="margin-top:14px"><a href="/event.html?slug=' + ev.slug + '" style="display:inline-block;padding:8px 16px;background:var(--ink);color:var(--paper);border-radius:8px;font-size:12px;font-weight:600;text-decoration:none">View Event →</a></div>';
  }
  openDetail(html);
}

function showThemeDetail(theme, cnt, archs) {
  var html =
    '<div class="dp-tag">Theme</div>' +
    '<div class="dp-title">' + theme + '</div>' +
    '<div class="dp-meta-grid">' + metaBox(cnt, 'Members') + '</div>';
  if (archs && archs.length) {
    html += '<div class="dp-section"><div class="dp-section-lbl">Stakeholder Mix</div><div class="dp-archetypes">' +
      archs.sort(function(a,b){ return b.count-a.count; }).map(function(a){
        return '<div class="dp-archetype"><div class="dp-arch-dot" style="background:' + archColour(a.type) + '"></div><span class="dp-arch-name">'+capitalize(a.type)+'</span><span class="dp-arch-cnt">'+a.count+'</span></div>';
      }).join('') + '</div></div>';
  }
  openDetail(html);
}

function metaBox(val, lbl) {
  return '<div class="dp-meta"><div class="dp-meta-val">' + (val||0) + '</div><div class="dp-meta-lbl">' + lbl + '</div></div>';
}

// ── Zoom fit ──────────────────────────────────────────────────────────────────
function zoomFit() {
  var wrap = document.getElementById('canvas-wrap');
  var W = wrap.clientWidth, H = wrap.clientHeight;
  var zG = document.getElementById('zoom-g');
  var bbox;
  try { bbox = zG.getBBox(); } catch(e) { return; }
  if (!bbox || !bbox.width || !bbox.height) return;
  var pad = 60;
  var scale = Math.min((W-pad*2) / bbox.width, (H-pad*2) / bbox.height, 2);
  var tx = W/2 - scale*(bbox.x + bbox.width/2);
  var ty = H/2 - scale*(bbox.y + bbox.height/2);
  G.svgEl.transition().duration(500).call(G.zoom.transform, d3.zoomIdentity.translate(tx, ty).scale(scale));
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function capitalize(s) {
  if (!s) return '';
  return s.charAt(0).toUpperCase() + s.slice(1);
}
function fmtDate(d) {
  if (!d) return '';
  try { return new Date(d).toLocaleDateString('en-GB', {day:'numeric',month:'short',year:'numeric'}); } catch(e) { return d; }
}

// ── Start ─────────────────────────────────────────────────────────────────────
window.addEventListener('load', init);
window.addEventListener('resize', function() {
  G.width  = document.getElementById('canvas-wrap').clientWidth;
  G.height = document.getElementById('canvas-wrap').clientHeight;
  if (G.data) render();
});
</script>
