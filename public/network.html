<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Network Map · EventMedium</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Instrument+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/topojson@3/dist/topojson.min.js"></script>
<style>
:root{
  --cream:#f8f6f1; --paper:#fdfcf9; --paper2:#f0ede5;
  --ink:#1a1714; --ink2:#3d3830; --ink3:#7a6f62; --ink4:#b5a99a;
  --bdr:#e2ddd5;
  --c-investor:#c8602a; --c-founder:#1d4e6b; --c-operator:#4a7c59;
  --c-academic:#7c3aed; --c-other:#7a6f62;
  --c-event:#d4a827; --c-community:#1d9e8f; --c-corridor:#1d4e6b;
  --sb:260px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;background:var(--cream);color:var(--ink);font-family:'Instrument Sans',system-ui,sans-serif}

/* ── Shell ── */
#shell{display:flex;height:100%;padding-top:52px}
#topbar{
  position:fixed;top:0;left:0;right:0;height:52px;z-index:60;
  background:var(--paper);border-bottom:1px solid var(--bdr);
  display:flex;align-items:center;gap:0;
}
#tb-brand{
  padding:0 20px;width:var(--sb);min-width:var(--sb);border-right:1px solid var(--bdr);
  font-family:'Libre Baskerville',Georgia,serif;font-style:italic;font-size:16px;
  display:flex;align-items:center;gap:6px;
}
#tb-brand a{color:var(--ink);text-decoration:none}
#tb-brand a:hover{color:var(--c-investor)}
#tb-mid{flex:1;display:flex;align-items:center;gap:10px;padding:0 16px;overflow:hidden}
#tb-title{font-size:13px;font-weight:600;color:var(--ink2);white-space:nowrap}
#tb-meta{font-size:11px;color:var(--ink3);font-family:'DM Mono',monospace;white-space:nowrap}
.tb-sep{width:1px;height:20px;background:var(--bdr)}
#tb-right{display:flex;align-items:center;gap:6px;padding:0 14px;flex-shrink:0}
.tb-link{
  padding:5px 12px;border-radius:7px;font-size:12px;font-weight:500;
  border:1px solid var(--bdr);color:var(--ink2);text-decoration:none;
  background:transparent;display:inline-flex;align-items:center;gap:5px;transition:background .15s;
}
.tb-link:hover{background:var(--paper2)}

/* ── Sidebar ── */
#sidebar{
  width:var(--sb);min-width:var(--sb);height:100%;
  background:var(--paper);border-right:1px solid var(--bdr);
  overflow-y:auto;scrollbar-width:thin;display:flex;flex-direction:column;
}
#sidebar::-webkit-scrollbar{width:3px}
#sidebar::-webkit-scrollbar-thumb{background:var(--bdr)}

.sb-sec{padding:14px 16px;border-bottom:1px solid var(--bdr)}
.sb-lbl{font-size:10px;font-weight:600;letter-spacing:.09em;text-transform:uppercase;color:var(--ink3);margin-bottom:8px}

/* Layer toggles */
.layer-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.layer-btn{
  padding:8px 6px;border-radius:9px;border:1.5px solid var(--bdr);
  background:transparent;cursor:pointer;text-align:center;transition:all .15s;
  display:flex;flex-direction:column;align-items:center;gap:3px;
}
.layer-btn.on{border-color:currentColor}
.layer-btn-dot{width:10px;height:10px;border-radius:50%;margin:0 auto}
.layer-btn-lbl{font-size:11px;font-weight:600}
.layer-btn-cnt{font-size:10px;color:var(--ink3);font-family:'DM Mono',monospace}

/* Stats */
.stat-row{display:flex;align-items:center;justify-content:space-between;padding:4px 0}
.stat-row-lbl{font-size:12px;color:var(--ink2);display:flex;align-items:center;gap:6px}
.stat-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.stat-row-val{font-size:13px;font-weight:600;color:var(--ink);font-family:'DM Mono',monospace}

/* Filters */
.filter-item{
  display:flex;align-items:center;gap:8px;padding:5px 6px;border-radius:7px;
  cursor:pointer;transition:background .12s;
}
.filter-item:hover{background:var(--paper2)}
.filter-item.active{background:var(--paper2)}
.fi-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.fi-name{font-size:12px;flex:1;color:var(--ink2)}
.fi-cnt{font-size:11px;color:var(--ink3);font-family:'DM Mono',monospace}
.fi-check{width:14px;height:14px;border-radius:3px;border:1.5px solid var(--bdr);flex-shrink:0;position:relative}
.filter-item.active .fi-check{background:var(--ink);border-color:var(--ink)}
.filter-item.active .fi-check::after{content:'✓';position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:9px;color:#fff;line-height:1;padding-top:1px}

/* Theme chips */
.t-chips{display:flex;flex-wrap:wrap;gap:4px}
.t-chip{
  padding:3px 8px;border-radius:100px;font-size:10px;font-weight:500;
  border:1px solid var(--bdr);background:transparent;color:var(--ink2);
  cursor:pointer;transition:all .15s;
}
.t-chip:hover{background:var(--paper2)}
.t-chip.active{background:var(--ink);color:var(--paper);border-color:var(--ink)}

/* City list */
.city-list{display:flex;flex-direction:column;gap:2px}
.city-row{
  display:flex;align-items:center;gap:8px;padding:5px 6px;border-radius:7px;
  cursor:pointer;transition:background .12s;
}
.city-row:hover,.city-row.active{background:var(--paper2)}
.city-row-name{font-size:12px;font-weight:500;flex:1;color:var(--ink2)}
.city-row-cnt{font-size:10px;color:var(--ink3);font-family:'DM Mono',monospace}
.city-row-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;border:1.5px solid var(--ink4)}
.city-row.active .city-row-dot{background:var(--c-investor);border-color:var(--c-investor)}

/* ── Canvas ── */
#canvas{flex:1;position:relative;overflow:hidden;background:var(--cream)}
#map-svg{width:100%;height:100%}
.land{fill:#e8e3d9;stroke:#d4cfc5;stroke-width:.4}
.graticule{fill:none;stroke:#ddd8cf;stroke-width:.3;stroke-dasharray:2 3}

/* ── Cluster visuals ── */
.city-halo{fill-opacity:.07;stroke:none;pointer-events:none}
.city-ring{fill:none;stroke:var(--bdr);stroke-width:1}
.city-seg{stroke:none;cursor:pointer}
.city-inner{fill:var(--paper);stroke:none;cursor:pointer}
.city-label{
  font-family:'Libre Baskerville',Georgia,serif;font-style:italic;
  text-anchor:middle;pointer-events:none;fill:var(--ink2);
}
.city-sublabel{
  font-family:'DM Mono',monospace;text-anchor:middle;pointer-events:none;fill:var(--ink3);
}

/* Event pin */
.ev-pin{cursor:pointer}
.ev-pin rect{rx:3;ry:3}
.ev-pin text{font-family:'Instrument Sans',system-ui,sans-serif;font-weight:600;fill:#fff;pointer-events:none;text-anchor:middle;dominant-baseline:middle}

/* Community badge */
.comm-badge{cursor:pointer}

/* Theme halo */
.theme-halo{pointer-events:none}

/* Corridor */
.corridor{fill:none;stroke-linecap:round}

/* ── Zoom ctrls ── */
#zoom-ctrls{position:absolute;right:16px;bottom:90px;display:flex;flex-direction:column;gap:4px;z-index:20}
.zb{width:32px;height:32px;border-radius:7px;background:var(--paper);border:1px solid var(--bdr);cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;color:var(--ink2);box-shadow:0 1px 4px rgba(0,0,0,.08);transition:background .12s}
.zb:hover{background:var(--paper2)}

/* ── Legend ── */
#legend{
  position:absolute;bottom:16px;left:16px;z-index:20;
  background:var(--paper);border:1px solid var(--bdr);border-radius:11px;
  padding:11px 13px;min-width:145px;
}
.leg-ttl{font-size:9px;font-weight:600;letter-spacing:.09em;text-transform:uppercase;color:var(--ink3);margin-bottom:7px}
.leg-row{display:flex;align-items:center;gap:7px;margin-bottom:4px;font-size:11px;color:var(--ink2)}
.leg-swatch{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.leg-line{width:18px;height:2px;border-radius:1px;flex-shrink:0}
.leg-arc{width:18px;height:2px;flex-shrink:0;border-top:2px dashed var(--c-corridor);opacity:.5}

/* ── Detail panel ── */
#detail{
  position:absolute;bottom:0;left:0;right:0;z-index:40;
  background:var(--paper);border-top:1px solid var(--bdr);border-radius:14px 14px 0 0;
  padding:18px 22px 26px;max-height:52%;overflow-y:auto;
  transform:translateY(100%);transition:transform .38s cubic-bezier(.22,1,.36,1);
}
#detail.open{transform:translateY(0)}
#detail-close{
  position:absolute;top:12px;right:14px;width:26px;height:26px;border-radius:50%;
  border:1px solid var(--bdr);background:transparent;cursor:pointer;
  font-size:15px;color:var(--ink3);display:flex;align-items:center;justify-content:center;
}
#detail-close:hover{background:var(--paper2)}
.dp-tag{font-size:9px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--ink3);margin-bottom:3px}
.dp-h{font-family:'Libre Baskerville',Georgia,serif;font-size:19px;color:var(--ink);margin-bottom:10px}
.dp-grid{display:flex;gap:18px;flex-wrap:wrap;margin-bottom:12px}
.dp-m{display:flex;flex-direction:column;gap:1px}
.dp-mv{font-size:20px;font-weight:600;color:var(--ink);line-height:1}
.dp-ml{font-size:10px;color:var(--ink3)}
.dp-sec{margin-top:12px}
.dp-sec-lbl{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.09em;color:var(--ink3);margin-bottom:6px}
.dp-chips{display:flex;flex-wrap:wrap;gap:4px}
.dp-chip{padding:3px 8px;border-radius:100px;font-size:11px;border:1px solid var(--bdr);color:var(--ink2);background:var(--paper2)}
.dp-archs{display:flex;gap:6px;flex-wrap:wrap}
.dp-arch{display:flex;align-items:center;gap:5px;padding:4px 9px;border-radius:7px;background:var(--paper2);border:1px solid var(--bdr)}
.dp-arch-dot{width:7px;height:7px;border-radius:50%}
.dp-arch-name{font-size:11px;font-weight:500;color:var(--ink2)}
.dp-arch-n{font-size:11px;color:var(--ink3);font-family:'DM Mono',monospace}
.dp-corr{display:flex;flex-direction:column;gap:5px}
.dp-corr-row{display:flex;align-items:center;gap:8px;font-size:12px}
.dp-corr-bar{height:3px;border-radius:2px;background:var(--c-corridor);opacity:.45}
.dp-btn{
  display:inline-flex;align-items:center;margin-top:12px;padding:7px 14px;border-radius:8px;
  background:var(--ink);color:var(--paper);font-size:12px;font-weight:600;text-decoration:none;
}

/* ── Tooltip ── */
#tip{
  position:fixed;z-index:100;background:var(--ink);color:var(--paper);
  border-radius:8px;padding:7px 11px;font-size:12px;line-height:1.45;
  pointer-events:none;opacity:0;transition:opacity .12s;max-width:190px;
}
#tip.on{opacity:1}

/* ── Loading ── */
#loading{
  position:absolute;inset:0;z-index:50;background:var(--cream);
  display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px;
}
.ld-word{font-family:'Libre Baskerville',Georgia,serif;font-style:italic;font-size:22px;color:var(--ink);animation:pu 1.5s ease-in-out infinite}
.ld-sub{font-size:12px;color:var(--ink3)}
@keyframes pu{0%,100%{opacity:.3}50%{opacity:1}}

@media(max-width:700px){:root{--sb:0px}#sidebar{display:none}#tb-brand{width:auto;min-width:auto}}
</style>
</head>
<body>
<div id="topbar">
  <div id="tb-brand">
    <a href="/">EM</a>
    <span style="color:var(--ink4);font-style:normal">/</span>
    <span>Network Map</span>
  </div>
  <div id="tb-mid">
    <span id="tb-title">Global community</span>
    <div class="tb-sep"></div>
    <span id="tb-meta">—</span>
  </div>
  <div id="tb-right">
    <a href="/canister.html" class="tb-link">Profile</a>
    <a href="/network-graph.html" class="tb-link">Force Graph</a>
  </div>
</div>

<div id="shell">
  <!-- Sidebar -->
  <aside id="sidebar">

    <div class="sb-sec">
      <div class="sb-lbl">Layers</div>
      <div class="layer-grid" id="layer-grid">
        <button class="layer-btn on" data-layer="members" style="color:var(--c-founder)">
          <div class="layer-btn-dot" style="background:var(--c-founder)"></div>
          <div class="layer-btn-lbl">Members</div>
          <div class="layer-btn-cnt" id="lc-members">—</div>
        </button>
        <button class="layer-btn on" data-layer="events" style="color:var(--c-event)">
          <div class="layer-btn-dot" style="background:var(--c-event)"></div>
          <div class="layer-btn-lbl">Events</div>
          <div class="layer-btn-cnt" id="lc-events">—</div>
        </button>
        <button class="layer-btn on" data-layer="communities" style="color:var(--c-community)">
          <div class="layer-btn-dot" style="background:var(--c-community)"></div>
          <div class="layer-btn-lbl">Communities</div>
          <div class="layer-btn-cnt" id="lc-communities">—</div>
        </button>
        <button class="layer-btn on" data-layer="corridors" style="color:var(--c-corridor)">
          <div class="layer-btn-dot" style="background:var(--c-corridor)"></div>
          <div class="layer-btn-lbl">Corridors</div>
          <div class="layer-btn-cnt" id="lc-corridors">—</div>
        </button>
      </div>
    </div>

    <div class="sb-sec">
      <div class="sb-lbl">Overview</div>
      <div id="stats-area"></div>
    </div>

    <div class="sb-sec">
      <div class="sb-lbl">Stakeholder Type</div>
      <div id="arch-filters"></div>
    </div>

    <div class="sb-sec">
      <div class="sb-lbl">Themes / Motivations</div>
      <div class="t-chips" id="theme-chips"></div>
    </div>

    <div class="sb-sec" style="flex:1">
      <div class="sb-lbl">Cities <span id="city-count" style="font-weight:400;text-transform:none;letter-spacing:0"></span></div>
      <div class="city-list" id="city-list"></div>
    </div>

  </aside>

  <!-- Map canvas -->
  <div id="canvas">
    <div id="loading"><div class="ld-word">EventMedium</div><div class="ld-sub">Mapping the network…</div></div>
    <svg id="map-svg">
      <defs>
        <filter id="f-halo"><feGaussianBlur stdDeviation="22"/></filter>
        <filter id="f-soft"><feGaussianBlur stdDeviation="8"/></filter>
        <filter id="f-pin"><feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#000" flood-opacity=".15"/></filter>
      </defs>
      <g id="zoom-g">
        <g id="g-map"></g>
        <g id="g-halos"></g>
        <g id="g-corridors"></g>
        <g id="g-themes"></g>
        <g id="g-clusters"></g>
        <g id="g-events"></g>
        <g id="g-communities"></g>
        <g id="g-labels"></g>
      </g>
    </svg>

    <div id="zoom-ctrls">
      <button class="zb" id="zi">+</button>
      <button class="zb" id="zf">⊡</button>
      <button class="zb" id="zo">−</button>
    </div>

    <div id="legend">
      <div class="leg-ttl">Legend</div>
      <div class="leg-row"><div class="leg-swatch" style="background:var(--c-investor)"></div>Investor / VC</div>
      <div class="leg-row"><div class="leg-swatch" style="background:var(--c-founder)"></div>Founder / Startup</div>
      <div class="leg-row"><div class="leg-swatch" style="background:var(--c-operator)"></div>Operator / Exec</div>
      <div class="leg-row"><div class="leg-swatch" style="background:var(--c-academic)"></div>Academic / Research</div>
      <div style="margin-top:7px;padding-top:7px;border-top:1px solid var(--bdr)">
        <div class="leg-row"><div class="leg-swatch" style="background:var(--c-event);border-radius:2px"></div>Event</div>
        <div class="leg-row"><div class="leg-swatch" style="background:var(--c-community);border-radius:3px"></div>Community</div>
        <div class="leg-row"><div class="leg-arc"></div>Match corridor</div>
      </div>
    </div>

    <div id="detail">
      <button id="detail-close" onclick="closeDetail()">×</button>
      <div id="detail-body"></div>
    </div>
  </div>
</div>

<div id="tip"></div>

<script>
// ── Colours ──────────────────────────────────────────────────────────────────
var ARCH_COL = {
  investor:'#c8602a', vc:'#c8602a', 'venture capital':'#c8602a',
  founder:'#1d4e6b', startup:'#1d4e6b',
  operator:'#4a7c59', exec:'#4a7c59', executive:'#4a7c59', operator:'#4a7c59',
  academic:'#7c3aed', researcher:'#7c3aed', research:'#7c3aed',
  other:'#7a6f62'
};
var THEME_COL = ['#c8602a','#1d4e6b','#4a7c59','#7c3aed','#d4a827','#d64e7b','#1fa8a0','#7b4f2e','#3b6fb5','#a34e8f','#5a7a3c','#c45c3a','#2e6b8a','#8a6b2e','#4e8a6b','#6b4e8a'];
function archCol(t){
  if(!t)return ARCH_COL.other;
  var l=t.toLowerCase();
  for(var k in ARCH_COL){if(l.includes(k))return ARCH_COL[k];}
  return ARCH_COL.other;
}

// ── Real lat/lon for cities ──────────────────────────────────────────────────
var CITY_LATLON = {
  'London':[51.51,-0.13],'New York':[40.71,-74.01],'San Francisco':[37.77,-122.42],
  'Los Angeles':[34.05,-118.24],'Chicago':[41.88,-87.63],'Boston':[42.36,-71.06],
  'Washington':[38.91,-77.04],'Miami':[25.76,-80.19],'Seattle':[47.61,-122.33],
  'Austin':[30.27,-97.74],'Toronto':[43.65,-79.38],'Vancouver':[49.28,-123.12],
  'Paris':[48.86,2.35],'Berlin':[52.52,13.41],'Amsterdam':[52.37,4.90],
  'Stockholm':[59.33,18.06],'Oslo':[59.91,10.75],'Copenhagen':[55.68,12.57],
  'Helsinki':[60.17,24.94],'Zurich':[47.38,8.54],'Geneva':[46.20,6.15],
  'Vienna':[48.21,16.37],'Prague':[50.08,14.44],'Budapest':[47.50,19.04],
  'Warsaw':[52.23,21.01],'Kyiv':[50.45,30.52],'Dublin':[53.33,-6.25],
  'Edinburgh':[55.95,-3.19],'Madrid':[40.42,-3.70],'Barcelona':[41.39,2.15],
  'Lisbon':[38.72,-9.14],'Rome':[41.90,12.50],'Milan':[45.47,9.19],
  'Athens':[37.98,23.73],'Istanbul':[41.01,28.96],'Bucharest':[44.43,26.10],

  'Addis Ababa':[9.03,38.74],'Accra':[5.56,-0.20],'Casablanca':[33.59,-7.62],
  'Mumbai':[19.08,72.88],'Delhi':[28.61,77.21],'Bangalore':[12.97,77.59],
  'Karachi':[24.86,67.01],'Dhaka':[23.73,90.40],'Colombo':[6.93,79.84],
  'Singapore':[1.35,103.82],'Kuala Lumpur':[3.14,101.69],'Bangkok':[13.75,100.52],

  'Hanoi':[21.03,105.83],'Taipei':[25.04,121.56],'Hong Kong':[22.32,114.17],
  'Shanghai':[31.23,121.47],'Beijing':[39.91,116.39],'Seoul':[37.57,126.98],

  'Atlanta':[33.75,-84.39],'Dallas':[32.78,-96.80],'Houston':[29.76,-95.37],
  'Philadelphia':[39.95,-75.17],'Minneapolis':[44.98,-93.27],'Portland':[45.52,-122.68],
};
function latlon(name){
  if(!name)return null;
  var t=name.trim();
  if(CITY_LATLON[t])return CITY_LATLON[t];
  var low=t.toLowerCase();
  for(var k in CITY_LATLON){if(k.toLowerCase().startsWith(low.split(' ')[0]))return CITY_LATLON[k];}
  return null;
}

// ── Tooltip ──────────────────────────────────────────────────────────────────
var tipEl=document.getElementById('tip');
function tip(html,evt){tipEl.innerHTML=html;tipEl.classList.add('on');moveTip(evt);}
function moveTip(evt){
  var x=evt.clientX+13,y=evt.clientY-8;
  if(x+200>window.innerWidth)x=evt.clientX-210;
  if(y+100>window.innerHeight)y=evt.clientY-90;
  tipEl.style.left=x+'px';tipEl.style.top=y+'px';
}
function hideTip(){tipEl.classList.remove('on');}

// ── Detail ───────────────────────────────────────────────────────────────────

// ── Init ─────────────────────────────────────────────────────────────────────
async function init(){
  S.svg  = d3.select('#map-svg');
  S.zoomG= d3.select('#zoom-g');
  var canvas=document.getElementById('canvas');
  S.W=canvas.clientWidth; S.H=canvas.clientHeight;

  // Projection — Natural Earth for less distortion
  S.proj = d3.geoNaturalEarth1()
    .scale((S.W / 6.28) * 0.95)
    .translate([S.W/2, S.H/2]);

  // Zoom
  S.zoom = d3.zoom().scaleExtent([0.4,12])
    .on('zoom',function(e){S.zoomG.attr('transform',e.transform);});
  S.svg.call(S.zoom).on('dblclick.zoom',null);
  document.getElementById('zi').onclick=function(){S.svg.transition().duration(280).call(S.zoom.scaleBy,1.5);};
  document.getElementById('zo').onclick=function(){S.svg.transition().duration(280).call(S.zoom.scaleBy,0.67);};
  document.getElementById('zf').onclick=zoomFit;

  // Layer toggles
  document.querySelectorAll('.layer-btn').forEach(function(btn){
    btn.onclick=function(){
      var l=btn.dataset.layer;
      S.layers[l]=!S.layers[l];
      btn.classList.toggle('on',S.layers[l]);
      applyLayers();
    };
  });

  // Draw world map
  try{
    var world=await d3.json('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json');
    var path=d3.geoPath().projection(S.proj);
    var graticule=d3.geoGraticule()();
    d3.select('#g-map').append('path').datum(graticule).attr('class','graticule').attr('d',path);
    var countries=topojson.feature(world,world.objects.countries);
    d3.select('#g-map').selectAll('.land').data(countries.features).enter()
      .append('path').attr('class','land').attr('d',path);
  }catch(e){
    // Graceful: just draw graticule grid
    var path2=d3.geoPath().projection(S.proj);
    d3.select('#g-map').append('path').datum(d3.geoGraticule()()).attr('class','graticule').attr('d',path2);
  }

  // Fetch data
  var data=null;
  try{var r=await fetch('/api/network/graph');if(r.ok)data=await r.json();}catch(e){}
  if(!data||!data.members||data.members.length<2)data=makeFallback();

  // Build geo_clusters if missing
  data=buildClusters(data);
  S.data=data;
  S.clusters=data.geo_clusters;

  // Build theme colour map
  var allThemes=[];
  data.members.forEach(function(m){(m.themes||[]).forEach(function(t){if(!allThemes.includes(t))allThemes.push(t);});});
  allThemes.forEach(function(t,i){S.themeColMap[t]=THEME_COL[i%THEME_COL.length];});

  document.getElementById('loading').style.display='none';
  populateSidebar();
  renderMap();
  zoomFit();
}

// ── Build clusters ────────────────────────────────────────────────────────────
function buildClusters(data){
  var cm={};
  (data.members||[]).forEach(function(m){
    var c=m.geography;if(!c)return;
    if(!cm[c])cm[c]={city:c,member_count:0,event_count:0,community_count:0,theme_freq:{},arc_freq:{},total_matches:0,events:[],communities:[]};
    cm[c].member_count++;cm[c].total_matches+=(m.match_count||0);
    if(m.stakeholder_type)cm[c].arc_freq[m.stakeholder_type]=(cm[c].arc_freq[m.stakeholder_type]||0)+1;
    (m.themes||[]).forEach(function(t){cm[c].theme_freq[t]=(cm[c].theme_freq[t]||0)+1;});
  });
  (data.events||[]).forEach(function(e){
    var c=e.city;if(!c)return;
    if(!cm[c])cm[c]={city:c,member_count:0,event_count:0,community_count:0,theme_freq:{},arc_freq:{},total_matches:0,events:[],communities:[]};
    cm[c].event_count++;cm[c].events.push(e);
    (e.themes||[]).forEach(function(t){cm[c].theme_freq[t]=(cm[c].theme_freq[t]||0)+1;});
  });
  data.geo_clusters=Object.values(cm).map(function(c){
    return{
      city:c.city,member_count:c.member_count,event_count:c.event_count,community_count:c.community_count,
      top_themes:Object.keys(c.theme_freq).sort(function(a,b){return c.theme_freq[b]-c.theme_freq[a];}).slice(0,6).map(function(t){return{theme:t,count:c.theme_freq[t]};}),
      archetype_breakdown:Object.keys(c.arc_freq).sort(function(a,b){return c.arc_freq[b]-c.arc_freq[a];}).map(function(t){return{type:t,count:c.arc_freq[t]};}),
      total_matches:c.total_matches,events:c.events,communities:c.communities||[]
    };
  }).filter(function(c){return latlon(c.city)&&(c.member_count>0||c.event_count>0);})
    .sort(function(a,b){return b.member_count-a.member_count;});
  return data;
}

function populateCityList(){
  var el=document.getElementById('city-list');el.innerHTML='';

  var all=document.createElement('div');all.className='city-row'+(S.focusCity===null?' active':'');
  all.innerHTML='<div class="city-row-dot"></div><span class="city-row-name" style="color:var(--ink);font-weight:600">All cities</span>';

    row.innerHTML='<div class="city-row-dot"></div><span class="city-row-name">'+c.city+'</span><span class="city-row-cnt">'+c.member_count+'</span>';
    row.onclick=function(){S.focusCity=c.city;populateCityList();renderMap();document.getElementById('tb-title').textContent=c.city;};

}

// ── Render ────────────────────────────────────────────────────────────────────
function renderMap(){
  ['g-halos','g-corridors','g-themes','g-clusters','g-events','g-communities','g-labels'].forEach(function(id){
    d3.select('#'+id).selectAll('*').remove();
  });
  closeDetail();

  var clusters=filteredClusters();
  var maxM=d3.max(clusters,function(c){return c.member_count;})||1;
  var rScale=d3.scaleSqrt().domain([0,maxM]).range([14,72]);
  var maxCorr=d3.max(S.data.corridors,function(c){return c.match_count;})||1;

  // ── Theme halos (one per dominant theme per city) ─────────────────────────
  if(S.layers.members&&S.themeFilter.size===0){
    clusters.forEach(function(c){
      var xy=project(c.city);if(!xy)return;
      var r=rScale(c.member_count);
      // soft halo
      d3.select('#g-halos').append('circle')
        .attr('cx',xy[0]).attr('cy',xy[1]).attr('r',r+50)
        .attr('fill',archCol((c.archetype_breakdown[0]||{}).type))
        .attr('fill-opacity',.06).attr('filter','url(#f-halo)');
    });
  }

  // Theme-filter halos: show theme concentration gradient
  if(S.themeFilter.size>0){
    clusters.forEach(function(c){
      var xy=project(c.city);if(!xy)return;
      var themeCount=0;
      c.top_themes.forEach(function(tt){if(S.themeFilter.has(tt.theme))themeCount+=tt.count;});
      if(themeCount===0)return;
      var r=rScale(c.member_count);
      var theme=Array.from(S.themeFilter)[0];
      var col=S.themeColMap[theme]||THEME_COL[0];
      d3.select('#g-themes').append('circle')
        .attr('cx',xy[0]).attr('cy',xy[1]).attr('r',r+60)
        .attr('fill',col).attr('fill-opacity',.10).attr('filter','url(#f-halo)');
    });
  }

  // ── Corridors ─────────────────────────────────────────────────────────────
  if(S.layers.corridors){
    var visibleCities=new Set(clusters.map(function(c){return c.city;}));
    S.data.corridors.forEach(function(corr){
      if(!visibleCities.has(corr.from)||!visibleCities.has(corr.to))return;
      var a=project(corr.from),b=project(corr.to);
      if(!a||!b)return;
      var mx=(a[0]+b[0])/2, my=(a[1]+b[1])/2 - Math.hypot(b[0]-a[0],b[1]-a[1])*0.22;
      var sw=0.8+(corr.match_count/maxCorr)*3.5;
      var strong=corr.avg_score>=0.65;
      d3.select('#g-corridors').append('path')
        .attr('class','corridor')
        .attr('d','M'+a[0]+','+a[1]+' Q'+mx+','+my+' '+b[0]+','+b[1])
        .attr('stroke',strong?'#1d4e6b':'#c8bfb0')
        .attr('stroke-width',sw)
        .attr('stroke-dasharray',strong?'none':'4 5')
        .attr('opacity',strong?.55:.35)
        .on('mouseover',function(evt){tip('<b>'+corr.from+' → '+corr.to+'</b><br>'+corr.match_count+' matches<br>avg score: '+corr.avg_score,evt);})
        .on('mousemove',moveTip).on('mouseout',hideTip);
    });
  }

  // ── City clusters ─────────────────────────────────────────────────────────
  if(S.layers.members){
    clusters.forEach(function(c){
      var xy=project(c.city);if(!xy)return;
      var r=rScale(c.member_count);
      var isFocus=S.focusCity===c.city;
      var g=d3.select('#g-clusters').append('g')
        .attr('transform','translate('+xy[0]+','+xy[1]+')')
        .attr('class','city-cluster')
        .on('mouseover',function(evt){
          tip('<b>'+c.city+'</b><br>'+c.member_count+' members · '+c.event_count+' events<br>'+(c.top_themes[0]?c.top_themes[0].theme:'')+' · '+(c.top_themes[1]?c.top_themes[1].theme:''),evt);
        })
        .on('mousemove',moveTip).on('mouseout',hideTip)
        .on('click',function(){
          if(S.focusCity===c.city){S.focusCity=null;document.getElementById('tb-title').textContent='Global community';}
          else{S.focusCity=c.city;document.getElementById('tb-title').textContent=c.city;}
          populateCityList();showCityDetail(c);renderMap();
        });

      // Outer ring
      g.append('circle').attr('r',r+9).attr('fill','none')
        .attr('stroke',isFocus?'#1a1714':'var(--bdr)').attr('stroke-width',isFocus?2:1);

      // Background fill
      g.append('circle').attr('r',r).attr('fill','var(--paper)').attr('stroke','none');

      // Archetype donut segments
      var total=c.archetype_breakdown.reduce(function(s,a){return s+a.count;},0)||1;
      var innerR=r*0.62, outerR=r+8;
      var arc=d3.arc().innerRadius(innerR).outerRadius(outerR).padAngle(0.04).cornerRadius(2);
      var pie=d3.pie().value(function(x){return x.count;}).sort(null);
      if(c.archetype_breakdown.length){
        pie(c.archetype_breakdown).forEach(function(seg){
          g.append('path').attr('d',arc(seg)).attr('fill',archCol(seg.data.type)).attr('opacity',.9);
        });
      }else{
        g.append('circle').attr('r',r+8).attr('fill','var(--bdr)').attr('opacity',.3);
      }

      // Inner fill
      g.append('circle').attr('r',innerR-1).attr('fill','var(--paper)').attr('stroke','none');

      // Member count
      g.append('text').attr('text-anchor','middle').attr('dominant-baseline','middle')
        .attr('font-family',"'DM Mono',monospace").attr('font-size',Math.min(15,r*0.38)+'px')
        .attr('font-weight','500').attr('fill','var(--ink)').text(c.member_count);

      // City label
      var labelG=d3.select('#g-labels').append('g').attr('transform','translate('+xy[0]+','+(xy[1]+r+18)+')');
      labelG.append('text').attr('text-anchor','middle').attr('dominant-baseline','hanging')
        .attr('font-family',"'Libre Baskerville',Georgia,serif").attr('font-style','italic')
        .attr('font-size',Math.max(9,Math.min(12,r*0.22))+'px').attr('fill','var(--ink2)')
        .text(c.city).attr('pointer-events','none');

      // Theme tag under city name
      if(c.top_themes.length){
        var topT=S.themeFilter.size>0?c.top_themes.find(function(tt){return S.themeFilter.has(tt.theme);})||c.top_themes[0]:c.top_themes[0];
        labelG.append('text').attr('y',14).attr('text-anchor','middle').attr('dominant-baseline','hanging')
          .attr('font-size','8px').attr('fill','var(--ink4)').attr('font-family',"'Instrument Sans',system-ui,sans-serif")
          .text(topT.theme).attr('pointer-events','none');
      }

      // Event count badge top-right
      if(c.event_count>0&&S.layers.events){
        var b=g.append('g').attr('transform','translate('+(r*0.72)+','+(-r*0.72)+')');
        b.append('circle').attr('r',9).attr('fill','var(--c-event)');
        b.append('text').attr('text-anchor','middle').attr('dominant-baseline','middle')
          .attr('font-size','8px').attr('font-weight','700').attr('fill','#fff').text(c.event_count);
      }
    });
  }

  // ── Event pins ────────────────────────────────────────────────────────────
  if(S.layers.events){
    S.data.events.forEach(function(ev){
      // Only show if city is visible
      var clust=clusters.find(function(c){return c.city===ev.city;});
      if(!clust)return;
      var xy=project(ev.city);if(!xy)return;
      var r=rScale(clust.member_count);
      // Offset pins so they don't overlap the cluster circle
      var angle=-Math.PI/4+(S.data.events.filter(function(e){return e.city===ev.city;}).indexOf(ev)*Math.PI/6);
      var px=xy[0]+(r+26)*Math.cos(angle), py=xy[1]+(r+26)*Math.sin(angle);

      var g=d3.select('#g-events').append('g').attr('class','ev-pin')
        .attr('transform','translate('+px+','+py+')')
        .attr('filter','url(#f-pin)')
        .on('mouseover',function(evt){
          tip('<b>'+ev.name+'</b><br>'+ev.city+' · '+fmtDate(ev.event_date)+'<br>'+ev.registered_count+' registered · '+ev.match_count+' matches',evt);
        })
        .on('mousemove',moveTip).on('mouseout',hideTip)
        .on('click',function(){showEventDetail(ev);});

      g.append('rect').attr('x',-18).attr('y',-9).attr('width',36).attr('height',18)
        .attr('rx',4).attr('fill','var(--c-event)');
      g.append('text').attr('font-size','8px').attr('font-weight','700').attr('fill','#fff')
        .attr('text-anchor','middle').attr('dominant-baseline','middle')
        .text(shortName(ev.name));
    });
  }

  applyLayers();
}

// ── Layer visibility ─────────────────────────────────────────────────────────
function applyLayers(){
  d3.select('#g-clusters').style('display',S.layers.members?null:'none');
  d3.select('#g-labels').style('display',S.layers.members?null:'none');
  d3.select('#g-halos').style('display',S.layers.members?null:'none');
  d3.select('#g-events').style('display',S.layers.events?null:'none');
  d3.select('#g-corridors').style('display',S.layers.corridors?null:'none');
  d3.select('#g-communities').style('display',S.layers.communities?null:'none');
}

// ── Filtered clusters ────────────────────────────────────────────────────────
function filteredClusters(){
  var cls=S.clusters;
  if(S.focusCity) cls=cls.filter(function(c){return c.city===S.focusCity;});
  if(S.archFilter.size){
    cls=cls.filter(function(c){
      return c.archetype_breakdown.some(function(a){return S.archFilter.has(a.type);});
    });
  }
  if(S.themeFilter.size){
    cls=cls.filter(function(c){
      return c.top_themes.some(function(tt){return S.themeFilter.has(tt.theme);});
    });
  }
  return cls;
}

// ── Detail panels ─────────────────────────────────────────────────────────────
function showCityDetail(c){
  var corridors=S.data.corridors.filter(function(r){return r.from===c.city||r.to===c.city;}).slice(0,6);
  var html=
    '<div class="dp-tag">City Cluster</div>'+
    '<div class="dp-h">'+c.city+'</div>'+
    '<div class="dp-grid">'+
      dpMeta(c.member_count,'Members')+dpMeta(c.event_count,'Events')+dpMeta(c.total_matches,'Matches')+
    '</div>';
  if(c.archetype_breakdown.length){
    html+='<div class="dp-sec"><div class="dp-sec-lbl">Stakeholder Mix</div><div class="dp-archs">'+
      c.archetype_breakdown.map(function(a){
        return '<div class="dp-arch"><div class="dp-arch-dot" style="background:'+archCol(a.type)+'"></div><span class="dp-arch-name">'+cap(a.type)+'</span><span class="dp-arch-n">'+a.count+'</span></div>';
      }).join('')+'</div></div>';
  }
  if(c.top_themes.length){
    html+='<div class="dp-sec"><div class="dp-sec-lbl">Themes & Motivations</div><div class="dp-chips">'+
      c.top_themes.map(function(t){
        var col=S.themeColMap[t.theme]||'var(--bdr)';
        return '<div class="dp-chip" style="border-color:'+col+';color:'+col+'">'+t.theme+' <span style="opacity:.6">'+t.count+'</span></div>';
      }).join('')+'</div></div>';
  }
  if(c.events&&c.events.length){
    html+='<div class="dp-sec"><div class="dp-sec-lbl">Events in this city</div><div class="dp-chips">'+
      c.events.map(function(e){
        return '<div class="dp-chip" style="background:#fef3c7;border-color:var(--c-event);color:#92400e">'+e.name+'</div>';
      }).join('')+'</div></div>';
  }
  if(corridors.length){
    html+='<div class="dp-sec"><div class="dp-sec-lbl">Top Match Corridors</div><div class="dp-corr">'+
      corridors.map(function(corr){
        var other=corr.from===c.city?corr.to:corr.from;
        return '<div class="dp-corr-row"><span style="font-weight:500;min-width:90px">'+other+'</span><div class="dp-corr-bar" style="width:'+Math.min(80,corr.match_count*5)+'px"></div><span style="color:var(--ink3)">'+corr.match_count+' matches</span></div>';
      }).join('')+'</div></div>';
  }
  openDetail(html);
}

function showEventDetail(ev){
  var html=
    '<div class="dp-tag">Event</div>'+
    '<div class="dp-h">'+ev.name+'</div>'+
    '<div class="dp-grid">'+dpMeta(ev.registered_count,'Registered')+dpMeta(ev.match_count,'Matches')+dpMeta(ev.revealed_count,'Revealed')+'</div>'+
    '<p style="font-size:13px;color:var(--ink2);margin-bottom:8px">'+ev.city+(ev.country?' · '+ev.country:'')+' · '+fmtDate(ev.event_date)+'</p>';
  if(ev.themes&&ev.themes.length){
    html+='<div class="dp-chips">'+ev.themes.map(function(t){return '<div class="dp-chip">'+t+'</div>';}).join('')+'</div>';
  }
  if(ev.slug){html+='<a class="dp-btn" href="/event.html?slug='+ev.slug+'">View Event →</a>';}
  openDetail(html);
}

function dpMeta(v,l){return '<div class="dp-m"><div class="dp-mv">'+(v||0)+'</div><div class="dp-ml">'+l+'</div></div>';}

// ── Helpers ───────────────────────────────────────────────────────────────────
function project(cityName){
  var ll=latlon(cityName);
  if(!ll)return null;
  return S.proj([ll[1],ll[0]]); // [lon, lat]
}
function cap(s){if(!s)return '';return s.charAt(0).toUpperCase()+s.slice(1);}
function fmtDate(d){try{return new Date(d).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});}catch(e){return d||'';}}
function shortName(name){var w=name.split(' ');return w.length>2?w[0]+' '+w[1]:name;}

function zoomFit(){
  var zg=document.getElementById('zoom-g');
  var bb;try{bb=zg.getBBox();}catch(e){return;}
  if(!bb||!bb.width)return;
  var pad=60, W=S.W, H=S.H;
  var sc=Math.min((W-pad*2)/bb.width,(H-pad*2)/bb.height,2.5);
  var tx=W/2-sc*(bb.x+bb.width/2), ty=H/2-sc*(bb.y+bb.height/2);
  S.svg.transition().duration(550).call(S.zoom.transform,d3.zoomIdentity.translate(tx,ty).scale(sc));
}

window.addEventListener('load',init);
window.addEventListener('resize',function(){
  var c=document.getElementById('canvas');S.W=c.clientWidth;S.H=c.clientHeight;
  if(S.proj){S.proj.scale((S.W/6.28)*.95).translate([S.W/2,S.H/2]);}
  if(S.data){d3.select('#g-map').selectAll('*').remove();init();}
});
</script>
