      html += '<div style="margin-bottom:24px"><div style="font-size:14px;font-weight:700;margin-bottom:12px;color:var(--heading)">Engagement (7d)</div>';
      html += '<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px">';
      html += pulseCard(L.engagement.nevUsers7d, 'Users chatted Nev', '--purple');
      html += pulseCard(L.engagement.notifsSent7d, 'Notifications sent', '--blue');
      var readRate = L.engagement.notifsSent7d > 0 ? Math.round(L.engagement.notifsRead7d / L.engagement.notifsSent7d * 100) + '%' : '—';
      html += pulseCard(readRate, 'Notif read rate', '--green');
      html += '</div></div>';

      // ── Sparkline charts ──
      html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px">';
      html += '<div style="background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:16px">';
      html += '<div style="font-size:12px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:12px">Daily Signups (30d)</div>';
      html += sparkline(L.dailySignups, '--green');
      html += '</div>';
      html += '<div style="background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:16px">';
      html += '<div style="font-size:12px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:12px">Daily Active Users (30d)</div>';
      html += sparkline(L.dailyActive, '--accent');
      html += '</div>';
      html += '</div>';

      // ── Recent Activity Feed ──
      html += '<div style="margin-bottom:24px"><div style="font-size:14px;font-weight:700;margin-bottom:12px;color:var(--heading)">Recent Activity</div>';
      html += '<div style="background:var(--bg);border:1px solid var(--border);border-radius:10px;overflow:hidden;max-height:500px;overflow-y:auto">';
      if (L.recentActivity.length === 0) {
        html += '<div style="padding:20px;text-align:center;color:var(--text3)">No recent activity</div>';
      } else {
        html += L.recentActivity.map(function(a) {
          var icon = { signup: '\u{1F44B}', login: '\u{1F513}', nev_chat: '\u{1F4AC}', community_join: '\u{1F465}', canister_update: '\u{1F4DD}' }[a.action] || '\u2022';
          var label = { signup: 'signed up', login: 'logged in', nev_chat: 'chatted with Nev', community_join: 'joined', canister_update: 'updated canister' }[a.action] || a.action;
          var extra = a.extra ? ' \u00b7 ' + esc(a.extra) : '';
          var ago = '';
          if (a.ts) {
            var diff = Date.now() - new Date(a.ts).getTime();
            var mins = Math.floor(diff / 60000);
            if (mins < 60) ago = mins + 'm ago';
            else if (mins < 1440) ago = Math.floor(mins / 60) + 'h ago';
            else ago = Math.floor(mins / 1440) + 'd ago';
          }
          return '<div style="display:flex;align-items:center;gap:10px;padding:10px 16px;border-bottom:1px solid var(--border);font-size:13px">' +
            '<span style="font-size:16px;width:24px;text-align:center">' + icon + '</span>' +
            '<span style="font-weight:600;min-width:0">' + esc(a.detail || 'Unknown') + '</span>' +
            '<span style="color:var(--text2)">' + label + extra + '</span>' +
            '<span style="margin-left:auto;color:var(--text3);font-size:11px;white-space:nowrap">' + ago + '</span>' +
          '</div>';
        }).join('');
      }
      html += '</div></div>';

      // ── Auto-refresh ──
      html += '<div style="text-align:center;padding:8px;font-size:11px;color:var(--text3)">Auto-refreshes every 60s \u00b7 <button onclick="liveRefresh()" style="background:none;border:1px solid var(--border2);padding:3px 10px;border-radius:4px;font-size:11px;cursor:pointer;font-family:var(--sans)">Refresh now</button></div>';

      el.innerHTML = html;

      // Auto-refresh every 60s
      setInterval(function() {
        if (document.querySelector('[data-tab="live"]').classList.contains('active')) {
          loadLive();
        }
      }, 60000);

    } catch(e) {
      el.innerHTML = '<div style="color:var(--red)">Failed to load: ' + esc(e.message) + '</div>';
    }
  }

  window.liveRefresh = function() { loadLive(); };

  function activeCard(val, label, colorVar) {
    return '<div style="background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:20px;text-align:center">' +
      '<div style="font-size:36px;font-weight:800;color:var(' + colorVar + ')">' + val + '</div>' +
      '<div style="font-size:11px;font-weight:600;letter-spacing:0.5px;text-transform:uppercase;color:var(--text3);margin-top:6px">' + label + '</div></div>';
  }

  function pulseCard(val, label, colorVar) {
    return '<div style="background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:14px;text-align:center">' +
      '<div style="font-size:22px;font-weight:700;color:var(' + colorVar + ')">' + val + '</div>' +
      '<div style="font-size:10px;font-weight:600;letter-spacing:0.4px;text-transform:uppercase;color:var(--text3);margin-top:4px">' + label + '</div></div>';
  }

  function sparkline(data, colorVar) {
    if (!data || data.length === 0) return '<div style="color:var(--text3);font-size:12px;text-align:center;padding:20px">No data yet</div>';
    var values = data.map(function(d) { return parseInt(d.count) || 0; });
    var max = Math.max.apply(null, values) || 1;
    var barWidth = Math.max(4, Math.floor((100 / values.length) - 1));
    var bars = values.map(function(v, i) {
      var h = Math.max(2, Math.round((v / max) * 60));
      var dayLabel = data[i].day ? new Date(data[i].day).getDate() : '';
      return '<div style="display:flex;flex-direction:column;align-items:center;gap:2px;flex:1">' +
        '<div style="font-size:9px;color:var(--text3);font-weight:600">' + (v > 0 ? v : '') + '</div>' +
        '<div style="width:100%;max-width:' + barWidth + 'px;height:' + h + 'px;background:var(' + colorVar + ');border-radius:2px;opacity:' + (v > 0 ? '1' : '0.15') + '"></div>' +
        '<div style="font-size:8px;color:var(--text3)">' + (i % 5 === 0 ? dayLabel : '') + '</div>' +
      '</div>';
    }).join('');
    return '<div style="display:flex;align-items:flex-end;gap:2px;height:90px">' + bars + '</div>';
  }
  // ── Abuse Flags Tab ──

  var abuseLoaded = false;
  document.querySelector('[data-tab="abuse"]').addEventListener('click', function() {
    if (!abuseLoaded) { abuseLoaded = true; loadAbuse(); }
  });

  async function loadAbuse() {
    var el = document.getElementById('abuse');
    el.innerHTML = '<div style="padding:40px;text-align:center;color:var(--text3)">Loading abuse data...</div>';
    try {
      var resp = await fetch('/api/admin/abuse', { headers: { 'Authorization': 'Bearer ' + token } });
      var data = await resp.json();
      var flags = data.flags || [];
      var suspicious = data.suspicious_profiles || [];

      var html = '<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px">';
      html += '<div style="background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:20px;text-align:center">' +
        '<div style="font-size:36px;font-weight:800;color:var(--red)">' + flags.length + '</div>' +
        '<div style="font-size:11px;font-weight:600;letter-spacing:0.5px;text-transform:uppercase;color:var(--text3);margin-top:6px">Flags (7d)</div></div>';
      html += '<div style="background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:20px;text-align:center">' +
        '<div style="font-size:36px;font-weight:800;color:var(--amber)">' + suspicious.length + '</div>' +
        '<div style="font-size:11px;font-weight:600;letter-spacing:0.5px;text-transform:uppercase;color:var(--text3);margin-top:6px">Suspicious Profiles</div></div>';
      html += '</div>';

      // Suspicious profiles
      if (suspicious.length) {
        html += '<div style="margin-bottom:20px"><div style="font-size:13px;font-weight:700;margin-bottom:10px">Suspicious Profiles</div>';
        html += '<div style="background:var(--bg);border:1px solid var(--border);border-radius:10px;overflow:hidden">';
        html += '<table style="width:100%;border-collapse:collapse;font-size:12px">' +
          '<tr style="background:var(--card);border-bottom:1px solid var(--border)">' +
          '<th style="padding:8px 12px;text-align:left;font-weight:600">User</th>' +
          '<th style="padding:8px 12px;text-align:left;font-weight:600">Email</th>' +
          '<th style="padding:8px 12px;text-align:left;font-weight:600">Type</th>' +
          '<th style="padding:8px 12px;text-align:right;font-weight:600">Completion</th>' +
          '<th style="padding:8px 12px;text-align:right;font-weight:600">Flags</th>' +
          '<th style="padding:8px 12px;text-align:left;font-weight:600">Flag Types</th></tr>';
        suspicious.forEach(function(p) {
          var completionSec = p.completion_seconds ? Math.round(p.completion_seconds) : '-';
          var completionColor = completionSec !== '-' && completionSec < 120 ? 'var(--red)' : 'var(--text2)';
          html += '<tr style="border-bottom:1px solid var(--border)">' +
            '<td style="padding:8px 12px;font-weight:600">' + esc(p.name || 'Unknown') + ' <span style="color:var(--text3);font-weight:400">#' + p.id + '</span></td>' +
            '<td style="padding:8px 12px;color:var(--text2)">' + esc(p.email || '') + '</td>' +
            '<td style="padding:8px 12px">' + esc(p.stakeholder_type || '-') + '</td>' +
            '<td style="padding:8px 12px;text-align:right;color:' + completionColor + ';font-weight:600">' + completionSec + 's</td>' +
            '<td style="padding:8px 12px;text-align:right;font-weight:700;color:' + (p.flag_count > 0 ? 'var(--red)' : 'var(--text3)') + '">' + (p.flag_count || 0) + '</td>' +
            '<td style="padding:8px 12px;font-size:11px;color:var(--amber)">' + esc(p.flag_types || '-') + '</td></tr>';
        });
        html += '</table></div></div>';
      }

      // Recent flags
      if (flags.length) {
        html += '<div><div style="font-size:13px;font-weight:700;margin-bottom:10px">Recent Abuse Flags (7 days)</div>';
        html += '<div style="background:var(--bg);border:1px solid var(--border);border-radius:10px;overflow:hidden">';
        html += '<table style="width:100%;border-collapse:collapse;font-size:12px">' +
          '<tr style="background:var(--card);border-bottom:1px solid var(--border)">' +
          '<th style="padding:8px 12px;text-align:left;font-weight:600">User</th>' +
          '<th style="padding:8px 12px;text-align:left;font-weight:600">Flag</th>' +
          '<th style="padding:8px 12px;text-align:left;font-weight:600">Reason</th>' +
          '<th style="padding:8px 12px;text-align:right;font-weight:600">Score</th>' +
          '<th style="padding:8px 12px;text-align:left;font-weight:600">When</th></tr>';
        flags.forEach(function(f) {
          var ago = timeAgo(f.created_at);
          html += '<tr style="border-bottom:1px solid var(--border)">' +
            '<td style="padding:8px 12px;font-weight:600">' + esc(f.name || '') + ' <span style="color:var(--text3);font-weight:400">' + esc(f.email || '') + '</span></td>' +
            '<td style="padding:8px 12px"><span style="padding:2px 8px;background:var(--red);color:white;border-radius:4px;font-size:10px;font-weight:600">' + esc(f.flag_type) + '</span></td>' +
            '<td style="padding:8px 12px;color:var(--text2);font-size:11px">' + esc(f.reason || '-') + '</td>' +
            '<td style="padding:8px 12px;text-align:right;font-weight:700">' + (f.score || 0) + '</td>' +
            '<td style="padding:8px 12px;color:var(--text3);font-size:11px">' + ago + '</td></tr>';
        });
        html += '</table></div></div>';
      }

      if (!flags.length && !suspicious.length) {
        html += '<div style="text-align:center;padding:40px;color:var(--text3)">No abuse flags or suspicious profiles detected in the last 7 days.</div>';
      }

      html += '<div style="text-align:center;padding:8px;font-size:11px;color:var(--text3);margin-top:16px"><button onclick="abuseLoaded=false;loadAbuse()" style="background:none;border:1px solid var(--border2);padding:3px 10px;border-radius:4px;font-size:11px;cursor:pointer;font-family:var(--sans)">Refresh</button></div>';

      el.innerHTML = html;
    } catch(e) {
      el.innerHTML = '<div style="color:var(--red);padding:40px;text-align:center">Failed to load: ' + esc(e.message) + '</div>';
    }
  }

  function timeAgo(dateStr) {
    if (!dateStr) return '';
    var diff = Date.now() - new Date(dateStr).getTime();
    var mins = Math.floor(diff / 60000);
    if (mins < 60) return mins + 'm ago';
    var hrs = Math.floor(mins / 60);
    if (hrs < 24) return hrs + 'h ago';
    return Math.floor(hrs / 24) + 'd ago';
  }
})();

// ── Feedback triage ──────────────────────────────────────────────────────────
var _feedbackLoaded = false;

function switchFeedbackView(status) {
  document.querySelectorAll('.feedback-subnav-btn').forEach(function(b) { b.classList.remove('active'); });
  event.target.classList.add('active');
  loadFeedback(status);
}

async function activateFeedbackTab() {
  if (!_feedbackLoaded) {
    _feedbackLoaded = true;
    await loadFeedback('');
    // Auto-run analysis if there are unreviewed items
    var check = await fetch('/api/admin/feedback?limit=1&status=open', { headers: { 'Authorization': 'Bearer ' + token } }).then(function(r) { return r.json(); });
    if (check.feedback && check.feedback.length > 0 && document.getElementById('analysis-output').style.display === 'none') {
      runFeedbackAnalysis();
    }
  }
}

async function loadFeedback(statusFilter) {
  var list = document.getElementById('feedback-list');
  list.innerHTML = '<div class="loading">Loading...</div>';
  try {
    var url = '/api/admin/feedback?limit=100' + (statusFilter ? '&status=' + statusFilter : '');
    var res = await fetch(url, { headers: { 'Authorization': 'Bearer ' + token } }).then(function(r) { return r.json(); });
    if (!res.feedback || !res.feedback.length) { list.innerHTML = '<div class="empty-section">No feedback yet.</div>'; return; }
    list.innerHTML = res.feedback.map(function(f) {
      return '<div class="feedback-item" id="feedback-item-' + f.id + '">' +
        '<div class="feedback-item-header">' +
          '<div class="feedback-item-meta">' +
            '<span class="category-tag ' + (f.category || 'general') + '">' + (f.category || 'general') + '</span>' +
            '<span class="feedback-user">' + esc(f.user_name || 'Anonymous') + (f.user_email ? ' &middot; ' + esc(f.user_email) : '') + '</span>' +
            '<span class="feedback-date">' + new Date(f.created_at).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit' }) + '</span>' +
          '</div>' +
          '<div class="feedback-item-actions">' +
            '<select class="status-select" onchange="updateFeedbackField(' + f.id + ',\'status\',this.value)">' +
              '<option value="open"' + (f.status === 'open' ? ' selected' : '') + '>Open</option>' +
              '<option value="in_progress"' + (f.status === 'in_progress' ? ' selected' : '') + '>In progress</option>' +
              '<option value="resolved"' + (f.status === 'resolved' ? ' selected' : '') + '>Resolved</option>' +
              '<option value="wont_fix"' + (f.status === 'wont_fix' ? ' selected' : '') + '>Won\'t fix</option>' +
            '</select>' +
            '<select class="severity-select" onchange="updateFeedbackField(' + f.id + ',\'severity\',this.value)">' +
              '<option value="unreviewed"' + (f.severity === 'unreviewed' ? ' selected' : '') + '>Unreviewed</option>' +
              '<option value="critical"' + (f.severity === 'critical' ? ' selected' : '') + '>Critical</option>' +
              '<option value="high"' + (f.severity === 'high' ? ' selected' : '') + '>High</option>' +
              '<option value="medium"' + (f.severity === 'medium' ? ' selected' : '') + '>Medium</option>' +
              '<option value="low"' + (f.severity === 'low' ? ' selected' : '') + '>Low</option>' +
            '</select>' +
          '</div>' +
        '</div>' +
        '<div class="feedback-message">' + esc(f.message) + '</div>' +
        (f.page_context ? '<div class="feedback-context">Page: ' + esc(f.page_context) + '</div>' : '') +
        '<div style="margin-top:6px"><input type="text" class="note-input" placeholder="Add a note..." id="note-' + f.id + '" value="' + esc(f.admin_notes || '') + '" onblur="saveNote(' + f.id + ')" onkeydown="if(event.key===\'Enter\')saveNote(' + f.id + ')"></div>' +
      '</div>';
    }).join('');
  } catch(e) { list.innerHTML = '<div class="analysis-error">Failed to load feedback: ' + e.message + '</div>'; }
}

async function updateFeedbackField(id, field, value) {
  var body = {};
  body[field] = value;
  await fetch('/api/admin/feedback/' + id, {
    method: 'PATCH',
    headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });
}

async function saveNote(id) {
  var note = document.getElementById('note-' + id).value;
  await fetch('/api/admin/feedback/' + id, {
    method: 'PATCH',
    headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' },
    body: JSON.stringify({ admin_notes: note })
  });
}

async function runFeedbackAnalysis() {
  var btn = document.getElementById('analysis-btn');
  var output = document.getElementById('analysis-output');
  var meta = document.getElementById('analysis-meta');
  btn.disabled = true;
  btn.textContent = 'Analysing...';
  output.style.display = 'block';
  output.innerHTML = '<div class="analysis-loading">Reading feedback and identifying patterns...</div>';

  try {
    var feedbackRes = await fetch('/api/admin/feedback?limit=100', { headers: { 'Authorization': 'Bearer ' + token } }).then(function(r) { return r.json(); });
    if (!feedbackRes.success || !feedbackRes.feedback || !feedbackRes.feedback.length) {
      output.innerHTML = '<div class="analysis-empty">No feedback submitted yet.</div>';
      btn.disabled = false; btn.textContent = 'Run analysis'; return;
    }
    var items = feedbackRes.feedback;
    var feedbackText = items.map(function(f, i) {
      return '[' + (i + 1) + '] Category: ' + f.category + ' | User: ' + (f.user_name || 'Anonymous') + ' | Date: ' + new Date(f.created_at).toLocaleDateString() + ' | Status: ' + f.status + '\nMessage: ' + f.message;
    }).join('\n\n');

    var claudeRes = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: 'You are reviewing beta feedback for EventMedium.ai \u2014 a professional networking platform that matches people at events using AI-built profiles called canisters. Users earn EMC\u00B2 credits through network activity.\n\nAnalyse the feedback batch and produce a structured briefing in this exact JSON format:\n{"critical":[{"id":0,"summary":"","action":""}],"bugs":[{"id":0,"summary":"","priority":"high"}],"improvements":[{"summary":"","frequency":1,"impact":"high"}],"patterns":[""],"praise":[""],"schedule":{"this_week":[""],"next_sprint":[""],"backlog":[""]},"overall_health":"good","headline":""}\n\nBe direct. Flag anything breaking core flows (matching, canister save, auth, EMC\u00B2) as critical. Tone: senior product manager briefing a founder. Return only valid JSON, no preamble.',
        messages: [{ role: 'user', content: 'Analyse this feedback batch (' + items.length + ' items):\n\n' + feedbackText }]
      })
    }).then(function(r) { return r.json(); });

    var raw = (claudeRes.content && claudeRes.content[0] && claudeRes.content[0].text) || '{}';
    var analysis;
    try { analysis = JSON.parse(raw); } catch(e) {
      var clean = raw.replace(/```json/g, '').replace(/```/g, '').trim();
      analysis = JSON.parse(clean);
    }
    renderAnalysis(analysis, items.length);
    meta.textContent = '\u2014 last run ' + new Date().toLocaleTimeString();
  } catch(err) {
    output.innerHTML = '<div class="analysis-error">Analysis failed: ' + err.message + '</div>';
    console.error('Analysis error:', err);
  }
  btn.disabled = false; btn.textContent = 'Re-run';
}

function renderAnalysis(a, totalCount) {
  var healthColor = { critical: 'var(--red)', needs_attention: 'var(--amber)', good: 'var(--green)', excellent: 'var(--green)' }[a.overall_health] || 'var(--text3)';

  function section(title, items, renderFn) {
    if (!items || !items.length) return '';
    return '<div class="analysis-section"><div class="analysis-section-title">' + title + '</div>' + items.map(renderFn).join('') + '</div>';
  }

  var output = document.getElementById('analysis-output');
  output.innerHTML =
    '<div class="analysis-headline"><span class="health-dot" style="background:' + healthColor + '"></span>' + esc(a.headline || 'Analysis complete') + '<span class="analysis-count">' + totalCount + ' items reviewed</span></div>' +
    section('\ud83d\udd34 Critical \u2014 action required', a.critical, function(item) {
      return '<div class="analysis-item critical"><div class="item-summary">' + esc(item.summary) + '</div><div class="item-action">\u2192 ' + esc(item.action) + '</div>' + (item.id ? '<button class="item-link-btn" onclick="scrollToFeedback(' + item.id + ')">View item</button>' : '') + '</div>';
    }) +
    section('\ud83d\udc1b Bugs', a.bugs, function(item) {
      return '<div class="analysis-item bug"><span class="priority-badge ' + item.priority + '">' + item.priority + '</span>' + esc(item.summary) + (item.id ? ' <button class="item-link-btn" onclick="scrollToFeedback(' + item.id + ')">View</button>' : '') + '</div>';
    }) +
    section('\ud83d\udca1 Top improvements', a.improvements, function(item) {
      return '<div class="analysis-item improvement"><div class="item-summary">' + esc(item.summary) + '</div><div class="item-meta">Impact: ' + item.impact + (item.frequency > 1 ? ' \u00b7 mentioned ' + item.frequency + '\u00d7' : '') + '</div></div>';
    }) +
    (a.patterns && a.patterns.length ? '<div class="analysis-section"><div class="analysis-section-title">\ud83d\udcca Patterns</div><ul class="analysis-list">' + a.patterns.map(function(p) { return '<li>' + esc(p) + '</li>'; }).join('') + '</ul></div>' : '') +
    (a.praise && a.praise.length ? '<div class="analysis-section"><div class="analysis-section-title">\u2713 What\'s working</div><ul class="analysis-list">' + a.praise.map(function(p) { return '<li>' + esc(p) + '</li>'; }).join('') + '</ul></div>' : '') +
    (a.schedule ? '<div class="analysis-section"><div class="analysis-section-title">\ud83d\udcc5 Recommended schedule</div>' +
      (a.schedule.this_week && a.schedule.this_week.length ? '<div class="schedule-block"><div class="schedule-label">This week</div><ul class="analysis-list">' + a.schedule.this_week.map(function(i) { return '<li>' + esc(i) + '</li>'; }).join('') + '</ul></div>' : '') +
      (a.schedule.next_sprint && a.schedule.next_sprint.length ? '<div class="schedule-block"><div class="schedule-label">Next sprint</div><ul class="analysis-list">' + a.schedule.next_sprint.map(function(i) { return '<li>' + esc(i) + '</li>'; }).join('') + '</ul></div>' : '') +
      (a.schedule.backlog && a.schedule.backlog.length ? '<div class="schedule-block"><div class="schedule-label">Backlog</div><ul class="analysis-list">' + a.schedule.backlog.map(function(i) { return '<li>' + esc(i) + '</li>'; }).join('') + '</ul></div>' : '') +
    '</div>' : '');
}

function scrollToFeedback(id) {
  var el = document.getElementById('feedback-item-' + id);
  if (el) {
    el.scrollIntoView({ behavior: 'smooth' });
    el.style.outline = '2px solid #C9A84C';
    setTimeout(function() { el.style.outline = ''; }, 2000);
  }
}
</script>
</body>
</html>
