<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Network — EventMedium</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<link rel="icon" type="image/png" href="/images/em-logo.png">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0a0a0f;color:#fff;height:100vh;overflow:hidden}

#graph-canvas,#map-canvas{position:absolute;inset:0;width:100%;height:100%}
#map-canvas{display:none}

/* Top bar */
.top-bar{position:absolute;top:0;left:0;right:0;height:52px;background:rgba(10,10,15,0.85);backdrop-filter:blur(8px);border-bottom:0.5px solid rgba(255,255,255,0.08);display:flex;align-items:center;padding:0 16px;gap:12px;z-index:100}
.top-bar-back{display:flex;align-items:center;gap:6px;color:rgba(255,255,255,0.6);text-decoration:none;font-size:12px;font-weight:500;padding:4px 8px;border-radius:6px;transition:all 0.15s}
.top-bar-back:hover{background:rgba(255,255,255,0.06);color:#fff}
.top-bar-title{font-size:13px;font-weight:500;color:rgba(255,255,255,0.9);margin-right:8px}

.mode-toggle{display:flex;background:rgba(255,255,255,0.06);border-radius:6px;padding:2px;gap:2px}
.mode-btn{padding:4px 10px;border-radius:4px;font-size:11px;cursor:pointer;border:none;background:transparent;color:rgba(255,255,255,0.5);font-family:inherit;transition:all 0.15s}
.mode-btn.active{background:rgba(255,255,255,0.12);color:#fff}

.layer-toggles{display:flex;gap:6px;margin-left:8px}
.layer-btn{padding:4px 10px;border-radius:20px;font-size:11px;cursor:pointer;border:1px solid transparent;font-family:inherit;transition:all 0.15s;white-space:nowrap}
.layer-btn[data-layer="matches"]{border-color:rgba(99,102,241,0.5);color:rgba(99,102,241,0.8);background:rgba(99,102,241,0.08)}
.layer-btn[data-layer="matches"].active{background:rgba(99,102,241,0.2);color:#818cf8}
.layer-btn[data-layer="communities"]{border-color:rgba(16,185,129,0.5);color:rgba(16,185,129,0.8);background:rgba(16,185,129,0.08)}
.layer-btn[data-layer="communities"].active{background:rgba(16,185,129,0.2);color:#34d399}
.layer-btn[data-layer="global"]{border-color:rgba(255,255,255,0.2);color:rgba(255,255,255,0.5);background:transparent}
.layer-btn[data-layer="global"].active{background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.8)}

.filter-toggle{margin-left:auto;padding:4px 10px;border-radius:6px;font-size:11px;cursor:pointer;border:0.5px solid rgba(255,255,255,0.15);background:transparent;color:rgba(255,255,255,0.6);font-family:inherit;transition:all 0.15s}
.filter-toggle:hover{background:rgba(255,255,255,0.06);color:#fff}

/* Filter panel */
.filter-panel{position:absolute;top:64px;right:16px;width:220px;background:rgba(10,10,15,0.9);backdrop-filter:blur(8px);border:0.5px solid rgba(255,255,255,0.08);border-radius:10px;padding:12px;z-index:100;display:none}
.filter-panel.open{display:block}
.filter-section{margin-bottom:14px}
.filter-label{font-size:10px;letter-spacing:0.06em;color:rgba(255,255,255,0.35);text-transform:uppercase;margin-bottom:6px}
.filter-select{width:100%;background:rgba(255,255,255,0.06);border:0.5px solid rgba(255,255,255,0.1);border-radius:6px;color:rgba(255,255,255,0.8);font-size:12px;padding:6px 8px;font-family:inherit}
.filter-chips{display:flex;flex-wrap:wrap;gap:4px}
.filter-chip{padding:3px 8px;border-radius:20px;font-size:11px;cursor:pointer;border:0.5px solid rgba(255,255,255,0.12);color:rgba(255,255,255,0.5);background:transparent;font-family:inherit;transition:all 0.15s}
.filter-chip.active{border-color:rgba(255,255,255,0.3);color:#fff;background:rgba(255,255,255,0.08)}

/* Stats bar */
.stats-bar{position:absolute;bottom:20px;left:16px;display:flex;gap:16px;z-index:100}
.stat-pill{background:rgba(10,10,15,0.85);backdrop-filter:blur(8px);border:0.5px solid rgba(255,255,255,0.08);border-radius:20px;padding:6px 12px;font-size:11px;color:rgba(255,255,255,0.6)}
.stat-pill strong{color:#fff;font-weight:500}
.stat-pill .new{color:#34d399;margin-left:4px}

/* Node tooltip */
.node-tooltip{position:absolute;background:rgba(10,10,15,0.95);border:0.5px solid rgba(255,255,255,0.12);border-radius:8px;padding:10px 12px;width:200px;pointer-events:none;z-index:200;display:none}
.tooltip-type{font-size:10px;letter-spacing:0.06em;text-transform:uppercase;color:rgba(255,255,255,0.35);margin-bottom:6px}
.tooltip-cohort{font-size:11px;color:#C9A84C;margin-bottom:8px}

/* Legend */
.legend{position:absolute;bottom:20px;right:16px;background:rgba(10,10,15,0.85);backdrop-filter:blur(8px);border:0.5px solid rgba(255,255,255,0.08);border-radius:8px;padding:10px 12px;z-index:100}
.legend-row{display:flex;align-items:center;gap:8px;font-size:11px;color:rgba(255,255,255,0.5);margin-bottom:5px}
.legend-row:last-child{margin-bottom:0}
.legend-line{width:24px;height:2px;border-radius:1px}
.legend-dot{width:8px;height:8px;border-radius:50%}

@media(max-width:768px){
  .layer-toggles{display:none}
  .filter-toggle{display:none}
  .legend{display:none}
  .top-bar{padding:0 10px;gap:8px}
}
</style>
</head>
<body>

<svg id="graph-canvas"></svg>
<div id="map-canvas"></div>

<div class="top-bar">
  <a href="/canister.html" class="top-bar-back">&larr; Canister</a>
  <span class="top-bar-title">My Network</span>

  <div class="mode-toggle">
    <button class="mode-btn active" data-mode="graph">Graph</button>
    <button class="mode-btn" data-mode="map">Map</button>
  </div>

  <div class="layer-toggles">
    <button class="layer-btn active" data-layer="matches">Matches</button>
    <button class="layer-btn" data-layer="communities">Communities</button>
    <button class="layer-btn" data-layer="global">Global</button>
  </div>

  <button class="filter-toggle" id="filterToggle">Filters</button>
</div>

<div class="filter-panel" id="filterPanel">
  <div class="filter-section">
    <div class="filter-label">Community</div>
    <select class="filter-select" id="filterCommunity"><option value="">All communities</option></select>
  </div>
  <div class="filter-section">
    <div class="filter-label">Stakeholder type</div>
    <div class="filter-chips" id="filterStakeholder">
      <button class="filter-chip active" data-value="">All</button>
      <button class="filter-chip" data-value="founder">Founder</button>
      <button class="filter-chip" data-value="investor">Investor</button>
      <button class="filter-chip" data-value="researcher">Researcher</button>
      <button class="filter-chip" data-value="corporate">Corporate</button>
      <button class="filter-chip" data-value="advisor">Advisor</button>
      <button class="filter-chip" data-value="operator">Operator</button>
    </div>
  </div>
</div>

<div class="node-tooltip" id="nodeTooltip"></div>

<div class="stats-bar">
  <div class="stat-pill">My network: <strong id="statMyCount">&mdash;</strong></div>
  <div class="stat-pill">Global: <strong id="statGlobalCount">&mdash;</strong><span class="new" id="statToday"></span></div>
</div>

<div class="legend">
  <div class="legend-row"><div class="legend-dot" style="background:#ffffff"></div> You</div>
  <div class="legend-row"><div class="legend-dot" style="background:#818cf8"></div> Your connections</div>
  <div class="legend-row"><div class="legend-dot" style="background:rgba(255,255,255,0.3)"></div> Network members</div>
  <div class="legend-row"><div class="legend-dot" style="border:1.5px solid #C9A84C;background:transparent"></div> OG member</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
// ─── State ───────────────────────────────────────────────
var state = {
  mode: 'graph',
  layers: { matches: true, communities: false, global: false },
  filters: { community: '', stakeholder: '' },
  data: { self: null, myNodes: [], myEdges: [], communityNodes: [], globalStats: null, clusters: [] }
};

var token = localStorage.getItem('auth_token');
if (!token) window.location.href = '/auth.html';
var headers = { 'Authorization': 'Bearer ' + token };

// ─── Colours ─────────────────────────────────────────────
var COLORS = {
  founder: '#818cf8', investor: '#34d399', researcher: '#60a5fa',
  corporate: '#f472b6', advisor: '#fb923c', operator: '#a78bfa',
  default: '#94a3b8'
};

function nodeColor(d) {
  if (d.node_type === 'self') return '#ffffff';
  return COLORS[d.stakeholder_type] || COLORS.default;
}

function nodeRadius(d) {
  if (d.node_type === 'self') return 14;
  if (d.node_type === 'community') return 6;
  return d.confirmed ? 10 : 7;
}

// ─── Data loading ────────────────────────────────────────
async function loadData() {
  try {
    var safe = function(p) { return p.catch(function() { return { json: function() { return Promise.resolve({}); } }; }); };
    var responses = await Promise.all([
      safe(fetch('/api/network/my-network', { headers: headers })),
      safe(fetch('/api/network/communities', { headers: headers })),
      safe(fetch('/api/network/global-stats', { headers: headers }))
    ]);

    var myNet = await responses[0].json();
    var comms = await responses[1].json();
    var global = await responses[2].json();

    state.data.self = myNet.self || null;
    state.data.myNodes = myNet.nodes || [];
    state.data.myEdges = myNet.edges || [];
    state.data.communityNodes = comms.nodes || [];
    state.data.globalStats = global.stats || {};
    state.data.clusters = global.clusters || [];

    populateFilters(comms.communities || []);
    updateStats();
    render();
  } catch (err) {
    console.error('Network data load error:', err);
  }
}

// ─── Node/edge filtering ─────────────────────────────────
function getVisibleNodes() {
  var nodes = [];
  if (state.data.self) {
    nodes.push(Object.assign({}, state.data.self, { node_type: 'self' }));
  }

  if (state.layers.matches) {
    var matchNodes = state.data.myNodes.filter(function(n) {
      if (n.node_type !== 'match') return false;
      if (state.filters.stakeholder && n.stakeholder_type !== state.filters.stakeholder) return false;
      return true;
    });
    nodes = nodes.concat(matchNodes);
  }

  if (state.layers.communities) {
    var existingIds = {};
    nodes.forEach(function(n) { existingIds[n.id] = true; });
    var commNodes = state.data.communityNodes.filter(function(n) {
      if (existingIds[n.id]) return false;
      if (state.filters.community && String(n.community_id) !== state.filters.community) return false;
      if (state.filters.stakeholder && n.stakeholder_type !== state.filters.stakeholder) return false;
      return true;
    });
    nodes = nodes.concat(commNodes);
  }

  return nodes;
}

function getVisibleEdges(nodeIds) {
  var idSet = {};
  nodeIds.forEach(function(id) { idSet[id] = true; });
  return state.data.myEdges.filter(function(e) {
    var sid = typeof e.source === 'object' ? e.source.id : e.source;
    var tid = typeof e.target === 'object' ? e.target.id : e.target;
    if (!idSet[sid] || !idSet[tid]) return false;
    if (!state.layers.matches && (e.type === 'match_confirmed' || e.type === 'match_accepted')) return false;
    return true;
  });
}

// ─── Graph render (D3 force) ─────────────────────────────
var simulation = null;

function renderGraph() {
  var svg = d3.select('#graph-canvas');
  svg.selectAll('*').remove();

  var W = window.innerWidth;
  var H = window.innerHeight;

  var nodes = getVisibleNodes();
  var nodeIds = nodes.map(function(n) { return n.id; });
  var edges = getVisibleEdges(nodeIds);

  var g = svg.append('g').attr('class', 'graph-root');

  // Zoom
  svg.call(d3.zoom().scaleExtent([0.2, 4]).on('zoom', function(e) {
    g.attr('transform', e.transform);
  }));

  // Global ambient layer
  if (state.layers.global && state.data.clusters.length) {
    var globalG = g.append('g').attr('class', 'global-layer');
    state.data.clusters.slice(0, 80).forEach(function(cluster) {
      var cx = W * 0.1 + Math.random() * W * 0.8;
      var cy = H * 0.1 + Math.random() * H * 0.8;
      var count = Math.min(parseInt(cluster.node_count) || 1, 8);
      for (var i = 0; i < count; i++) {
        globalG.append('circle')
          .attr('cx', cx + (Math.random() - 0.5) * 60)
          .attr('cy', cy + (Math.random() - 0.5) * 60)
          .attr('r', 3)
          .attr('fill', 'rgba(255,255,255,0.06)')
          .attr('stroke', 'rgba(255,255,255,0.04)')
          .attr('stroke-width', 0.5);
      }
    });
  }

  // Edge styling
  function edgeStroke(e) {
    if (e.type === 'match_confirmed') return '#818cf8';
    if (e.type === 'match_accepted') return 'rgba(99,102,241,0.45)';
    if (e.type === 'community') return 'rgba(52,211,153,0.35)';
    return 'rgba(255,255,255,0.1)';
  }
  function edgeDash(e) {
    if (e.type === 'match_accepted') return '4,3';
    if (e.type === 'community') return '2,4';
    return 'none';
  }
  function edgeWidth(e) {
    if (e.type === 'match_confirmed') return 1.5;
    return 0.8;
  }

  // Links
  var link = g.append('g').selectAll('line').data(edges).enter().append('line')
    .attr('stroke', edgeStroke)
    .attr('stroke-width', edgeWidth)
    .attr('stroke-dasharray', edgeDash)
    .attr('opacity', 0.8);

  // Node groups
  var node = g.append('g').selectAll('g').data(nodes).enter().append('g')
    .attr('class', 'node-group')
    .style('cursor', 'pointer')
    .on('mouseover', showTooltip)
    .on('mouseout', hideTooltip);

  // Node circles
  node.append('circle')
    .attr('r', nodeRadius)
    .attr('fill', nodeColor)
    .attr('stroke', function(d) {
      if (d.node_type === 'self') return '#fff';
      if (d.og_member) return '#C9A84C';
      return 'transparent';
    })
    .attr('stroke-width', function(d) {
      if (d.node_type === 'self') return 2;
      if (d.og_member) return 1;
      return 0;
    });

  // OG gold outer ring
  node.filter(function(d) { return d.og_member && d.node_type !== 'self'; })
    .append('circle')
    .attr('r', function(d) { return nodeRadius(d) + 3; })
    .attr('fill', 'none')
    .attr('stroke', 'rgba(201,168,76,0.4)')
    .attr('stroke-width', 0.5);

  // Self label
  node.filter(function(d) { return d.node_type === 'self'; })
    .append('text')
    .attr('dy', '0.35em')
    .attr('text-anchor', 'middle')
    .attr('font-size', '9px')
    .attr('font-weight', '500')
    .attr('fill', '#0a0a0f')
    .text('you');

  // Force simulation
  if (simulation) simulation.stop();
  simulation = d3.forceSimulation(nodes)
    .force('link', d3.forceLink(edges).id(function(d) { return d.id; }).distance(function(d) {
      if (d.type === 'match_confirmed') return 80;
      if (d.type === 'community') return 140;
      return 120;
    }))
    .force('charge', d3.forceManyBody().strength(-120))
    .force('center', d3.forceCenter(W / 2, H / 2))
    .force('collision', d3.forceCollide().radius(function(d) { return nodeRadius(d) + 4; }))
    .on('tick', function() {
      link
        .attr('x1', function(d) { return d.source.x; })
        .attr('y1', function(d) { return d.source.y; })
        .attr('x2', function(d) { return d.target.x; })
        .attr('y2', function(d) { return d.target.y; });
      node.attr('transform', function(d) { return 'translate(' + d.x + ',' + d.y + ')'; });
    });

  // Fix self at centre
  var selfNode = nodes.find(function(n) { return n.node_type === 'self'; });
  if (selfNode) { selfNode.fx = W / 2; selfNode.fy = H / 2; }
}

// ─── Map render (Leaflet) ────────────────────────────────
var leafletMap = null;

function renderMap() {
  document.getElementById('graph-canvas').style.display = 'none';
  document.getElementById('map-canvas').style.display = 'block';

  if (!leafletMap) {
    leafletMap = L.map('map-canvas', { zoomControl: true }).setView([20, 0], 2);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
      attribution: '&copy; CartoDB', maxZoom: 19
    }).addTo(leafletMap);
  }

  // Clear non-tile layers
  leafletMap.eachLayer(function(l) {
    if (l instanceof L.CircleMarker || l instanceof L.Polyline) leafletMap.removeLayer(l);
  });

  var nodes = state.data.myNodes || [];
  var selfNode = state.data.self;

  function markerColor(n) {
    if (n.node_type === 'match') return '#818cf8';
    return 'rgba(255,255,255,0.3)';
  }
  function markerOpacity(n) {
    if (n.node_type === 'match') return 0.9;
    return 0.35;
  }
  function markerRadius(n) {
    if (n.node_type === 'match') return 7;
    return 4;
  }

  // Plot all nodes with geo data
  var plotted = 0;
  nodes.forEach(function(n) {
    var lat = parseFloat(n.city_lat);
    var lng = parseFloat(n.city_lng);
    if (!lat || !lng || isNaN(lat) || isNaN(lng)) return;
    var color = markerColor(n);
    var marker = L.circleMarker([lat, lng], {
      radius: markerRadius(n),
      fillColor: color,
      fillOpacity: markerOpacity(n),
      color: n.og_member ? '#C9A84C' : color,
      weight: n.og_member ? 1 : 0
    }).addTo(leafletMap);
    plotted++;

    marker.on('mouseover', function() {
      var tip = document.getElementById('nodeTooltip');
      var geo = n.geography ? n.geography.split(',')[0].trim() : '';
      tip.innerHTML =
        '<div class="tooltip-type">' + (n.node_type === 'match' ? 'Connection' : 'Network member') + '</div>' +
        '<div style="font-size:13px;font-weight:500;color:#fff;margin-bottom:4px">' + (n.stakeholder_type ? n.stakeholder_type.charAt(0).toUpperCase() + n.stakeholder_type.slice(1) : 'Professional') + '</div>' +
        (geo ? '<div style="font-size:11px;color:rgba(255,255,255,0.45)">' + geo + '</div>' : '') +
        (n.og_member ? '<div style="font-size:10px;color:#C9A84C;margin-top:4px">\u2B21 Original Genesis</div>' : '');
      var point = leafletMap.latLngToContainerPoint([lat, lng]);
      var rect = document.getElementById('map-canvas').getBoundingClientRect();
      tip.style.display = 'block';
      tip.style.left = (point.x + rect.left + 12) + 'px';
      tip.style.top = (point.y + rect.top - 10) + 'px';
    });
    marker.on('mouseout', function() {
      document.getElementById('nodeTooltip').style.display = 'none';
    });
  });

  // Plot self
  if (selfNode && selfNode.city_lat && selfNode.city_lng) {
    var sLat = parseFloat(selfNode.city_lat);
    var sLng = parseFloat(selfNode.city_lng);
    if (!isNaN(sLat) && !isNaN(sLng)) {
      L.circleMarker([sLat, sLng], {
        radius: 10, fillColor: '#ffffff', fillOpacity: 1, color: '#ffffff', weight: 2
      }).addTo(leafletMap).bindTooltip('You', { permanent: false });
      leafletMap.setView([sLat, sLng], 3);
    }
  }

  console.log('[Map] Plotted ' + plotted + ' nodes of ' + nodes.length);
}

// ─── Tooltips ────────────────────────────────────────────
function showTooltip(event, d) {
  if (d.node_type === 'self') return;
  var tip = document.getElementById('nodeTooltip');
  var themes = [];
  if (d.themes) {
    try { themes = typeof d.themes === 'string' ? JSON.parse(d.themes) : (d.themes || []); } catch(e) { themes = []; }
  }

  tip.innerHTML =
    '<div class="tooltip-type">' + (d.node_type || '').replace('_', ' ') + '</div>' +
    '<div style="font-size:13px;font-weight:500;color:#fff;margin-bottom:4px">' + (d.stakeholder_type ? d.stakeholder_type.charAt(0).toUpperCase() + d.stakeholder_type.slice(1) : 'Unknown type') + '</div>' +
    (d.og_member ? '<div style="font-size:10px;color:#C9A84C;margin-bottom:4px">\u2B21 Original Genesis</div>' : '') +
    (d.emc2_cohort ? '<div class="tooltip-cohort">' + d.emc2_cohort.charAt(0).toUpperCase() + d.emc2_cohort.slice(1) + ' member' + (d.emc2_cohort_number ? ' \u00B7 #' + d.emc2_cohort_number : '') + '</div>' : '') +
    (d.geography ? '<div style="font-size:11px;color:rgba(255,255,255,0.5);margin-bottom:4px">' + d.geography.split(',')[0].trim() + '</div>' : '') +
    (themes.length ? '<div style="font-size:10px;color:rgba(255,255,255,0.4);margin-top:4px">' + themes.slice(0, 3).join(', ') + '</div>' : '') +
    (d.match_score ? '<div style="font-size:10px;color:#818cf8;margin-top:4px">Match score: ' + Math.round((d.match_score || 0) * 100) + '%</div>' : '');

  tip.style.display = 'block';
  tip.style.left = (event.pageX + 12) + 'px';
  tip.style.top = (event.pageY - 10) + 'px';
}

function hideTooltip() {
  document.getElementById('nodeTooltip').style.display = 'none';
}

// ─── Stats ───────────────────────────────────────────────
function updateStats() {
  document.getElementById('statMyCount').textContent = state.data.myNodes.length;
  var g = state.data.globalStats;
  if (g) {
    document.getElementById('statGlobalCount').textContent = (g.total_canisters || 0).toLocaleString();
    if (g.added_today > 0) {
      document.getElementById('statToday').textContent = '+' + g.added_today + ' today';
    }
  }
}

// ─── Filters ─────────────────────────────────────────────
function populateFilters(communities) {
  var sel = document.getElementById('filterCommunity');
  communities.forEach(function(c) {
    var opt = document.createElement('option');
    opt.value = c.id;
    opt.textContent = c.name;
    sel.appendChild(opt);
  });
}

// ─── Render dispatcher ───────────────────────────────────
function render() {
  if (state.mode === 'graph') {
    document.getElementById('graph-canvas').style.display = 'block';
    document.getElementById('map-canvas').style.display = 'none';
    renderGraph();
  } else {
    renderMap();
  }
}

// ─── Controls ────────────────────────────────────────────
document.querySelectorAll('.mode-btn').forEach(function(btn) {
  btn.addEventListener('click', function() {
    document.querySelectorAll('.mode-btn').forEach(function(b) { b.classList.remove('active'); });
    btn.classList.add('active');
    state.mode = btn.dataset.mode;
    render();
  });
});

document.querySelectorAll('.layer-btn').forEach(function(btn) {
  btn.addEventListener('click', function() {
    btn.classList.toggle('active');
    state.layers[btn.dataset.layer] = btn.classList.contains('active');
    render();
  });
});

document.getElementById('filterToggle').addEventListener('click', function() {
  document.getElementById('filterPanel').classList.toggle('open');
});

document.querySelectorAll('.filter-chips').forEach(function(group) {
  group.addEventListener('click', function(e) {
    var chip = e.target.closest('.filter-chip');
    if (!chip) return;
    group.querySelectorAll('.filter-chip').forEach(function(c) { c.classList.remove('active'); });
    chip.classList.add('active');
    if (group.id === 'filterStakeholder') state.filters.stakeholder = chip.dataset.value;
    render();
  });
});

document.getElementById('filterCommunity').addEventListener('change', function(e) {
  state.filters.community = e.target.value;
  render();
});

window.addEventListener('resize', function() {
  if (state.mode === 'graph') renderGraph();
  else if (leafletMap) leafletMap.invalidateSize();
});

// ─── Init ────────────────────────────────────────────────
loadData();
</script>
</body>
</html>
