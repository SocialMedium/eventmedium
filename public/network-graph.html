<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Network Intelligence — EventMedium</title>
<script src="https://unpkg.com/lucide@latest"></script>
<link rel="icon" type="image/png" href="/images/em-logo.png">
<style>
:root {
  --p:#0066ff;--pL:#e8f0fe;--pD:#0052cc;--s:#6c63ff;--ok:#00d084;
  --okL:#e6faf2;--warn:#f59e0b;--bg:#f8f9fd;--card:#ffffff;
  --txt:#1a1d29;--txtL:#6b7280;--txtXL:#9ca3af;--bdr:#e5e7eb;
  --shadow:0 1px 3px rgba(0,0,0,0.06);--shadowL:0 10px 25px rgba(0,0,0,0.08);
  --font:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font);color:var(--txt);background:var(--bg);-webkit-font-smoothing:antialiased}

/* Nav */
.nav{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(255,255,255,0.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--bdr);padding:0 24px}
.nav-inner{max-width:1140px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:64px}
.nav-brand{display:flex;align-items:center;gap:10px;text-decoration:none;color:var(--txt)}
.nav-name{font-weight:800;font-size:1.15rem;letter-spacing:-0.3px}
.nav-links{display:flex;align-items:center;gap:8px}
.nav-link{padding:8px 16px;color:var(--txtL);text-decoration:none;font-size:14px;font-weight:500;border-radius:8px;transition:all 0.2s}
.nav-link:hover{color:var(--txt);background:var(--card)}
.nav-link.active{color:var(--p);font-weight:600}
.nav-cta{padding:8px 20px;background:var(--p);color:white;font-size:14px;font-weight:600;border-radius:8px;text-decoration:none;transition:all 0.2s}
.nav-cta:hover{background:var(--pD)}

/* Page */
.page{max-width:1140px;margin:0 auto;padding:88px 24px 60px}

/* Page header */
.page-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px;flex-wrap:wrap;gap:16px}
.page-top h1{font-size:28px;font-weight:700}
.page-controls{display:flex;gap:10px;align-items:center}
.ctrl-select{padding:9px 14px;border:1px solid var(--bdr);border-radius:10px;font-size:13px;font-family:var(--font);background:var(--card);color:var(--txt);cursor:pointer;transition:border 0.2s}
.ctrl-select:focus{outline:none;border-color:var(--p);box-shadow:0 0 0 3px var(--pL)}

/* Headline stats */
.headline-stats{display:flex;gap:24px;align-items:center;padding:18px 24px;background:var(--card);border:1px solid var(--bdr);border-radius:14px;margin-bottom:28px;flex-wrap:wrap}
.hl-stat{display:flex;align-items:baseline;gap:6px}
.hl-num{font-size:26px;font-weight:800;color:var(--txt)}
.hl-label{font-size:13px;color:var(--txtL);font-weight:500;text-transform:uppercase;letter-spacing:0.3px}
.hl-dot{width:4px;height:4px;border-radius:50%;background:var(--bdr);flex-shrink:0}

/* Section cards */
.section-card{background:var(--card);border:1px solid var(--bdr);border-radius:16px;padding:24px;margin-bottom:24px;transition:all 0.3s}
.section-card:hover{box-shadow:var(--shadowL)}
.section-title{font-size:15px;font-weight:700;margin-bottom:18px;display:flex;align-items:center;gap:8px;color:var(--txt)}
.section-title i{width:18px;height:18px;color:var(--p)}

/* Two-col grid */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-bottom:24px}

/* Horizontal bar chart */
.bar-list{display:flex;flex-direction:column;gap:10px}
.bar-row{display:flex;align-items:center;gap:12px}
.bar-label{width:120px;font-size:13px;font-weight:500;color:var(--txt);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex-shrink:0}
.bar-track{flex:1;height:22px;background:var(--bg);border-radius:6px;overflow:hidden;position:relative}
.bar-fill{height:100%;border-radius:6px;transition:width 0.5s ease;min-width:2px}
.bar-count{font-size:12px;font-weight:600;color:var(--txtL);width:36px;text-align:right;flex-shrink:0}
.bar-row .bar-fill.theme-fill{background:var(--pL);border:1px solid rgba(0,102,255,0.15)}
.bar-row .bar-fill.stakeholder-fill{border:1px solid rgba(0,0,0,0.06)}
.show-more-btn{margin-top:10px;padding:6px 14px;background:var(--bg);border:1px solid var(--bdr);border-radius:8px;font-size:12px;font-weight:600;color:var(--txtL);cursor:pointer;font-family:var(--font);transition:all 0.2s}
.show-more-btn:hover{border-color:var(--p);color:var(--p);background:var(--pL)}

/* Geo grid */
.geo-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:16px}
.geo-card{background:var(--bg);border:1px solid var(--bdr);border-radius:12px;padding:18px;transition:all 0.2s}
.geo-card:hover{border-color:var(--p);box-shadow:var(--shadow)}
.geo-city{font-size:15px;font-weight:700;margin-bottom:6px}
.geo-meta{font-size:12px;color:var(--txtL);margin-bottom:8px;display:flex;gap:12px}
.geo-themes{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px}
.theme-chip{padding:2px 8px;background:var(--pL);color:var(--p);font-size:10px;font-weight:600;border-radius:5px;white-space:nowrap}
.geo-archetypes{font-size:11px;color:var(--txtXL);font-weight:500}
.archetype-tag{font-weight:600;margin-right:4px}

/* Stakeholder type colors */
.st-founder{color:#6366f1}
.st-investor{color:#10b981}
.st-researcher{color:#3b82f6}
.st-corporate{color:#ec4899}
.st-advisor{color:#f59e0b}
.st-operator{color:#8b5cf6}

/* Stakeholder bar fills */
.sf-founder{background:rgba(99,102,241,0.15)}
.sf-investor{background:rgba(16,185,129,0.15)}
.sf-researcher{background:rgba(59,130,246,0.15)}
.sf-corporate{background:rgba(236,72,153,0.15)}
.sf-advisor{background:rgba(245,158,11,0.15)}
.sf-operator{background:rgba(139,92,246,0.15)}

/* Events list */
.event-row{display:flex;align-items:center;gap:16px;padding:12px 16px;border-radius:10px;transition:background 0.15s}
.event-row:hover{background:var(--bg)}
.event-row+.event-row{border-top:1px solid var(--bdr)}
.ev-date{width:60px;font-size:13px;font-weight:600;color:var(--p);flex-shrink:0;white-space:nowrap}
.ev-name{flex:1;font-size:14px;font-weight:600;color:var(--txt);min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ev-city{font-size:13px;color:var(--txtL);width:100px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ev-themes{display:flex;gap:5px;flex-shrink:0;flex-wrap:nowrap;overflow:hidden;max-width:200px}
.ev-reg{font-size:12px;color:var(--txtXL);width:60px;text-align:right;flex-shrink:0;white-space:nowrap}

/* Skeletons */
.skeleton{animation:pulse 1.5s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
.skel-line{height:14px;background:var(--bdr);border-radius:6px;margin-bottom:10px}
.skel-line.w60{width:60%}
.skel-line.w80{width:80%}
.skel-line.w40{width:40%}
.skel-bar{height:22px;background:var(--bdr);border-radius:6px;margin-bottom:10px}
.skel-card{background:var(--bdr);border-radius:12px;height:140px}

/* Empty state */
.empty-msg{text-align:center;padding:40px 24px;color:var(--txtL);font-size:14px}

@media(max-width:768px){
  .nav-links .nav-link{display:none}
  .page{padding:80px 16px 40px}
  .two-col{grid-template-columns:1fr}
  .geo-grid{grid-template-columns:1fr}
  .page-top{flex-direction:column;align-items:flex-start}
  .headline-stats{flex-direction:column;gap:12px;align-items:flex-start}
  .hl-dot{display:none}
  .ev-themes{display:none}
  .ev-city{width:80px}
  .bar-label{width:90px}
}
</style>
</head>
<body>

<nav class="nav">
  <div class="nav-inner">
    <a href="/" class="nav-brand">
      <img src="/images/em-logo.png" alt="Event Medium" style="width:36px;height:36px;border-radius:8px;display:block;">
      <span class="nav-name">Event <span style="color:var(--p)">Medium</span></span>
    </a>
    <div class="nav-links">
      <a href="/events.html" class="nav-link">Events</a>
      <a href="/matches.html" class="nav-link" id="nav-matches">Matches</a>
      <a href="/inbox.html" class="nav-link" id="nav-inbox">Inbox</a>
      <a href="/network-graph.html" class="nav-link active">Network</a>
      <a href="/canister.html" class="nav-link" id="nav-canister">My Canister</a>
      <a href="/auth.html" class="nav-cta" id="nav-cta">Sign in</a>
    </div>
  </div>
</nav>

<div class="page">
  <!-- Header -->
  <div class="page-top">
    <h1>Network Intelligence</h1>
    <div class="page-controls">
      <select class="ctrl-select" id="scopeToggle">
        <option value="global">Global</option>
        <option value="community">Community</option>
      </select>
      <select class="ctrl-select" id="communitySelect" style="display:none">
        <option value="">All Communities</option>
      </select>
    </div>
  </div>

  <!-- Headline stats -->
  <div class="headline-stats" id="headlineStats">
    <div class="skeleton">
      <div class="skel-line w60" style="height:26px;width:500px;max-width:100%"></div>
    </div>
  </div>

  <!-- Thematic + Stakeholder (two-col) -->
  <div class="two-col">
    <div class="section-card" id="thematicCard">
      <div class="section-title"><i data-lucide="tag"></i> Thematic Composition</div>
      <div id="thematicBars" class="bar-list">
        <div class="skeleton"><div class="skel-bar w80"></div><div class="skel-bar w60"></div><div class="skel-bar w40"></div><div class="skel-bar" style="width:30%"></div></div>
      </div>
    </div>
    <div class="section-card" id="stakeholderCard">
      <div class="section-title"><i data-lucide="users"></i> Stakeholder Mix</div>
      <div id="stakeholderBars" class="bar-list">
        <div class="skeleton"><div class="skel-bar w80"></div><div class="skel-bar w60"></div><div class="skel-bar w40"></div><div class="skel-bar" style="width:30%"></div></div>
      </div>
    </div>
  </div>

  <!-- Geographic Distribution -->
  <div class="section-card" id="geoSection">
    <div class="section-title"><i data-lucide="map-pin"></i> Geographic Distribution</div>
    <div id="geoGrid" class="geo-grid">
      <div class="skeleton" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:16px">
        <div class="skel-card"></div><div class="skel-card"></div><div class="skel-card"></div><div class="skel-card"></div>
      </div>
    </div>
  </div>

  <!-- Upcoming Events -->
  <div class="section-card" id="eventsSection">
    <div class="section-title"><i data-lucide="calendar"></i> Upcoming Events by Theme</div>
    <div id="eventsList">
      <div class="skeleton"><div class="skel-bar w80"></div><div class="skel-bar w60"></div><div class="skel-bar w80"></div><div class="skel-bar w60"></div></div>
    </div>
  </div>
</div>

<script>
// ── State ──────────────────────────────────────────
var graphData = null;
var communitiesData = null;
var currentScope = 'global';
var currentCommunityId = '';

var STAKEHOLDER_COLORS = {
  founder:'#6366f1', investor:'#10b981', researcher:'#3b82f6',
  corporate:'#ec4899', advisor:'#f59e0b', operator:'#8b5cf6'
};
var STAKEHOLDER_ABBR = {
  founder:'F', investor:'I', researcher:'R',
  corporate:'C', advisor:'A', operator:'O'
};
var STAKEHOLDER_FILL_CLASS = {
  founder:'sf-founder', investor:'sf-investor', researcher:'sf-researcher',
  corporate:'sf-corporate', advisor:'sf-advisor', operator:'sf-operator'
};

// ── Data loading ───────────────────────────────────
async function loadData() {
  var token = localStorage.getItem('auth_token');
  var headers = token ? { 'Authorization': 'Bearer ' + token } : {};

  try {
    var results = await Promise.all([
      fetch('/api/network/graph').then(function(r) { return r.ok ? r.json() : null; }).catch(function() { return null; }),
      token ? fetch('/api/network/communities', { headers: headers }).then(function(r) { return r.ok ? r.json() : null; }).catch(function() { return null; }) : Promise.resolve(null)
    ]);

    graphData = results[0];
    communitiesData = results[1];

    if (communitiesData && communitiesData.communities) {
      populateCommunities(communitiesData.communities);
    }

    renderAll();
  } catch (err) {
    console.error('Failed to load network data:', err);
  }
}

function populateCommunities(communities) {
  var sel = document.getElementById('communitySelect');
  communities.forEach(function(c) {
    var opt = document.createElement('option');
    opt.value = c.id;
    opt.textContent = c.name;
    sel.appendChild(opt);
  });
}

// ── Filtering ──────────────────────────────────────
function getFilteredMembers() {
  if (!graphData) return [];
  var members = graphData.members || [];
  if (currentScope === 'community' && communitiesData && communitiesData.nodes) {
    var communityNodeIds = {};
    var nodes = communitiesData.nodes || [];
    nodes.forEach(function(n) {
      if (!currentCommunityId || String(n.community_id) === currentCommunityId) {
        communityNodeIds[n.id] = true;
      }
    });
    members = members.filter(function(m) { return communityNodeIds[m.id]; });
  }
  return members;
}

function getFilteredEvents() {
  if (!graphData) return [];
  return graphData.events || [];
}

function getFilteredGeoClusters() {
  if (!graphData) return [];
  return graphData.geo_clusters || [];
}

// ── Render all sections ────────────────────────────
function renderAll() {
  renderHeadline();
  renderThematic();
  renderStakeholder();
  renderGeo();
  renderEvents();
  if (typeof lucide !== 'undefined') lucide.createIcons();
}

// ── Headline stats ─────────────────────────────────
function renderHeadline() {
  var el = document.getElementById('headlineStats');
  if (!graphData) { el.innerHTML = '<span class="empty-msg">No data available</span>'; return; }

  var members = getFilteredMembers();
  var events = getFilteredEvents();
  var geo = getFilteredGeoClusters();
  var meta = graphData.meta || {};

  var memberCount = currentScope === 'global' ? (meta.total_members || members.length) : members.length;
  var eventCount = currentScope === 'global' ? (meta.total_events || events.length) : events.length;
  var cityCount = geo.length;

  var commCount = 0;
  if (communitiesData && communitiesData.communities) {
    commCount = communitiesData.communities.length;
  }

  el.innerHTML =
    '<div class="hl-stat"><span class="hl-num">' + memberCount + '</span><span class="hl-label">Members</span></div>' +
    '<div class="hl-dot"></div>' +
    '<div class="hl-stat"><span class="hl-num">' + eventCount + '</span><span class="hl-label">Events</span></div>' +
    '<div class="hl-dot"></div>' +
    '<div class="hl-stat"><span class="hl-num">' + cityCount + '</span><span class="hl-label">Cities</span></div>' +
    (commCount > 0 ? '<div class="hl-dot"></div><div class="hl-stat"><span class="hl-num">' + commCount + '</span><span class="hl-label">Communities</span></div>' : '');
}

// ── Thematic composition ───────────────────────────
function renderThematic() {
  var container = document.getElementById('thematicBars');
  var members = getFilteredMembers();

  // Count themes
  var themeCounts = {};
  members.forEach(function(m) {
    var themes = m.themes || [];
    if (typeof themes === 'string') { try { themes = JSON.parse(themes); } catch(e) { themes = []; } }
    themes.forEach(function(t) {
      var name = (typeof t === 'string' ? t : (t.theme || t.name || '')).trim();
      if (name) themeCounts[name] = (themeCounts[name] || 0) + 1;
    });
  });

  var sorted = Object.keys(themeCounts).map(function(k) { return { name: k, count: themeCounts[k] }; });
  sorted.sort(function(a, b) { return b.count - a.count; });

  if (sorted.length === 0) {
    container.innerHTML = '<div class="empty-msg">No theme data available</div>';
    return;
  }

  var max = sorted[0].count;
  var showCount = 8;
  var html = '';

  sorted.slice(0, showCount).forEach(function(item) {
    var pct = Math.round((item.count / max) * 100);
    html += '<div class="bar-row">' +
      '<span class="bar-label" title="' + item.name + '">' + item.name + '</span>' +
      '<div class="bar-track"><div class="bar-fill theme-fill" style="width:' + pct + '%"></div></div>' +
      '<span class="bar-count">' + item.count + '</span>' +
    '</div>';
  });

  if (sorted.length > showCount) {
    html += '<button class="show-more-btn" onclick="toggleThemes(this)">Show ' + (sorted.length - showCount) + ' more</button>';
    html += '<div class="bar-list extra-themes" style="display:none;margin-top:10px">';
    sorted.slice(showCount).forEach(function(item) {
      var pct = Math.round((item.count / max) * 100);
      html += '<div class="bar-row">' +
        '<span class="bar-label" title="' + item.name + '">' + item.name + '</span>' +
        '<div class="bar-track"><div class="bar-fill theme-fill" style="width:' + pct + '%"></div></div>' +
        '<span class="bar-count">' + item.count + '</span>' +
      '</div>';
    });
    html += '</div>';
  }

  container.innerHTML = html;
}

function toggleThemes(btn) {
  var extra = btn.nextElementSibling;
  if (extra.style.display === 'none') {
    extra.style.display = 'flex';
    btn.textContent = 'Show less';
  } else {
    extra.style.display = 'none';
    btn.textContent = btn.textContent;
    var count = extra.querySelectorAll('.bar-row').length;
    btn.textContent = 'Show ' + count + ' more';
  }
}

// ── Stakeholder mix ────────────────────────────────
function renderStakeholder() {
  var container = document.getElementById('stakeholderBars');
  var members = getFilteredMembers();

  var typeCounts = {};
  members.forEach(function(m) {
    var t = (m.stakeholder_type || 'unknown').toLowerCase();
    typeCounts[t] = (typeCounts[t] || 0) + 1;
  });

  var sorted = Object.keys(typeCounts).map(function(k) { return { name: k, count: typeCounts[k] }; });
  sorted.sort(function(a, b) { return b.count - a.count; });

  if (sorted.length === 0) {
    container.innerHTML = '<div class="empty-msg">No stakeholder data available</div>';
    return;
  }

  var max = sorted[0].count;
  var html = '';

  sorted.forEach(function(item) {
    var pct = Math.round((item.count / max) * 100);
    var displayName = item.name.charAt(0).toUpperCase() + item.name.slice(1) + 's';
    var fillClass = STAKEHOLDER_FILL_CLASS[item.name] || '';
    var color = STAKEHOLDER_COLORS[item.name] || '#94a3b8';
    html += '<div class="bar-row">' +
      '<span class="bar-label" style="color:' + color + '">' + displayName + '</span>' +
      '<div class="bar-track"><div class="bar-fill stakeholder-fill ' + fillClass + '" style="width:' + pct + '%"></div></div>' +
      '<span class="bar-count">' + item.count + '</span>' +
    '</div>';
  });

  container.innerHTML = html;
}

// ── Geographic distribution ────────────────────────
function renderGeo() {
  var container = document.getElementById('geoGrid');
  var clusters = getFilteredGeoClusters();

  // Sort by member_count descending
  clusters.sort(function(a, b) { return (b.member_count || 0) - (a.member_count || 0); });

  if (clusters.length === 0) {
    container.innerHTML = '<div class="empty-msg">No geographic data available</div>';
    return;
  }

  var html = '';
  clusters.slice(0, 12).forEach(function(c) {
    var themes = c.top_themes || [];
    var themeChips = themes.slice(0, 3).map(function(t) {
      var name = typeof t === 'string' ? t : (t.theme || t.name || '');
      return '<span class="theme-chip">' + escapeHtml(name) + '</span>';
    }).join('');

    var archetypes = c.archetype_breakdown || [];
    var archetypeStr = archetypes.map(function(a) {
      var type = (a.type || '').toLowerCase();
      var abbr = STAKEHOLDER_ABBR[type] || type.charAt(0).toUpperCase();
      var cls = 'st-' + type;
      return '<span class="archetype-tag ' + cls + '">' + (a.count || 0) + abbr + '</span>';
    }).join(' ');

    html += '<div class="geo-card">' +
      '<div class="geo-city">' + escapeHtml(c.city || 'Unknown') + '</div>' +
      '<div class="geo-meta">' +
        '<span>' + (c.member_count || 0) + ' members</span>' +
        '<span>' + (c.event_count || 0) + ' events</span>' +
      '</div>' +
      (themeChips ? '<div class="geo-themes">' + themeChips + '</div>' : '') +
      (archetypeStr ? '<div class="geo-archetypes">' + archetypeStr + '</div>' : '') +
    '</div>';
  });

  container.innerHTML = html;
}

// ── Upcoming events ────────────────────────────────
function renderEvents() {
  var container = document.getElementById('eventsList');
  var events = getFilteredEvents();

  // Filter to future events and sort by date
  var now = new Date();
  var upcoming = events.filter(function(e) {
    if (!e.event_date) return false;
    return new Date(e.event_date) >= now;
  });
  upcoming.sort(function(a, b) { return new Date(a.event_date) - new Date(b.event_date); });

  if (upcoming.length === 0) {
    container.innerHTML = '<div class="empty-msg">No upcoming events</div>';
    return;
  }

  var html = '';
  upcoming.slice(0, 10).forEach(function(e) {
    var d = new Date(e.event_date);
    var dateStr = d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });

    var themes = e.themes || [];
    if (typeof themes === 'string') { try { themes = JSON.parse(themes); } catch(ex) { themes = []; } }
    var themeChips = themes.slice(0, 3).map(function(t) {
      var name = typeof t === 'string' ? t : (t.theme || t.name || '');
      return '<span class="theme-chip">' + escapeHtml(name) + '</span>';
    }).join('');

    var location = '';
    if (e.city) location = escapeHtml(e.city);
    if (e.country && !e.city) location = escapeHtml(e.country);

    var regCount = e.registered_count || 0;

    html += '<div class="event-row">' +
      '<span class="ev-date">' + dateStr + '</span>' +
      '<span class="ev-name" title="' + escapeHtml(e.name || '') + '">' + escapeHtml(e.name || 'Untitled') + '</span>' +
      '<span class="ev-city">' + location + '</span>' +
      '<span class="ev-themes">' + themeChips + '</span>' +
      '<span class="ev-reg">' + regCount + ' reg</span>' +
    '</div>';
  });

  container.innerHTML = html;
}

// ── Helpers ────────────────────────────────────────
function escapeHtml(str) {
  var div = document.createElement('div');
  div.appendChild(document.createTextNode(str));
  return div.innerHTML;
}

// ── Controls ───────────────────────────────────────
document.getElementById('scopeToggle').addEventListener('change', function() {
  currentScope = this.value;
  var commSelect = document.getElementById('communitySelect');
  commSelect.style.display = currentScope === 'community' ? '' : 'none';
  renderAll();
});

document.getElementById('communitySelect').addEventListener('change', function() {
  currentCommunityId = this.value;
  renderAll();
});

// ── Init ───────────────────────────────────────────
loadData();
</script>
