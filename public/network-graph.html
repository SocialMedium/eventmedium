<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Network Intelligence — EventMedium</title>
<script src="https://unpkg.com/lucide@latest"></script>
<link rel="icon" type="image/png" href="/images/em-logo.png">
<style>
:root {
  --p:#0066ff;--pL:#e8f0fe;--pD:#0052cc;--s:#6c63ff;--ok:#00d084;
  --okL:#e6faf2;--warn:#f59e0b;--bg:#f8f9fd;--card:#ffffff;
  --txt:#1a1d29;--txtL:#6b7280;--txtXL:#9ca3af;--bdr:#e5e7eb;
  --shadow:0 1px 3px rgba(0,0,0,0.06);--shadowL:0 10px 25px rgba(0,0,0,0.08);
  --font:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font);color:var(--txt);background:var(--bg);-webkit-font-smoothing:antialiased;overflow-x:hidden}

/* Nav */
.nav{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(255,255,255,0.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--bdr);padding:0 24px}
.nav-inner{max-width:1140px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:64px}
.nav-brand{display:flex;align-items:center;gap:10px;text-decoration:none;color:var(--txt)}
.nav-name{font-weight:800;font-size:1.15rem;letter-spacing:-0.3px}
.nav-links{display:flex;align-items:center;gap:8px}
.nav-link{padding:8px 16px;color:var(--txtL);text-decoration:none;font-size:14px;font-weight:500;border-radius:8px;transition:all 0.2s}
.nav-link:hover{color:var(--txt);background:var(--card)}
.nav-link.active{color:var(--p);font-weight:600}
.nav-cta{padding:8px 20px;background:var(--p);color:white;font-size:14px;font-weight:600;border-radius:8px;text-decoration:none;transition:all 0.2s}
.nav-cta:hover{background:var(--pD)}

/* Page canvas */
.page{max-width:1140px;margin:0 auto;padding:88px 24px 60px;opacity:0;transition:opacity 0.6s ease}
.page.loaded{opacity:1}

/* Page header */
.page-top{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:32px;flex-wrap:wrap;gap:16px}
.page-title{font-size:26px;font-weight:700;letter-spacing:-0.5px;color:var(--txt)}
.page-meta{font-size:13px;color:var(--txtL);font-weight:500;display:flex;align-items:center;gap:8px}
.page-meta .dot{width:3px;height:3px;border-radius:50%;background:var(--txtXL);display:inline-block}
.page-controls{display:flex;gap:10px;align-items:center}
.ctrl-select{padding:9px 14px;border:1px solid var(--bdr);border-radius:10px;font-size:13px;font-family:var(--font);background:var(--card);color:var(--txt);cursor:pointer;transition:border 0.2s}
.ctrl-select:focus{outline:none;border-color:var(--p);box-shadow:0 0 0 3px var(--pL)}

/* Filter pills */
.filter-bar{display:flex;gap:8px;align-items:center;margin-bottom:24px;min-height:32px;flex-wrap:wrap}
.filter-pill{display:inline-flex;align-items:center;gap:6px;padding:5px 14px;background:var(--p);color:white;font-size:12px;font-weight:600;border-radius:20px;animation:fadeIn 0.2s ease}
.filter-pill button{background:none;border:none;color:rgba(255,255,255,0.8);cursor:pointer;font-size:14px;line-height:1;padding:0;margin-left:2px}
.filter-pill button:hover{color:white}
@keyframes fadeIn{from{opacity:0;transform:scale(0.9)}to{opacity:1;transform:scale(1)}}

/* Map section */
.map-wrap{background:var(--card);border:1px solid var(--bdr);border-radius:16px;padding:24px 24px 20px;margin-bottom:28px;overflow:hidden;position:relative}
.map-wrap svg{width:100%;height:auto;display:block}
.map-label{position:absolute;top:20px;left:24px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;color:var(--txtXL)}

/* City bubbles */
.city-bubble{cursor:pointer;transition:all 0.3s ease}
.city-bubble circle{transition:all 0.3s ease}
.city-bubble:hover circle{filter:brightness(1.1)}
.city-bubble.dimmed circle{opacity:0.15}
.city-bubble.dimmed text{opacity:0.2}
.city-label{font-size:9px;font-weight:600;fill:var(--txt);pointer-events:none;text-anchor:middle}

/* Pulse animation */
@keyframes pulse-ring{0%{r:0;opacity:0.5}100%{r:20;opacity:0}}
.pulse-ring{fill:none;stroke-width:1.5;animation:pulse-ring 2.5s ease-out infinite}

/* Corridor arcs */
.corridor-arc{fill:none;stroke-width:1;opacity:0.2;transition:opacity 0.3s}
.corridor-arc.highlighted{opacity:0.5;stroke-width:1.5}
.corridor-arc.dimmed{opacity:0.04}

/* Tooltip */
.tooltip{position:fixed;z-index:200;background:rgba(26,29,41,0.92);backdrop-filter:blur(8px);color:white;padding:12px 16px;border-radius:10px;font-size:12px;pointer-events:none;opacity:0;transition:opacity 0.15s;max-width:220px;line-height:1.5}
.tooltip.visible{opacity:1}
.tooltip strong{font-weight:700;font-size:13px;display:block;margin-bottom:4px}
.tooltip .tt-row{display:flex;justify-content:space-between;gap:12px;color:rgba(255,255,255,0.7)}
.tooltip .tt-row span:last-child{font-weight:600;color:white}
.tooltip .tt-themes{display:flex;gap:4px;flex-wrap:wrap;margin-top:6px}
.tooltip .tt-chip{padding:2px 7px;border-radius:4px;font-size:10px;font-weight:600}

/* Theme bubbles section */
.bubbles-wrap{background:var(--card);border:1px solid var(--bdr);border-radius:16px;padding:24px;margin-bottom:28px;position:relative}
.bubbles-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;color:var(--txtXL);margin-bottom:16px}
.bubbles-svg{width:100%;display:block}
.theme-bubble{cursor:pointer;transition:all 0.3s ease}
.theme-bubble circle{transition:all 0.3s ease}
.theme-bubble:hover circle{filter:brightness(0.92)}
.theme-bubble.active circle{stroke-width:3;stroke:var(--txt)}
.theme-bubble.dimmed circle{opacity:0.15}
.theme-bubble.dimmed text{opacity:0.15}
.theme-bubble-label{font-weight:600;pointer-events:none;fill:white;text-anchor:middle}
.theme-bubble-count{font-weight:700;pointer-events:none;fill:rgba(255,255,255,0.8);text-anchor:middle}

/* Bottom row */
.bottom-row{display:grid;grid-template-columns:300px 1fr;gap:24px;margin-bottom:28px}

/* Stakeholder donut */
.donut-wrap{background:var(--card);border:1px solid var(--bdr);border-radius:16px;padding:24px;display:flex;flex-direction:column}
.donut-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;color:var(--txtXL);margin-bottom:16px}
.donut-svg-wrap{flex:1;display:flex;align-items:center;justify-content:center;position:relative}
.donut-svg{display:block}
.donut-center-text{font-size:28px;font-weight:800;fill:var(--txt);text-anchor:middle;dominant-baseline:central}
.donut-center-sub{font-size:10px;font-weight:600;fill:var(--txtXL);text-anchor:middle;text-transform:uppercase;letter-spacing:0.5px}
.donut-legend{display:flex;flex-wrap:wrap;gap:8px 14px;margin-top:16px}
.donut-legend-item{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:500;color:var(--txtL);cursor:pointer;transition:opacity 0.2s}
.donut-legend-item:hover{opacity:0.7}
.donut-legend-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.donut-legend-count{font-weight:700;color:var(--txt)}

/* Donut segment hover */
.donut-segment{transition:opacity 0.3s;cursor:pointer}
.donut-segment:hover{opacity:0.8}

/* Events timeline */
.events-wrap{background:var(--card);border:1px solid var(--bdr);border-radius:16px;padding:24px;display:flex;flex-direction:column}
.events-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;color:var(--txtXL);margin-bottom:16px}
.events-list{display:flex;flex-direction:column;gap:0;flex:1;overflow-y:auto;max-height:380px}
.ev-row{display:flex;align-items:center;gap:14px;padding:10px 12px;border-radius:10px;transition:background 0.15s;border-left:3px solid transparent}
.ev-row:hover{background:var(--bg)}
.ev-row.has-regs{border-left-color:var(--ok)}
.ev-row+.ev-row{border-top:1px solid rgba(0,0,0,0.04)}
.ev-date{width:52px;font-size:12px;font-weight:700;color:var(--p);flex-shrink:0;white-space:nowrap;letter-spacing:-0.2px}
.ev-name{flex:1;font-size:13px;font-weight:600;color:var(--txt);min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ev-city{font-size:12px;color:var(--txtL);width:80px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ev-themes{display:flex;gap:4px;flex-shrink:0;flex-wrap:nowrap;overflow:hidden;max-width:160px}
.ev-reg{font-size:11px;color:var(--txtXL);width:40px;text-align:right;flex-shrink:0;white-space:nowrap;font-weight:500}
.theme-chip{padding:2px 7px;border-radius:5px;font-size:10px;font-weight:600;white-space:nowrap}

/* Responsive */
@media(max-width:768px){
  .nav-links .nav-link{display:none}
  .page{padding:80px 16px 40px}
  .bottom-row{grid-template-columns:1fr}
  .page-top{flex-direction:column;align-items:flex-start}
  .ev-themes{display:none}
  .ev-city{width:60px}
}
</style>
</head>

  <!-- Theme Bubbles -->

  <!-- Bottom row: Donut + Events -->

</div>

<script>
// ── Constants ──────────────────────────────────────
var THEME_COLORS = {
  'AI':'#6366f1','FinTech':'#10b981','Climate Tech':'#22c55e',
  'Cybersecurity':'#ef4444','HealthTech':'#ec4899','Robotics':'#8b5cf6',
  'SpaceTech':'#06b6d4','Gaming':'#f97316','EdTech':'#eab308',
  'Privacy':'#64748b','Enterprise SaaS':'#3b82f6','Open Source':'#14b8a6',
  'IoT':'#a855f7','Hardware':'#78716c','Regulation':'#6b7280',
  'Connectivity':'#0ea5e9'
};
var STAKEHOLDER_COLORS = {
  founder:'#6366f1',investor:'#10b981',researcher:'#3b82f6',
  corporate:'#ec4899',advisor:'#f59e0b',operator:'#8b5cf6'
};
var CITY_COORDS = {
  'Bangalore':{lat:12.97,lng:77.59},'New York':{lat:40.71,lng:-74.01},
  'Paris':{lat:48.86,lng:2.35},'Tel Aviv':{lat:32.08,lng:34.78},
  'London':{lat:51.51,lng:-0.13},'São Paulo':{lat:-23.55,lng:-46.63},
  'Seoul':{lat:37.57,lng:126.98},'Berlin':{lat:52.52,lng:13.40},
  'Dubai':{lat:25.20,lng:55.27},'Sydney':{lat:-33.87,lng:151.21},
  'Singapore':{lat:1.35,lng:103.82},'San Francisco':{lat:37.77,lng:-122.42},
  'Tokyo':{lat:35.68,lng:139.69},'Amsterdam':{lat:52.37,lng:4.90},
  'Las Vegas':{lat:36.17,lng:-115.14},'Austin':{lat:30.27,lng:-97.74},
  'Miami':{lat:25.76,lng:-80.19},'Munich':{lat:48.14,lng:11.58},
  'Barcelona':{lat:41.39,lng:2.17},'Helsinki':{lat:60.17,lng:24.94},
  'Lisbon':{lat:38.72,lng:-9.14},'Toronto':{lat:43.65,lng:-79.38},
  'Cannes':{lat:43.55,lng:7.02},'Boston':{lat:42.36,lng:-71.06},
  'San Diego':{lat:32.72,lng:-117.16},'San Jose':{lat:37.34,lng:-121.89},
  'Zurich':{lat:47.37,lng:8.54},'Hong Kong':{lat:22.32,lng:114.17},
  'Melbourne':{lat:-37.81,lng:144.96},'Vancouver':{lat:49.28,lng:-123.12},
  'Madrid':{lat:40.42,lng:-3.70},'Bangkok':{lat:13.76,lng:100.50},
  'New York City':{lat:40.71,lng:-74.01},'NY':{lat:40.71,lng:-74.01},
  'Salt Lake City':{lat:40.76,lng:-111.89},'Cologne':{lat:50.94,lng:6.96},
  'Glasgow':{lat:55.86,lng:-4.25},'Orlando':{lat:28.54,lng:-81.38},
  'Anaheim':{lat:33.84,lng:-117.91},'Antalya':{lat:36.90,lng:30.70},
  'Detroit':{lat:42.33,lng:-83.05},'Nuremberg':{lat:49.45,lng:11.08},
  'Rio de Janeiro':{lat:-22.91,lng:-43.17},'Kuala Lumpur':{lat:3.14,lng:101.69}
};

// ── State ──────────────────────────────────────────
var graphData = null;
var communitiesData = null;
var currentScope = 'global';
var currentCommunityId = '';
var activeThemeFilter = null;
var activeCityFilter = null;

// ── Helpers ────────────────────────────────────────
function escapeHtml(s){var d=document.createElement('div');d.appendChild(document.createTextNode(s));return d.innerHTML;}
function lngToX(lng){return (lng+180)*(960/360);}
function latToY(lat){return (90-lat)*(480/180);}
function themeColor(t){return THEME_COLORS[t]||'#94a3b8';}
function stakeholderColor(t){return STAKEHOLDER_COLORS[(t||'').toLowerCase()]||'#94a3b8';}

function cityKey(name){
  if(!name) return null;
  var n=name.trim();
  if(CITY_COORDS[n]) return n;
  // Try matching partial
  var keys=Object.keys(CITY_COORDS);
  for(var i=0;i<keys.length;i++){
    if(n.toLowerCase().indexOf(keys[i].toLowerCase())!==-1||keys[i].toLowerCase().indexOf(n.toLowerCase())!==-1) return keys[i];
  }
  return null;
}

// ── Tooltip ────────────────────────────────────────
var tooltipEl=document.getElementById('tooltip');
function showTooltip(html,e){
  tooltipEl.innerHTML=html;
  tooltipEl.classList.add('visible');
  positionTooltip(e);
}
function positionTooltip(e){
  var x=e.clientX+14,y=e.clientY-10;
  var w=tooltipEl.offsetWidth,h=tooltipEl.offsetHeight;
  if(x+w>window.innerWidth-16) x=e.clientX-w-14;
  if(y+h>window.innerHeight-16) y=e.clientY-h+10;
  tooltipEl.style.left=x+'px';tooltipEl.style.top=y+'px';
}
function hideTooltip(){tooltipEl.classList.remove('visible');}

// ── Data loading ───────────────────────────────────
async function loadData(){
  var token=localStorage.getItem('auth_token');
  var headers=token?{'Authorization':'Bearer '+token}:{};
  try{
    var results=await Promise.all([
      fetch('/api/network/graph').then(function(r){return r.ok?r.json():null;}).catch(function(){return null;}),
      token?fetch('/api/network/communities',{headers:headers}).then(function(r){return r.ok?r.json():null;}).catch(function(){return null;}):Promise.resolve(null)
    ]);
    graphData=results[0];
    communitiesData=results[1];
    if(communitiesData&&communitiesData.communities){
      populateCommunities(communitiesData.communities);
    }
    renderAll();
    document.getElementById('page').classList.add('loaded');
  }catch(err){console.error('Failed to load network data:',err);}
}

function populateCommunities(communities){
  var sel=document.getElementById('communitySelect');
  communities.forEach(function(c){
    var opt=document.createElement('option');
    opt.value=c.id;opt.textContent=c.name;sel.appendChild(opt);
  });
}

// ── Filtering ──────────────────────────────────────
function getFilteredMembers(){
  if(!graphData) return [];
  var members=graphData.members||[];
  if(currentScope==='community'&&communitiesData&&communitiesData.nodes){
    var ids={};
    (communitiesData.nodes||[]).forEach(function(n){
      if(!currentCommunityId||String(n.community_id)===currentCommunityId) ids[n.id]=true;
    });
    members=members.filter(function(m){return ids[m.id];});
  }
  return members;
}
function getFilteredEvents(){if(!graphData) return [];return graphData.events||[];}
function getFilteredGeoClusters(){if(!graphData) return [];return graphData.geo_clusters||[];}
function getFilteredCorridors(){if(!graphData) return [];return graphData.corridors||[];}

function parseThemes(t){
  if(!t) return [];
  if(typeof t==='string'){try{t=JSON.parse(t);}catch(e){return [];}}
  return t.map(function(x){return (typeof x==='string'?x:(x.theme||x.name||'')).trim();}).filter(Boolean);
}

// ── Compute theme counts from members ──────────────
function computeThemeCounts(members){
  var counts={};
  members.forEach(function(m){
    parseThemes(m.themes).forEach(function(t){counts[t]=(counts[t]||0)+1;});
  });
  return Object.keys(counts).map(function(k){return{name:k,count:counts[k]};})
    .sort(function(a,b){return b.count-a.count;});
}

// ── Compute stakeholder counts ─────────────────────
function computeStakeholderCounts(members){
  var counts={};
  members.forEach(function(m){
    var t=(m.stakeholder_type||'unknown').toLowerCase();
    counts[t]=(counts[t]||0)+1;
  });
  return Object.keys(counts).map(function(k){return{name:k,count:counts[k]};})
    .sort(function(a,b){return b.count-a.count;});
}

// ── Render all ─────────────────────────────────────
function renderAll(){
  renderMeta();
  renderFilters();
  renderMap();
  renderBubbles();
  renderDonut();
  renderEvents();
  if(typeof lucide!=='undefined') lucide.createIcons();
}

// ── Page meta ──────────────────────────────────────
function renderMeta(){
  var el=document.getElementById('pageMeta');
  if(!graphData){el.innerHTML='';return;}
  var members=getFilteredMembers();
  var events=getFilteredEvents();
  var meta=graphData.meta||{};
  var mc=currentScope==='global'?(meta.total_members||members.length):members.length;
  var ec=currentScope==='global'?(meta.total_events||events.length):events.length;
  el.innerHTML=mc+' members <span class="dot"></span> '+ec+' events';
}

// ── Filter bar ─────────────────────────────────────
function renderFilters(){
  var bar=document.getElementById('filterBar');
  var html='';
  if(activeThemeFilter){
    html+='<span class="filter-pill" style="background:'+themeColor(activeThemeFilter)+'">'+
      escapeHtml(activeThemeFilter)+
      '<button onclick="clearThemeFilter()">&times;</button></span>';
  }
  if(activeCityFilter){
    html+='<span class="filter-pill">'+escapeHtml(activeCityFilter)+
      '<button onclick="clearCityFilter()">&times;</button></span>';
  }
  bar.innerHTML=html;
}

function clearThemeFilter(){activeThemeFilter=null;renderAll();}
function clearCityFilter(){activeCityFilter=null;renderAll();}

// ── Map rendering ──────────────────────────────────
function renderMap(){
  var clusters=getFilteredGeoClusters();
  var corridors=getFilteredCorridors();
  var members=getFilteredMembers();

  // Build city data from clusters
  var cityData=[];
  clusters.forEach(function(c){
    var ck=cityKey(c.city);
    if(!ck||!CITY_COORDS[ck]) return;
    var coord=CITY_COORDS[ck];
    var themes=c.top_themes||[];
    var dominantTheme=themes.length>0?(typeof themes[0]==='string'?themes[0]:(themes[0].theme||themes[0].name||'')):'';
    cityData.push({
      city:c.city, key:ck,
      x:lngToX(coord.lng), y:latToY(coord.lat),
      memberCount:c.member_count||0, eventCount:c.event_count||0,
      dominantTheme:dominantTheme,
      themes:themes.map(function(t){return typeof t==='string'?t:(t.theme||t.name||'');}),
      archetypes:c.archetype_breakdown||[],
      matches:c.total_matches||0
    });
  });

  // Also add event cities that aren't in clusters
  var events=getFilteredEvents();
  var eventCityCounts={};
  events.forEach(function(e){
    var c=e.city;if(!c) return;
    var ck2=cityKey(c);if(!ck2) return;
    eventCityCounts[ck2]=(eventCityCounts[ck2]||0)+1;
  });
  var existingKeys={};
  cityData.forEach(function(d){existingKeys[d.key]=true;});
  Object.keys(eventCityCounts).forEach(function(ck){
    if(existingKeys[ck]) return;
    var coord=CITY_COORDS[ck];
    if(!coord) return;
    cityData.push({
      city:ck,key:ck,
      x:lngToX(coord.lng),y:latToY(coord.lat),
      memberCount:0,eventCount:eventCityCounts[ck],
      dominantTheme:'',themes:[],archetypes:[],matches:0
    });
  });

  // Mark cities with events for pulse
  var eventCityKeys={};
  events.forEach(function(e){
    var ck3=cityKey(e.city);if(ck3) eventCityKeys[ck3]=true;
  });

  // Radius scale
  var maxMembers=Math.max.apply(null,cityData.map(function(d){return d.memberCount;}).concat([1]));
  function radius(count){return Math.max(4,Math.sqrt(count/maxMembers)*22);}

  // Render corridors
  var corrLayer=document.getElementById('corridorsLayer');
  var corrHtml='';
  corridors.forEach(function(c){
    var fromKey=cityKey(c.from);
    var toKey=cityKey(c.to);
    if(!fromKey||!toKey||!CITY_COORDS[fromKey]||!CITY_COORDS[toKey]) return;
    var x1=lngToX(CITY_COORDS[fromKey].lng),y1=latToY(CITY_COORDS[fromKey].lat);
    var x2=lngToX(CITY_COORDS[toKey].lng),y2=latToY(CITY_COORDS[toKey].lat);
    var midX=(x1+x2)/2,midY=Math.min(y1,y2)-30-Math.abs(x2-x1)*0.08;
    var dimmed=false;
    if(activeCityFilter){
      dimmed=(fromKey!==cityKey(activeCityFilter)&&toKey!==cityKey(activeCityFilter));
    }
    if(activeThemeFilter) dimmed=true; // dim corridors when filtering by theme
    var cls='corridor-arc'+(dimmed?' dimmed':'');
    var strokeW=Math.max(0.8,Math.min(3,(c.match_count||1)*0.3));
    corrHtml+='<path class="'+cls+'" d="M'+x1+','+y1+' Q'+midX+','+midY+' '+x2+','+y2+'" stroke="url(#arcGrad)" stroke-width="'+strokeW+'"/>';
  });
  corrLayer.innerHTML=corrHtml;

  // Render cities
  var citiesLayer=document.getElementById('citiesLayer');
  var citiesHtml='';

  // Sort so smaller bubbles render on top
  cityData.sort(function(a,b){return b.memberCount-a.memberCount;});

  cityData.forEach(function(d){
    var r=radius(d.memberCount);
    var color=d.dominantTheme?themeColor(d.dominantTheme):'#94a3b8';
    var dimmed=false;
    if(activeCityFilter&&cityKey(activeCityFilter)!==d.key) dimmed=true;
    if(activeThemeFilter){
      var hasTheme=d.themes.indexOf(activeThemeFilter)!==-1;
      if(!hasTheme) dimmed=true;
    }
    var cls='city-bubble'+(dimmed?' dimmed':'');
    var hasEvents=eventCityKeys[d.key];

    citiesHtml+='<g class="'+cls+'" data-city="'+escapeHtml(d.city)+'" data-key="'+d.key+'">';
    // Pulse ring for event cities
    if(hasEvents&&!dimmed){
      citiesHtml+='<circle class="pulse-ring" cx="'+d.x+'" cy="'+d.y+'" r="'+r+'" stroke="'+color+'"/>';
    }
    // Glow
    if(!dimmed&&d.memberCount>3){
      citiesHtml+='<circle cx="'+d.x+'" cy="'+d.y+'" r="'+(r+6)+'" fill="'+color+'" opacity="0.08"/>';
    }
    // Main circle
    citiesHtml+='<circle cx="'+d.x+'" cy="'+d.y+'" r="'+r+'" fill="'+color+'" opacity="0.75"/>';
    // Label for larger cities
    if(r>7){
      citiesHtml+='<text class="city-label" x="'+d.x+'" y="'+(d.y+r+12)+'">'+escapeHtml(d.city)+'</text>';
    }
    citiesHtml+='</g>';
  });
  citiesLayer.innerHTML=citiesHtml;

  // Attach events
  document.querySelectorAll('.city-bubble').forEach(function(el){
    var cityName=el.getAttribute('data-city');
    var data=cityData.find(function(d){return d.city===cityName;});
    el.addEventListener('mouseenter',function(e){
      if(!data) return;
      var html='<strong>'+escapeHtml(data.city)+'</strong>';
      html+='<div class="tt-row"><span>Members</span><span>'+data.memberCount+'</span></div>';
      html+='<div class="tt-row"><span>Events</span><span>'+data.eventCount+'</span></div>';
      if(data.matches) html+='<div class="tt-row"><span>Matches</span><span>'+data.matches+'</span></div>';
      if(data.themes.length){
        html+='<div class="tt-themes">';
        data.themes.slice(0,4).forEach(function(t){
          html+='<span class="tt-chip" style="background:'+themeColor(t)+';color:white">'+escapeHtml(t)+'</span>';
        });
        html+='</div>';
      }
      showTooltip(html,e);
    });
    el.addEventListener('mousemove',positionTooltip);
    el.addEventListener('mouseleave',hideTooltip);
    el.addEventListener('click',function(){
      if(activeCityFilter===cityName) activeCityFilter=null;
      else activeCityFilter=cityName;
      renderAll();
    });
  });
}

// ── Theme bubbles (pack layout) ────────────────────
function renderBubbles(){
  var members=getFilteredMembers();
  var themes=computeThemeCounts(members);
  if(themes.length===0){document.getElementById('bubblesSvg').innerHTML='';return;}

  var svgW=1092,svgH=280;
  var cx=svgW/2,cy=svgH/2;

  // Filter by city if active
  if(activeCityFilter){
    var cityMembers=members.filter(function(m){
      var geo=m.geography||'';
      var ck=cityKey(geo.split(',')[0].trim());
      return ck===cityKey(activeCityFilter);
    });
    themes=computeThemeCounts(cityMembers);
    if(themes.length===0){document.getElementById('bubblesSvg').innerHTML='<text x="'+cx+'" y="'+cy+'" text-anchor="middle" fill="var(--txtXL)" font-size="13">No theme data for this city</text>';return;}
  }

  // Scale factor
  var maxCount=themes[0].count;
  var scaleFactor=themes.length<=4?8:themes.length<=8?6.5:5;
  function bubbleR(count){return Math.max(18,Math.sqrt(count)*scaleFactor);}

  // Simple spiral packing
  var placed=[];
  themes.forEach(function(t,i){
    var r=bubbleR(t.count);
    if(i===0){
      placed.push({x:cx,y:cy,r:r,theme:t.name,count:t.count});
      return;
    }
    // Spiral outward to find position
    var angle=i*2.4; // golden angle-ish
    var dist=0;
    var bestX=cx,bestY=cy;
    var found=false;
    for(var step=0;step<500;step++){
      dist+=0.8;
      var a=angle+step*0.3;
      var tx=cx+Math.cos(a)*dist;
      var ty=cy+Math.sin(a)*dist;
      var overlap=false;
      for(var j=0;j<placed.length;j++){
        var dx=tx-placed[j].x,dy=ty-placed[j].y;
        var minDist=r+placed[j].r+3;
        if(dx*dx+dy*dy<minDist*minDist){overlap=true;break;}
      }
      if(!overlap){
        // Check bounds
        if(tx-r>=0&&tx+r<=svgW&&ty-r>=4&&ty+r<=svgH-4){
          bestX=tx;bestY=ty;found=true;break;
        }
      }
    }
    if(!found){bestX=cx+Math.cos(angle)*dist;bestY=cy+Math.sin(angle)*dist;}
    placed.push({x:bestX,y:bestY,r:r,theme:t.name,count:t.count});
  });

  // Render
  var html='';
  placed.forEach(function(b){
    var color=themeColor(b.theme);
    var dimmed=false;
    if(activeThemeFilter&&activeThemeFilter!==b.theme) dimmed=true;
    if(activeCityFilter) dimmed=false; // show all themes in city context
    var isActive=activeThemeFilter===b.theme;
    var cls='theme-bubble'+(dimmed?' dimmed':'')+(isActive?' active':'');
    var fontSize=Math.max(9,Math.min(13,b.r*0.35));
    var countSize=Math.max(8,Math.min(11,b.r*0.28));

    html+='<g class="'+cls+'" data-theme="'+escapeHtml(b.theme)+'">';
    // Subtle glow
    if(!dimmed) html+='<circle cx="'+b.x+'" cy="'+b.y+'" r="'+(b.r+4)+'" fill="'+color+'" opacity="0.08"/>';
    html+='<circle cx="'+b.x+'" cy="'+b.y+'" r="'+b.r+'" fill="'+color+'" opacity="'+(dimmed?0.15:0.82)+'"/>';
    if(b.r>22){
      html+='<text class="theme-bubble-label" x="'+b.x+'" y="'+(b.y-3)+'" font-size="'+fontSize+'">'+escapeHtml(b.theme)+'</text>';
      html+='<text class="theme-bubble-count" x="'+b.x+'" y="'+(b.y+fontSize-1)+'" font-size="'+countSize+'">'+b.count+'</text>';
    }else if(b.r>16){
      html+='<text class="theme-bubble-label" x="'+b.x+'" y="'+(b.y+3)+'" font-size="'+Math.max(8,fontSize-1)+'">'+escapeHtml(b.theme)+'</text>';
    }
    html+='</g>';
  });
  document.getElementById('bubblesSvg').innerHTML=html;

  // Attach click events
  document.querySelectorAll('.theme-bubble').forEach(function(el){
    var themeName=el.getAttribute('data-theme');
    el.addEventListener('click',function(){
      if(activeThemeFilter===themeName) activeThemeFilter=null;
      else activeThemeFilter=themeName;
      renderAll();
    });
    el.addEventListener('mouseenter',function(e){
      var t=themes.find(function(x){return x.name===themeName;});
      if(!t) return;
      showTooltip('<strong>'+escapeHtml(themeName)+'</strong><div class="tt-row"><span>Members</span><span>'+t.count+'</span></div>',e);
    });
    el.addEventListener('mousemove',positionTooltip);
    el.addEventListener('mouseleave',hideTooltip);
  });
}

// ── Stakeholder donut ──────────────────────────────
function renderDonut(){
  var members=getFilteredMembers();

  // Apply filters
  if(activeThemeFilter){
    members=members.filter(function(m){return parseThemes(m.themes).indexOf(activeThemeFilter)!==-1;});
  }
  if(activeCityFilter){
    members=members.filter(function(m){
      var geo=m.geography||'';
      var ck=cityKey(geo.split(',')[0].trim());
      return ck===cityKey(activeCityFilter);
    });
  }

  var types=computeStakeholderCounts(members);
  var total=members.length;

  var svg=document.getElementById('donutSvg');
  var legend=document.getElementById('donutLegend');

  if(total===0){
    svg.innerHTML='<text x="100" y="100" text-anchor="middle" fill="var(--txtXL)" font-size="12">No data</text>';
    legend.innerHTML='';
    return;
  }

  var R=80,r=54,cx=100,cy=100;
  var circumference=2*Math.PI*((R+r)/2);
  var midR=(R+r)/2;
  var strokeW=R-r;

  var html='';
  var offset=0;

  types.forEach(function(t){
    var pct=t.count/total;
    var dashLen=pct*circumference;
    var gap=circumference-dashLen;
    var color=stakeholderColor(t.name);
    var rotation=-90+(offset/total)*360;

    html+='<circle class="donut-segment" cx="'+cx+'" cy="'+cy+'" r="'+midR+'" '+
      'fill="none" stroke="'+color+'" stroke-width="'+strokeW+'" '+
      'stroke-dasharray="'+dashLen+' '+gap+'" '+
      'transform="rotate('+rotation+' '+cx+' '+cy+')" '+
      'data-type="'+escapeHtml(t.name)+'" data-count="'+t.count+'"/>';
    offset+=t.count;
  });

  // Center text
  html+='<text class="donut-center-text" x="'+cx+'" y="'+(cy-2)+'">'+total+'</text>';
  html+='<text class="donut-center-sub" x="'+cx+'" y="'+(cy+14)+'">members</text>';

  svg.innerHTML=html;

  // Legend
  var legHtml='';
  types.forEach(function(t){
    var color=stakeholderColor(t.name);
    var label=t.name.charAt(0).toUpperCase()+t.name.slice(1)+'s';
    legHtml+='<span class="donut-legend-item" data-type="'+escapeHtml(t.name)+'">'+
      '<span class="donut-legend-dot" style="background:'+color+'"></span>'+
      label+' <span class="donut-legend-count">'+t.count+'</span></span>';
  });
  legend.innerHTML=legHtml;

  // Hover interactions on segments
  document.querySelectorAll('.donut-segment').forEach(function(el){
    el.addEventListener('mouseenter',function(e){
      var typeName=el.getAttribute('data-type');
      var count=el.getAttribute('data-count');
      var label=typeName.charAt(0).toUpperCase()+typeName.slice(1)+'s';
      var pct=Math.round((parseInt(count)/total)*100);
      showTooltip('<strong>'+label+'</strong><div class="tt-row"><span>Count</span><span>'+count+'</span></div><div class="tt-row"><span>Share</span><span>'+pct+'%</span></div>',e);
    });
    el.addEventListener('mousemove',positionTooltip);
    el.addEventListener('mouseleave',hideTooltip);
  });
}

// ── Events timeline ────────────────────────────────
function renderEvents(){
  var container=document.getElementById('eventsList');
  var events=getFilteredEvents();

  // Filter future events
  var now=new Date();
  var upcoming=events.filter(function(e){
    if(!e.event_date) return false;
    return new Date(e.event_date)>=now;
  });
  upcoming.sort(function(a,b){return new Date(a.event_date)-new Date(b.event_date);});

  // Apply active filters
  if(activeThemeFilter){
    upcoming=upcoming.filter(function(e){
      return parseThemes(e.themes).indexOf(activeThemeFilter)!==-1;
    });
  }
  if(activeCityFilter){
    upcoming=upcoming.filter(function(e){
      var ck=cityKey(e.city);
      return ck===cityKey(activeCityFilter);
    });
  }

  if(upcoming.length===0){
    container.innerHTML='<div style="text-align:center;padding:40px 0;color:var(--txtXL);font-size:13px">No upcoming events'+(activeThemeFilter||activeCityFilter?' matching filters':'')+'</div>';
    return;
  }

  var html='';
  upcoming.slice(0,12).forEach(function(e){
    var d=new Date(e.event_date);
    var dateStr=d.toLocaleDateString('en-GB',{day:'numeric',month:'short'});
    var themes=parseThemes(e.themes);
    var themeChips=themes.slice(0,2).map(function(t){
      return '<span class="theme-chip" style="background:'+themeColor(t)+'22;color:'+themeColor(t)+'">'+escapeHtml(t)+'</span>';
    }).join('');
    var location=e.city?escapeHtml(e.city):(e.country?escapeHtml(e.country):'');
    var regCount=e.registered_count||0;
    var hasRegs=regCount>0;

    html+='<div class="ev-row'+(hasRegs?' has-regs':'')+'">'+
      '<span class="ev-date">'+dateStr+'</span>'+
      '<span class="ev-name" title="'+escapeHtml(e.name||'')+'">'+escapeHtml(e.name||'Untitled')+'</span>'+
      '<span class="ev-city">'+location+'</span>'+
      '<span class="ev-themes">'+themeChips+'</span>'+
      '<span class="ev-reg">'+regCount+'</span>'+
    '</div>';
  });

  container.innerHTML=html;
}

  currentScope=this.value;
  document.getElementById('communitySelect').style.display=currentScope==='community'?'':'none';

  renderAll();
});
document.getElementById('communitySelect').addEventListener('change',function(){
  currentCommunityId=this.value;
  activeThemeFilter=null;activeCityFilter=null;
  renderAll();
});
