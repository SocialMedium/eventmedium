<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Matches — Event Medium</title>
<script src="https://unpkg.com/lucide@latest"></script>
<style>
:root {
  --p:#0066ff;--pL:#e8f0fe;--pD:#0052cc;--s:#6c63ff;--ok:#00d084;
  --okL:#e6faf2;--warn:#f59e0b;--bg:#f8f9fd;--card:#ffffff;
  --txt:#1a1d29;--txtL:#6b7280;--txtXL:#9ca3af;--bdr:#e5e7eb;
  --shadow:0 1px 3px rgba(0,0,0,0.06);--shadowL:0 10px 25px rgba(0,0,0,0.08);
  --font:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font);color:var(--txt);background:var(--bg);-webkit-font-smoothing:antialiased}
.nav{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(255,255,255,0.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--bdr);padding:0 24px}
.nav-inner{max-width:1140px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:64px}
.nav-brand{display:flex;align-items:center;gap:10px;text-decoration:none;color:var(--txt)}
.nav-name{font-weight:800;font-size:1.15rem;letter-spacing:-0.3px}
.nav-links{display:flex;align-items:center;gap:8px}
.nav-link{padding:8px 16px;color:var(--txtL);text-decoration:none;font-size:14px;font-weight:500;border-radius:8px;transition:all 0.2s}
.nav-link:hover{color:var(--txt);background:var(--card)}
.nav-link.active{color:var(--p);font-weight:600}

.page{max-width:800px;margin:0 auto;padding:88px 24px 60px}
.page-header{margin-bottom:20px}
.page-header h1{font-size:24px;font-weight:700;margin-bottom:4px}
.page-header p{font-size:14px;color:var(--txtL)}

/* ── Scope strip ── */
.scope-strip{display:flex;gap:8px;margin-bottom:24px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none}
.scope-strip::-webkit-scrollbar{display:none}
.scope-btn{display:flex;align-items:center;gap:6px;padding:9px 16px;background:var(--card);border:1.5px solid var(--bdr);border-radius:10px;font-size:13px;font-weight:600;color:var(--txtL);cursor:pointer;white-space:nowrap;transition:all 0.2s;font-family:var(--font)}
.scope-btn:hover{border-color:var(--p);color:var(--p)}
.scope-btn.active{background:var(--p);border-color:var(--p);color:white}
.scope-btn.empty{opacity:0.45}
.scope-badge{display:inline-flex;align-items:center;justify-content:center;min-width:18px;height:18px;border-radius:9px;font-size:10px;font-weight:700;padding:0 5px}
.scope-btn.active .scope-badge{background:rgba(255,255,255,0.3);color:white}
.scope-btn:not(.active) .scope-badge{background:var(--bg);color:var(--txt)}

/* ── Context label ── */
.context-label{font-size:13px;font-weight:600;color:var(--txtL);margin-bottom:16px;display:flex;align-items:center;gap:6px}
.context-label i{width:14px;height:14px}

/* ── Match cards ── */
.match-card{background:var(--card);border:1px solid var(--bdr);border-radius:16px;padding:24px;margin-bottom:14px;transition:all 0.3s}
.match-card:hover{box-shadow:var(--shadowL)}
.match-context-tag{display:inline-flex;align-items:center;gap:4px;font-size:11px;color:var(--txtXL);margin-bottom:8px}
.match-context-tag i{width:11px;height:11px}
.match-card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px}
.match-card-left{display:flex;gap:14px;align-items:flex-start}
.match-avatar{width:48px;height:48px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-weight:700;flex-shrink:0;font-size:14px}
.match-avatar.anon{background:var(--bg);color:var(--txtXL)}
.match-avatar.revealed{background:var(--pL);color:var(--p)}
.match-type{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:6px;font-size:11px;font-weight:600;margin-top:4px}
.match-type.investor{background:var(--pL);color:var(--p)}
.match-type.founder{background:var(--okL);color:#059669}
.match-type.researcher{background:#ede9fe;color:var(--s)}
.match-type.corporate{background:#fef2f2;color:#dc2626}
.match-type.advisor{background:#fef3c7;color:#d97706}
.match-type.operator{background:#f0fdf4;color:#16a34a}
.match-type.anon{background:var(--bg);color:var(--txtXL)}
.match-focus{font-size:13px;color:var(--txtL);margin-top:4px;line-height:1.4}
.match-score-wrap{text-align:center;flex-shrink:0}
.match-score-big{font-size:32px;font-weight:700;line-height:1}
.match-score-label{font-size:11px;color:var(--txtXL);margin-top:2px}
.score-breakdown{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px;padding:14px;background:var(--bg);border-radius:12px}
.score-item{text-align:center}
.score-item-bar{height:4px;background:var(--bdr);border-radius:2px;margin:6px auto 4px;width:80%;overflow:hidden}
.score-item-fill{height:100%;border-radius:2px;background:var(--p);transition:width 0.4s ease}
.score-item-label{font-size:10px;color:var(--txtXL);text-transform:uppercase;letter-spacing:0.5px}
.score-item-val{font-size:13px;font-weight:700;color:var(--txt)}
.match-reasons{margin-bottom:14px}
.match-reason{font-size:13px;color:var(--txtL);padding:3px 0;display:flex;align-items:flex-start;gap:8px;line-height:1.5}
.match-reason i{width:14px;height:14px;color:var(--ok);flex-shrink:0;margin-top:3px}
.signal-context{padding:12px 16px;background:linear-gradient(135deg,#f0f4ff,#f5f0ff);border-radius:10px;margin-bottom:14px;border-left:3px solid var(--s)}
.signal-context-label{font-size:11px;font-weight:600;color:var(--s);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px}
.signal-context-item{font-size:12px;color:var(--txtL);padding:2px 0;line-height:1.5}
.match-actions{display:flex;gap:10px}
.match-btn{flex:1;padding:11px;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;transition:all 0.2s;border:none;font-family:var(--font);display:flex;align-items:center;justify-content:center;gap:8px;text-decoration:none}
.match-btn i{width:16px;height:16px}
.match-btn.accept{background:var(--ok);color:white}
.match-btn.accept:hover{background:#00b872;transform:translateY(-1px)}
.match-btn.decline{background:var(--bg);color:var(--txtL);border:1px solid var(--bdr)}
.match-btn.decline:hover{background:#fef2f2;color:#ef4444;border-color:#fecaca}
.match-btn.chat{background:var(--p);color:white}
.match-btn.chat:hover{background:var(--pD);transform:translateY(-1px)}
.revealed-identity{display:flex;gap:16px;align-items:center;padding:16px;background:var(--bg);border-radius:12px;margin-bottom:14px}
.revealed-avatar{width:48px;height:48px;border-radius:12px;background:var(--pL);display:flex;align-items:center;justify-content:center;color:var(--p);font-weight:700;flex-shrink:0}
.revealed-name{font-size:15px;font-weight:700}
.revealed-company{font-size:13px;color:var(--txtL)}
.decision-row{display:flex;gap:8px;align-items:center}
.decision-badge{display:inline-flex;align-items:center;gap:4px;padding:5px 12px;border-radius:8px;font-size:12px;font-weight:600}
.decision-badge i{width:12px;height:12px}
.decision-badge.accepted{background:var(--okL);color:#059669}
.decision-badge.declined{background:#fef2f2;color:#ef4444}
.decision-badge.pending{background:var(--bg);color:var(--txtXL)}

/* ── Nudge card ── */
.nudge-card{background:linear-gradient(135deg,var(--pL),#f0eeff);border:1px solid rgba(99,102,241,0.2);border-radius:16px;padding:20px 24px;margin-bottom:16px}
.nudge-card-eyebrow{font-size:11px;font-weight:700;color:var(--s);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:6px}
.nudge-card-headline{font-size:15px;font-weight:700;color:var(--txt);margin-bottom:4px;line-height:1.4}
.nudge-card-sub{font-size:13px;color:var(--txtL);margin-bottom:14px;line-height:1.5}
.nudge-cta{display:inline-flex;align-items:center;gap:6px;padding:9px 18px;background:var(--s);color:white;border-radius:9px;font-size:13px;font-weight:600;cursor:pointer;border:none;font-family:var(--font);transition:all 0.2s}
.nudge-cta:hover{background:#5855eb;transform:translateY(-1px)}

/* ── "Where your matches are" section ── */
.rec-section{margin-top:32px;padding-top:28px;border-top:1px solid var(--bdr)}
.rec-section-title{font-size:16px;font-weight:700;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.rec-section-title i{width:18px;height:18px;color:var(--p)}
.rec-card{background:var(--card);border:1px solid var(--bdr);border-radius:14px;padding:20px 22px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;gap:16px}
.rec-card:hover{box-shadow:var(--shadowL)}
.rec-card-left{min-width:0;flex:1}
.rec-card-eyebrow{font-size:11px;font-weight:700;color:var(--txtXL);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px}
.rec-card-name{font-size:15px;font-weight:700;margin-bottom:2px}
.rec-card-sub{font-size:13px;color:var(--txtL);margin-bottom:10px}
.rec-avatars{display:flex;align-items:center;gap:-4px;margin-bottom:10px}
.rec-avatar{width:28px;height:28px;border-radius:8px;background:var(--pL);color:var(--p);display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;border:2px solid var(--card);margin-right:-6px}
.rec-avatar:nth-child(2){background:#ede9fe;color:var(--s)}
.rec-avatar:nth-child(3){background:var(--okL);color:#059669}
.rec-more{font-size:12px;color:var(--txtXL);margin-left:12px;white-space:nowrap}
.rec-cta{display:inline-flex;align-items:center;gap:6px;padding:9px 18px;background:var(--p);color:white;border-radius:9px;font-size:13px;font-weight:600;cursor:pointer;border:none;font-family:var(--font);text-decoration:none;transition:all 0.2s;white-space:nowrap;flex-shrink:0}
.rec-cta:hover{background:var(--pD);transform:translateY(-1px)}

/* ── Decision tabs ── */
.tabs{display:flex;gap:4px;margin-bottom:20px;background:var(--card);border:1px solid var(--bdr);border-radius:12px;padding:4px}
.tab{flex:1;padding:10px;text-align:center;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;transition:all 0.2s;color:var(--txtL)}
.tab.active{background:var(--p);color:white}
.tab-count{display:inline-flex;align-items:center;justify-content:center;min-width:20px;height:20px;border-radius:10px;font-size:11px;margin-left:6px;padding:0 6px}
.tab.active .tab-count{background:rgba(255,255,255,0.3)}
.tab:not(.active) .tab-count{background:var(--bg)}

.empty{text-align:center;padding:40px 24px}
.empty-icon{width:56px;height:56px;border-radius:14px;background:var(--bg);display:flex;align-items:center;justify-content:center;margin:0 auto 14px}
.empty-icon i{width:28px;height:28px;color:var(--txtXL)}
.empty h3{font-size:17px;color:var(--txt);margin-bottom:8px}
.empty p{font-size:14px;color:var(--txtL);max-width:380px;margin:0 auto;line-height:1.6}
.empty a{color:var(--p);font-weight:600;text-decoration:none}
.loading{text-align:center;padding:60px;color:var(--txtL)}

@media(max-width:640px){
  .nav-links .nav-link:not(.active){display:none}
  .page{padding:80px 16px 40px}
  .match-actions{flex-direction:column}
  .score-breakdown{grid-template-columns:repeat(2,1fr)}
  .match-card-top{flex-direction:column;gap:12px}
  .match-score-wrap{align-self:flex-end}
  .rec-card{flex-direction:column;align-items:flex-start}
}
</style>
<link rel="stylesheet" href="/css/nav.css"><link rel="icon" type="image/png" href="/images/em-logo.png">
<style>.beta-banner{background:#1a1d29;color:rgba(255,255,255,0.7);font-size:12px;text-align:center;padding:7px 16px;line-height:1}.beta-banner a{color:#C9A84C;text-decoration:none;margin-left:8px}.beta-banner a:hover{text-decoration:underline}</style>
</head>
<body>
<div class="beta-banner">EventMedium is in live beta — we're actively improving the platform.<a href="/feedback.html">Share feedback &rarr;</a></div>

<nav class="nav">
  <div class="nav-inner">
    <a href="/" class="nav-brand">
      <img src="/images/em-logo.png" alt="Event Medium" style="width:36px;height:36px;border-radius:8px;display:block;">
      <span class="nav-name">Event <span style="color:var(--p)">Medium</span></span>
    </a>
    <div class="nav-links">
      <a href="/events.html" class="nav-link">Events</a>
      <a href="/matches.html" class="nav-link active">Matches</a>
      <a href="/inbox.html" class="nav-link">Inbox</a>
      <a href="/network.html" class="nav-link">Network</a>
      <a href="/canister.html" class="nav-link">My Canister</a>
    </div>
  </div>
</nav>

<div class="page">
  <div class="page-header">
    <h1>My Matches</h1>
    <p>Double-blind matching — identities revealed only with mutual consent.</p>
  </div>

  <div id="scopeStrip" class="scope-strip"></div>

  <div class="tabs" id="tabs">
    <div class="tab active" data-tab="pending" onclick="switchTab('pending')">Pending <span class="tab-count" id="pendingCount">0</span></div>
    <div class="tab" data-tab="revealed" onclick="switchTab('revealed')">Revealed <span class="tab-count" id="revealedCount">0</span></div>
    <div class="tab" data-tab="decided" onclick="switchTab('decided')">History <span class="tab-count" id="decidedCount">0</span></div>
  </div>

  <div id="contextLabel" class="context-label" style="display:none"></div>
  <div id="matchesContainer"><div class="loading">Loading matches...</div></div>
  <div id="nudgeArea"></div>
  <div id="recommendedArea"></div>
</div>

<script>
var token = localStorage.getItem('auth_token');
if (!token) window.location.href = '/auth.html';

var contextual = null;    // full /contextual response
var activeScope = null;   // current scope key: 'event', 'community', 'location', 'global'
var activeScopeId = null; // for event/community scopes with an ID
var currentTab = 'pending';
var allMatches = [];      // flat list for current scope

// ── Load ─────────────────────────────────────────────────────────────────────
async function load() {
  try {
    var resp = await fetch('/api/matches/contextual', {
      headers: { 'Authorization': 'Bearer ' + token }
    });
    if (!resp.ok) {
      if (resp.status === 401) { localStorage.removeItem('auth_token'); window.location.href = '/auth.html'; }
      throw new Error('HTTP ' + resp.status);
    }
    contextual = await resp.json();
    renderScopeStrip();
    setScope(contextual.active_scope, null, true);
    renderRecommended();
  } catch(err) {
    document.getElementById('matchesContainer').innerHTML =
      '<div class="loading">Failed to load matches.</div>';
  }
}

// ── Scope strip ───────────────────────────────────────────────────────────────
function renderScopeStrip() {
  if (!contextual) return;
  var scopeCounts = { event: 0, community: 0, location: 0, global: 0 };
  contextual.scopes.forEach(function(s) { scopeCounts[s.type] = (scopeCounts[s.type] || 0) + s.count; });

  var scopeDefs = [
    { key: 'event',     icon: 'calendar',    label: 'Events'      },
    { key: 'community', icon: 'users',       label: 'Communities' },
    { key: 'location',  icon: 'map-pin',     label: 'Near Me'     },
    { key: 'global',    icon: 'globe',       label: 'Global'      }
  ];

  var html = scopeDefs.map(function(d) {
    var cnt = scopeCounts[d.key] || 0;
    var isActive = activeScope === d.key;
    var isEmpty = cnt === 0;
    return '<button class="scope-btn' + (isActive ? ' active' : '') + (isEmpty ? ' empty' : '') + '" ' +
      'onclick="setScope(\'' + d.key + '\',null)">' +
      '<i data-lucide="' + d.icon + '" style="width:14px;height:14px"></i> ' + d.label +
      '<span class="scope-badge">' + cnt + '</span>' +
      '</button>';
  }).join('');

  document.getElementById('scopeStrip').innerHTML = html;
  lucide.createIcons();
}

// ── Set active scope ──────────────────────────────────────────────────────────
async function setScope(type, id, initial) {
  activeScope = type;
  activeScopeId = id;

  // Update strip highlighting
  document.querySelectorAll('.scope-btn').forEach(function(b) {
    b.classList.toggle('active', b.textContent.trim().toLowerCase().startsWith(
      type === 'event' ? 'event' : type === 'community' ? 'communit' : type === 'location' ? 'near' : 'global'
    ));
  });

  // Re-render strip properly
  if (contextual) renderScopeStrip();

  // Build flat match list for this scope
  var scopeRows = contextual ? contextual.scopes.filter(function(s) {
    return s.type === type && (id == null || s.id === id);
  }) : [];

  allMatches = [];
  scopeRows.forEach(function(s) { allMatches = allMatches.concat(s.matches || []); });

  // Dedup by id
  var seen = new Set();
  allMatches = allMatches.filter(function(m) {
    if (seen.has(m.id)) return false;
    seen.add(m.id); return true;
  });

  // If no cached matches, fetch from API
  if (!allMatches.length && !initial) {
    try {
      var qp = '?scope_type=' + type + (id ? '&' + (type === 'event' ? 'event_id' : 'community_id') + '=' + id : '');
      var r = await fetch('/api/matches/mine' + qp, { headers: { 'Authorization': 'Bearer ' + token } });
      if (r.ok) { var d = await r.json(); allMatches = d.matches || []; }
    } catch(e) {}
  }

  updateContextLabel(type, id);
  updateCounts();
  renderTab();
  renderNudge();
}

function updateContextLabel(type, id) {
  var el = document.getElementById('contextLabel');
  var scope = contextual && contextual.scopes.find(function(s) { return s.type === type && (!id || s.id === id); });
  if (!scope) { el.style.display = 'none'; return; }

  var icons = { event: 'calendar', community: 'users', location: 'map-pin', global: 'globe' };
  el.innerHTML = '<i data-lucide="' + icons[type] + '"></i> ' +
    (type === 'event' ? 'Your matches at ' : type === 'community' ? 'Community: ' : type === 'location' ? 'Near you in ' : '') +
    '<strong style="color:var(--txt)">' + esc(scope.label) + '</strong>';
  el.style.display = 'flex';
  lucide.createIcons();
}

// ── Tabs ──────────────────────────────────────────────────────────────────────
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(function(t) { t.classList.toggle('active', t.dataset.tab === tab); });
  renderTab();
}

function updateCounts() {
  document.getElementById('pendingCount').textContent  = allMatches.filter(isPending).length;
  document.getElementById('revealedCount').textContent = allMatches.filter(function(m) { return m.status === 'revealed'; }).length;
  document.getElementById('decidedCount').textContent  = allMatches.filter(isDecided).length;
}

function isPending(m) { return m.status === 'pending' && !m.my_decision; }
function isDecided(m) { return m.my_decision || m.status === 'declined'; }

function getFiltered() {
  if (currentTab === 'pending')  return allMatches.filter(isPending);
  if (currentTab === 'revealed') return allMatches.filter(function(m) { return m.status === 'revealed'; });
  return allMatches.filter(isDecided);
}

function renderTab() {
  var matches = getFiltered();
  var container = document.getElementById('matchesContainer');
  if (!matches.length) {
    var msg = getNullStateMessage();
    container.innerHTML = '<div class="empty">' +
      '<div class="empty-icon"><i data-lucide="heart-handshake"></i></div>' +
      '<h3>' + msg.h + '</h3><p>' + msg.p + '</p></div>';
    lucide.createIcons();
    return;
  }
  container.innerHTML = matches.map(renderCard).join('');
  lucide.createIcons();
}

function getNullStateMessage() {
  var scope = contextual && contextual.scopes.find(function(s) { return s.type === activeScope; });
  var isThin = !scope || scope.thin;

  if (currentTab === 'pending') {
    if (isThin) {
      if (activeScope === 'global') return { h: "Your canister needs more signal", p: 'Talk to Nev to sharpen your matches. <a href="/onboard.html">Open Nev →</a>' };
      var nextTypes = ['event','community','location','global'];
      var nextIdx = nextTypes.indexOf(activeScope) + 1;
      var nextLabel = nextIdx < nextTypes.length ? nextTypes[nextIdx] : 'global';
      return { h: "No matches here yet", p: 'Explore your ' + nextLabel + ' matches below.' };
    }
    return { h: "No pending matches", p: 'All caught up. Check back after the next matching run.' };
  }
  if (currentTab === 'revealed') return { h: "No revealed matches yet", p: 'Accept pending matches to reveal identities.' };
  return { h: "No history yet", p: 'Your decided matches will appear here.' };
}

// ── Nudge card ────────────────────────────────────────────────────────────────
function renderNudge() {
  var el = document.getElementById('nudgeArea');
  el.innerHTML = '';
  if (!contextual) return;

  var scopeOrder = ['event', 'community', 'location', 'global'];
  var currentIdx = scopeOrder.indexOf(activeScope);
  if (currentIdx === -1) return;

  // Find next scope with matches
  for (var i = currentIdx + 1; i < scopeOrder.length; i++) {
    var nextType = scopeOrder[i];
    var nextScopes = contextual.scopes.filter(function(s) { return s.type === nextType; });
    var nextTotal = nextScopes.reduce(function(a, s) { return a + s.count; }, 0);
    if (nextTotal === 0) continue;

    var msg = getNudgeMessage(activeScope, nextType, nextTotal, nextScopes);
    el.innerHTML = '<div class="nudge-card">' +
      '<div class="nudge-card-eyebrow">More signal ahead</div>' +
      '<div class="nudge-card-headline">' + msg.headline + '</div>' +
      '<div class="nudge-card-sub">' + msg.sub + '</div>' +
      '<button class="nudge-cta" onclick="setScope(\'' + nextType + '\',null)">' + msg.cta + ' →</button>' +
    '</div>';
    lucide.createIcons();
    return;
  }

  // Global is thin — show Nev nudge
  var globalScope = contextual.scopes.find(function(s) { return s.type === 'global'; });
  if (contextual.scopes.every(function(s) { return s.thin; })) {
    el.innerHTML = '<div class="nudge-card">' +
      '<div class="nudge-card-eyebrow">Sharpen your signal</div>' +
      '<div class="nudge-card-headline">Your canister needs more signal to match well</div>' +
      '<div class="nudge-card-sub">Tell Nev where you\'re travelling next and they\'ll scan for signal there.</div>' +
      '<a href="/onboard.html?mode=update&focus=geography" class="nudge-cta">Talk to Nev →</a>' +
    '</div>';
  }
}

function getNudgeMessage(from, to, count, scopes) {
  var firstName = scopes[0] && scopes[0].matches && scopes[0].matches[0];
  var topScore = firstName ? Math.round((firstName.score_total || 0) * 100) : null;

  if (from === 'event' && to === 'community') {
    return {
      headline: count + ' strong signal' + (count === 1 ? '' : 's') + ' in your community',
      sub: topScore ? 'Including a ' + topScore + '% match — not at this event but aligned on your themes.' : 'Beyond this event, your community connections are waiting.',
      cta: 'See Community Matches'
    };
  }
  if (from === 'community' && to === 'location') {
    return {
      headline: count + ' match' + (count === 1 ? '' : 'es') + ' near you',
      sub: 'Strong signals exist in your city — not in this community but aligned on themes.',
      cta: 'See Nearby Matches'
    };
  }
  if (from === 'location' && to === 'global') {
    return {
      headline: 'Your strongest matches may be elsewhere',
      sub: 'Explore the global network — ' + count + ' signal' + (count === 1 ? '' : 's') + ' across the platform.',
      cta: 'Explore Global Network'
    };
  }
  return {
    headline: count + ' match' + (count === 1 ? '' : 'es') + ' in ' + to + ' scope',
    sub: 'Explore your broader network.',
    cta: 'See ' + capitalize(to) + ' Matches'
  };
}

// ── "Where your matches are" section ─────────────────────────────────────────
function renderRecommended() {
  var el = document.getElementById('recommendedArea');
  var items = contextual && contextual.recommended;
  if (!items || !items.length) { el.innerHTML = ''; return; }

  var html = '<div class="rec-section">' +
    '<div class="rec-section-title"><i data-lucide="compass"></i> Where your matches are</div>';

  items.forEach(function(r) {
    var eyebrow = r.type === 'event' ? 'Upcoming Event' : r.type === 'community' ? 'Community' : 'Location';
    var name = r.name || r.city || '';
    var sub = r.match_count + ' strong match' + (r.match_count === 1 ? '' : 'es') +
      (r.city ? ' · ' + r.city : '') +
      (r.top_score ? ' · top score ' + Math.round(r.top_score * 100) + '%' : '');

    var avatars = (r.preview || []).map(function(init, i) {
      return '<span class="rec-avatar">' + esc(init) + '</span>';
    }).join('');
    var extra = r.match_count > (r.preview || []).length ? '<span class="rec-more">+' + (r.match_count - (r.preview || []).length) + ' more</span>' : '';

    var ctaHref = '', ctaLabel = '', ctaOnclick = '';
    if (r.type === 'event') {
      ctaHref = '/events.html?id=' + r.id;
      ctaLabel = 'Register for this event';
    } else if (r.type === 'community') {
      ctaOnclick = 'joinCommunity(' + r.id + ',this)';
      ctaLabel = 'Join this community';
    } else {
      ctaHref = '/onboard.html?mode=update&focus=geography&destination=' + encodeURIComponent(r.city || '');
      ctaLabel = "Tell Nev you're travelling";
    }

    html += '<div class="rec-card">' +
      '<div class="rec-card-left">' +
        '<div class="rec-card-eyebrow">' + eyebrow + '</div>' +
        '<div class="rec-card-name">' + esc(name) + '</div>' +
        '<div class="rec-card-sub">' + esc(sub) + '</div>' +
        '<div class="rec-avatars">' + avatars + extra + '</div>' +
      '</div>' +
      (ctaOnclick
        ? '<button class="rec-cta" onclick=\'' + ctaOnclick + '\'>' + ctaLabel + '</button>'
        : '<a href="' + ctaHref + '" class="rec-cta">' + ctaLabel + '</a>') +
    '</div>';
  });

  html += '</div>';
  el.innerHTML = html;
  lucide.createIcons();
}

async function joinCommunity(communityId, btn) {
  btn.textContent = 'Joining...';
  btn.disabled = true;
  try {
    var r = await fetch('/api/communities/' + communityId + '/join', {
      method: 'POST',
      headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' }
    });
    if (r.ok) {
      btn.textContent = 'Joined!';
      setTimeout(load, 800);
    } else {
      btn.textContent = 'Join this community';
      btn.disabled = false;
    }
  } catch(e) { btn.textContent = 'Join this community'; btn.disabled = false; }
}

// ── Match card renderer ───────────────────────────────────────────────────────
function renderCard(m) {
  var reasons  = parseArr(m.match_reasons);
  var signals  = parseArr(m.signal_context);
  var pct      = Math.round((m.score_total || 0) * 100);
  var scoreCol = pct >= 70 ? 'var(--ok)' : pct >= 40 ? 'var(--p)' : 'var(--txtXL)';

  var html = '<div class="match-card">';

  // Context tag (show when not filtered to a single scope)
  if (m.context) {
    var ctxIcons = { event: 'calendar', community: 'users', location: 'map-pin', global: 'globe' };
    var ctxLabel = m.context.name || capitalize(m.context.type || 'Global');
    html += '<div class="match-context-tag"><i data-lucide="' + (ctxIcons[m.context.type] || 'circle') + '"></i> ' + esc(ctxLabel) + '</div>';
  }

  // Revealed identity
  if (m.status === 'revealed' && m.other_user) {
    var ou = m.other_user;
    html += '<div class="revealed-identity">' +
      '<div class="revealed-avatar">' + getInitials(ou.name) + '</div>' +
      '<div><div class="revealed-name">' + esc(ou.name) + '</div>' +
      '<div class="revealed-company">' + esc(ou.company || '') + (ou.stakeholder_type ? ' · ' + capitalize(ou.stakeholder_type) : '') + '</div>' +
      (ou.geography ? '<div style="font-size:12px;color:var(--txtXL);margin-top:2px">' + esc(ou.geography) + '</div>' : '') +
      '</div></div>';
  }

  // Avatar + score
  html += '<div class="match-card-top"><div class="match-card-left">';
  if (m.status !== 'revealed') {
    html += '<div class="match-avatar anon"><i data-lucide="eye-off" style="width:20px;height:20px"></i></div><div>' +
      '<span class="match-type anon"><i data-lucide="shield" style="width:10px;height:10px"></i> Anonymous</span>';
    var hint = reasons.find(function(r) { return r.indexOf('Shared themes') !== -1; });
    if (hint) html += '<div class="match-focus">' + esc(hint) + '</div>';
    html += '</div>';
  }
  html += '</div>';
  html += '<div class="match-score-wrap"><div class="match-score-big" style="color:' + scoreCol + '">' + pct + '%</div><div class="match-score-label">match</div></div>';
  html += '</div>';

  // Score breakdown
  var comps = [
    { label: 'Semantic',  val: m.score_semantic },
    { label: 'Theme',     val: m.score_theme },
    { label: 'Intent',    val: m.score_intent },
    { label: 'Archetype', val: m.score_stakeholder },
    { label: 'Capital',   val: m.score_capital },
    { label: 'Signals',   val: m.score_signal_convergence }
  ].filter(function(c) { return c.val !== null && c.val !== undefined; });
  if (comps.length >= 3) {
    html += '<div class="score-breakdown">' + comps.map(function(c) {
      var p = Math.round((c.val || 0) * 100);
      var col = p >= 70 ? 'var(--ok)' : p >= 40 ? 'var(--p)' : 'var(--txtXL)';
      return '<div class="score-item"><div class="score-item-val">' + p + '%</div>' +
        '<div class="score-item-bar"><div class="score-item-fill" style="width:' + p + '%;background:' + col + '"></div></div>' +
        '<div class="score-item-label">' + c.label + '</div></div>';
    }).join('') + '</div>';
  }

  // Reasons
  if (reasons.length) {
    html += '<div class="match-reasons">' + reasons.slice(0, 5).map(function(r) {
      return '<div class="match-reason"><i data-lucide="check-circle"></i> ' + esc(r) + '</div>';
    }).join('') + '</div>';
  }

  // Signal context
  if (signals.length && signals[0]) {
    html += '<div class="signal-context"><div class="signal-context-label">Signal intelligence</div>' +
      signals.slice(0, 3).map(function(s) { return '<div class="signal-context-item">' + esc(s) + '</div>'; }).join('') +
    '</div>';
  }

  // Actions
  if (currentTab === 'pending') {
    html += '<div class="match-actions">' +
      '<button class="match-btn decline" onclick="decide(' + m.id + ',\'declined\')"><i data-lucide="x"></i> Pass</button>' +
      '<button class="match-btn accept"  onclick="decide(' + m.id + ',\'accepted\')"><i data-lucide="check"></i> Interested</button>' +
    '</div>';
  } else if (currentTab === 'revealed') {
    html += '<div class="match-actions"><a href="/chat.html?match=' + m.id + '" class="match-btn chat"><i data-lucide="message-circle"></i> Send Message</a></div>';
  } else {
    var mb = m.my_decision || 'pending', tb = m.their_decision || 'pending';
    html += '<div class="decision-row">' +
      '<span class="decision-badge ' + mb + '"><i data-lucide="' + (mb === 'accepted' ? 'check' : mb === 'declined' ? 'x' : 'clock') + '"></i> You: ' + capitalize(mb) + '</span>' +
      '<span class="decision-badge ' + tb + '"><i data-lucide="' + (tb === 'accepted' ? 'check' : tb === 'declined' ? 'x' : 'clock') + '"></i> Them: ' + capitalize(tb) + '</span>' +
    '</div>';
  }

  html += '</div>';
  return html;
}

async function decide(matchId, decision) {
  try {
    var r = await fetch('/api/matches/' + matchId + '/decide', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
      body: JSON.stringify({ decision: decision })
    });
    if (r.ok) load();
  } catch(e) {}
}

function parseArr(v) { if (!v) return []; if (Array.isArray(v)) return v; try { return JSON.parse(v); } catch(e) { return []; } }
function esc(s) { if (!s) return ''; var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function capitalize(s) { return s ? s.charAt(0).toUpperCase() + s.slice(1) : ''; }
function getInitials(n) { return (n||'U').split(' ').map(function(w){return w[0];}).join('').toUpperCase().slice(0,2); }

lucide.createIcons();
load();
</script>
<script src="/js/nav.js"></script></body>
</html>
