<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Event Dashboard — Event Medium</title>
<script src="https://unpkg.com/lucide@latest"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root {
  --p:#0066ff;--pL:#e8f0fe;--pD:#0052cc;--s:#6c63ff;--ok:#059669;
  --okL:#e6faf2;--warn:#f59e0b;--warnL:#fffbeb;--bg:#f8f9fd;--card:#ffffff;
  --txt:#1a1d29;--txtL:#6b7280;--txtXL:#9ca3af;--bdr:#e5e7eb;
  --shadow:0 1px 3px rgba(0,0,0,0.06);--shadowL:0 10px 25px rgba(0,0,0,0.08);
  --font:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font);color:var(--txt);background:var(--bg);-webkit-font-smoothing:antialiased}

/* Nav */
.nav{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(255,255,255,0.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--bdr);padding:0 24px}
.nav-inner{max-width:1100px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:60px}
.nav-brand{display:flex;align-items:center;gap:10px;text-decoration:none;color:var(--txt)}
.nav-logo{width:32px;height:32px;background:var(--p);border-radius:8px;display:flex;align-items:center;justify-content:center}
.nav-name{font-weight:800;font-size:1.05rem;letter-spacing:-0.3px}
.nav-back{display:flex;align-items:center;gap:6px;color:var(--txtL);text-decoration:none;font-size:13px;font-weight:500;padding:7px 14px;border-radius:8px;transition:all 0.2s}
.nav-back:hover{color:var(--txt);background:var(--bg)}

/* Layout */
.page{max-width:1100px;margin:0 auto;padding:76px 24px 60px}
.page-header{margin-bottom:28px}
.page-title{font-size:24px;font-weight:700;margin-bottom:4px}
.page-sub{font-size:14px;color:var(--txtL)}
.event-meta-row{display:flex;gap:16px;flex-wrap:wrap;margin-top:10px;font-size:13px;color:var(--txtL)}
.event-meta-row span{display:flex;align-items:center;gap:5px}
.event-meta-row i{width:14px;height:14px}

/* Stat row */
.stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}
.stat-card{background:var(--card);border:1px solid var(--bdr);border-radius:14px;padding:22px 24px}
.stat-val{font-size:28px;font-weight:700;margin-bottom:4px}
.stat-label{font-size:12px;color:var(--txtL);font-weight:500;text-transform:uppercase;letter-spacing:0.5px}
.stat-sub{font-size:12px;color:var(--txtXL);margin-top:4px}

/* Cards */
.card{background:var(--card);border:1px solid var(--bdr);border-radius:14px;padding:24px;margin-bottom:20px}
.card-title{font-size:15px;font-weight:700;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between}
.card-sub{font-size:12px;color:var(--txtL);font-weight:400}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px}

/* Type bars */
.type-bar{margin-bottom:12px}
.type-bar-header{display:flex;justify-content:space-between;font-size:13px;margin-bottom:5px}
.type-bar-label{font-weight:600}
.type-bar-count{color:var(--txtL)}
.type-bar-track{height:8px;background:var(--bg);border-radius:4px;overflow:hidden}
.type-bar-fill{height:100%;border-radius:4px;transition:width 0.6s ease}
.type-bar-fill.investor{background:var(--p)}
.type-bar-fill.founder{background:var(--ok)}
.type-bar-fill.researcher{background:var(--s)}
.type-bar-fill.corporate{background:#dc2626}
.type-bar-fill.advisor{background:var(--warn)}
.type-bar-fill.operator{background:#16a34a}
.type-bar-fill.other{background:var(--txtXL)}

/* Theme chips */
.theme-list{display:flex;flex-wrap:wrap;gap:8px}
.theme-chip{padding:5px 12px;background:var(--pL);color:var(--p);font-size:12px;font-weight:600;border-radius:20px;display:flex;align-items:center;gap:6px}
.theme-count{background:var(--p);color:#fff;border-radius:10px;padding:1px 6px;font-size:10px}

/* Chart container */
.chart-wrap{position:relative;height:220px}

/* Skeleton */
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.skel{border-radius:10px;background:linear-gradient(90deg,var(--bdr) 25%,var(--bg) 50%,var(--bdr) 75%);background-size:400% 100%;animation:shimmer 1.5s ease-in-out infinite}

/* Teaser / blur overlay */
.teaser-wrap{position:relative}
.teaser-blur{filter:blur(5px);pointer-events:none;user-select:none}
.teaser-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;z-index:10}
.teaser-card{background:rgba(255,255,255,0.95);backdrop-filter:blur(4px);border:1px solid var(--bdr);border-radius:16px;padding:32px 36px;text-align:center;max-width:380px;box-shadow:var(--shadowL)}
.teaser-card h3{font-size:18px;font-weight:700;margin-bottom:8px}
.teaser-card p{font-size:13px;color:var(--txtL);line-height:1.6;margin-bottom:20px}
.btn-claim{display:inline-flex;align-items:center;gap:6px;padding:11px 22px;background:var(--p);color:white;font-size:13px;font-weight:600;border-radius:9px;text-decoration:none;transition:all 0.2s}
.btn-claim:hover{background:var(--pD)}

/* Claimed badge */
.claimed-badge{display:inline-flex;align-items:center;gap:6px;padding:5px 12px;background:var(--okL);color:var(--ok);font-size:12px;font-weight:700;border-radius:20px}

/* Loading / error */
.loading{text-align:center;padding:80px 24px;color:var(--txtL)}
.loading i{width:24px;height:24px;display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}
.spin{animation:spin 0.9s linear infinite}
.empty{text-align:center;padding:60px 24px;color:var(--txtL)}
.empty h3{font-size:17px;font-weight:600;margin-bottom:8px;color:var(--txt)}

@media(max-width:768px){
  .stat-row{grid-template-columns:1fr 1fr}
  .grid2{grid-template-columns:1fr}
  .page{padding:72px 16px 40px}
}
@media(max-width:480px){
  .stat-row{grid-template-columns:1fr}
}
</style>
<link rel="icon" type="image/png" href="/images/em-logo.png">
</head>
<body>

<nav class="nav">
  <div class="nav-inner">
    <a href="/" class="nav-brand">
      <img src="/images/em-logo.png" alt="Event Medium" style="width:36px;height:36px;border-radius:8px;display:block;">
      <span class="nav-name">Event <span style="color:var(--p)">Medium</span></span>
    </a>
    <a href="#" id="backLink" class="nav-back"><i data-lucide="arrow-left" style="width:14px;height:14px"></i> Back to event</a>
  </div>
</nav>

<div class="page" id="page">
  <div class="loading">
    <i data-lucide="loader" class="spin"></i>
    <p style="margin-top:12px">Loading dashboard...</p>
  </div>
</div>

<script>
var token = localStorage.getItem('auth_token');
var eventId = new URLSearchParams(window.location.search).get('id');
var E = null;        // event object
var CS = null;       // claim status
var DS = null;       // demand signals
var typeChart = null;
var themeChart = null;

document.getElementById('backLink').href = '/event.html?id=' + eventId;

async function load() {
  if (!eventId) { window.location.href = '/events.html'; return; }
  lucide.createIcons();

  try {
    // Load event + claim status in parallel
    var headers = token ? { 'Authorization': 'Bearer ' + token } : {};
    var [evResp, csResp] = await Promise.all([
      fetch('/api/events/' + eventId),
      fetch('/api/events/' + eventId + '/claim-status', { headers: headers })
    ]);

    if (!evResp.ok) throw new Error('Event not found');
    var evData = await evResp.json();
    E = evData.event;
    document.title = E.name + ' — Dashboard — Event Medium';
    document.getElementById('backLink').href = '/event.html?id=' + E.id;

    if (csResp.ok) CS = await csResp.json();

    var isOwner = CS && CS.is_mine;

    // Try loading demand signals (only if owner, only if 100+ regs)
    if (isOwner && token) {
      try {
        var dsResp = await fetch('/api/events/' + eventId + '/demand-signals', { headers: { 'Authorization': 'Bearer ' + token } });
        if (dsResp.ok) {
          var dsData = await dsResp.json();
          DS = dsData.demand_signals;
        }
      } catch(e) {}
    }

    render(isOwner);
  } catch(err) {
    document.getElementById('page').innerHTML =
      '<div class="loading"><h3 style="color:var(--txt)">Event not found</h3><p style="margin-top:8px"><a href="/events.html" style="color:var(--p)">Browse events</a></p></div>';
  }
}

function parseArr(v) { if (!v) return []; if (Array.isArray(v)) return v; try { return JSON.parse(v); } catch(e) { return []; } }
function esc(s) { if (!s) return ''; var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function capitalize(s) { return s ? s.charAt(0).toUpperCase() + s.slice(1) : ''; }
function fmtDate(s) { if (!s) return 'TBD'; return new Date(s).toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' }); }

function render(isOwner) {
  var themes = parseArr(E.themes);
  var regCount = E.registration_count || 0;

  // Header HTML
  var headerHtml =
    '<div class="page-header">' +
      '<div style="display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:12px">' +
        '<div>' +
          '<div class="page-title">' + esc(E.name) + '</div>' +
          (isOwner ? '<span class="claimed-badge"><i data-lucide="shield-check" style="width:13px;height:13px"></i> Verified Organiser</span>' : '') +
          '<div class="event-meta-row">' +
            '<span><i data-lucide="calendar"></i>' + fmtDate(E.event_date) + '</span>' +
            (E.city ? '<span><i data-lucide="map-pin"></i>' + esc(E.city) + (E.country ? ', ' + esc(E.country) : '') + '</span>' : '') +
          '</div>' +
        '</div>' +
        (isOwner ? '<div style="display:flex;gap:8px;align-items:center">' +
          '<a href="/network.html?mode=event&id=' + E.id + '" class="nav-back" style="border:1px solid var(--bdr);border-radius:8px"><i data-lucide="share-2" style="width:14px;height:14px"></i> Network Map</a>' +
          '<a href="/event.html?id=' + E.id + '" class="nav-back" style="border:1px solid var(--bdr);border-radius:8px">View public page</a>' +
          '</div>' : '') +
      '</div>' +
    '</div>';

  if (isOwner) {
    renderFull(headerHtml, themes, regCount);
  } else {
    renderTeaser(headerHtml, themes, regCount);
  }
}

// ── FULL DASHBOARD (verified owner) ──────────────────────────────────────────
function renderFull(headerHtml, themes, regCount) {
  var total = DS ? DS.total_registrants : regCount;
  var types = DS ? DS.stakeholder_breakdown : [];
  var themeBreakdown = DS ? DS.theme_breakdown : [];

  var statsHtml =
    '<div class="stat-row">' +
      '<div class="stat-card"><div class="stat-val">' + total + '</div><div class="stat-label">Registrations</div></div>' +
      '<div class="stat-card"><div class="stat-val">' + types.length + '</div><div class="stat-label">Stakeholder Types</div><div class="stat-sub">represented</div></div>' +
      '<div class="stat-card"><div class="stat-val">' + themes.length + '</div><div class="stat-label">Event Themes</div></div>' +
      '<div class="stat-card"><div class="stat-val">' + (E.expected_attendees || '—') + '</div><div class="stat-label">Expected Attendees</div></div>' +
    '</div>';

  var html = headerHtml + statsHtml;

  // Attendee type breakdown
  if (types.length) {
    var typeTotal = types.reduce(function(s, t) { return s + parseInt(t.count); }, 0);
    html += '<div class="grid2">';
    html +=
      '<div class="card">' +
        '<div class="card-title">Attendee Breakdown <span class="card-sub">' + typeTotal + ' with profiles</span></div>' +
        types.map(function(t) {
          var pct = Math.round((parseInt(t.count) / typeTotal) * 100);
          var type = (t.stakeholder_type || 'other').toLowerCase();
          return '<div class="type-bar">' +
            '<div class="type-bar-header"><span class="type-bar-label">' + capitalize(type) + '</span><span class="type-bar-count">' + t.count + ' (' + pct + '%)</span></div>' +
            '<div class="type-bar-track"><div class="type-bar-fill ' + type + '" style="width:' + pct + '%"></div></div>' +
          '</div>';
        }).join('') +
      '</div>';

    // Doughnut chart
    html += '<div class="card"><div class="card-title">Type Distribution</div><div class="chart-wrap"><canvas id="typeChart"></canvas></div></div>';
    html += '</div>';
  } else {
    html +=
      '<div class="card">' +
        '<div class="card-title">Attendee Breakdown</div>' +
        '<div class="empty"><h3>Building up</h3><p>Attendee intelligence shows once registrants have profiles on Event Medium.</p></div>' +
      '</div>';
  }

  // Theme breakdown
  if (themeBreakdown.length) {
    html +=
      '<div class="card">' +
        '<div class="card-title">Top Attendee Themes</div>' +
        '<div class="theme-list">' +
          themeBreakdown.slice(0, 20).map(function(t) {
            return '<span class="theme-chip">' + esc(t.theme) + '<span class="theme-count">' + t.count + '</span></span>';
          }).join('') +
        '</div>' +
      '</div>';
  }

  // Event themes
  if (themes.length) {
    html +=
      '<div class="card">' +
        '<div class="card-title">Event Themes</div>' +
        '<div class="theme-list">' + themes.map(function(t) { return '<span class="theme-chip">' + esc(t) + '</span>'; }).join('') + '</div>' +
      '</div>';
  }

  // Insufficient data note
  if (total < 100) {
    html +=
      '<div class="card" style="border-color:var(--warn);background:var(--warnL)">' +
        '<div style="display:flex;align-items:center;gap:12px">' +
          '<i data-lucide="info" style="width:20px;height:20px;color:var(--warn);flex-shrink:0"></i>' +
          '<div>' +
            '<div style="font-size:13px;font-weight:600;color:#92400e">Full intelligence unlocks at 100+ registrations</div>' +
            '<div style="font-size:12px;color:#b45309;margin-top:2px">You have ' + total + ' so far. Share your event to drive registrations.</div>' +
          '</div>' +
        '</div>' +
      '</div>';
  }

  document.getElementById('page').innerHTML = html;
  lucide.createIcons();

  // Render doughnut chart
  if (types.length) {
    var COLORS = ['#0066ff','#059669','#6c63ff','#dc2626','#f59e0b','#16a34a','#9ca3af'];
    var ctx = document.getElementById('typeChart');
    if (ctx) {
      typeChart = new Chart(ctx, {
        type: 'doughnut',
        data: {
          labels: types.map(function(t) { return capitalize(t.stakeholder_type || 'Other'); }),
          datasets: [{ data: types.map(function(t) { return parseInt(t.count); }), backgroundColor: COLORS, borderWidth: 2, borderColor: '#fff' }]
        },
        options: {
          responsive: true, maintainAspectRatio: false, cutout: '65%',
          plugins: { legend: { position: 'right', labels: { font: { size: 12 }, padding: 12 } } }
        }
      });
    }
  }
}

// ── TEASER MODE (unclaimed or other owner) ────────────────────────────────────
function renderTeaser(headerHtml, themes, regCount) {
  var isMine = CS && CS.is_my_pending;
  var isFlagship = CS && CS.is_flagship;

  // Fake stats (blurred)
  var fakeStats =
    '<div class="stat-row teaser-blur">' +
      '<div class="stat-card"><div class="stat-val">' + (regCount || 142) + '</div><div class="stat-label">Registrations</div></div>' +
      '<div class="stat-card"><div class="stat-val">4</div><div class="stat-label">Stakeholder Types</div></div>' +
      '<div class="stat-card"><div class="stat-val">67%</div><div class="stat-label">Profile Completion</div></div>' +
      '<div class="stat-card"><div class="stat-val">38</div><div class="stat-label">Matches Generated</div></div>' +
    '</div>';

  var fakeThemes = themes.length ? themes : ['AI', 'Climate', 'Fintech', 'Health', 'Deep Tech'];
  var fakeTypeHtml = ['Founder','Investor','Operator','Researcher'].map(function(t, i) {
    var pct = [40, 30, 20, 10][i];
    return '<div class="type-bar">' +
      '<div class="type-bar-header"><span class="type-bar-label">' + t + '</span><span class="type-bar-count">' + pct + '%</span></div>' +
      '<div class="type-bar-track"><div class="type-bar-fill ' + t.toLowerCase() + '" style="width:' + pct + '%"></div></div>' +
    '</div>';
  }).join('');

  var claimUrl = '/event.html?id=' + eventId;
  var overlayContent;
  if (isMine) {
    overlayContent =
      '<div class="teaser-card">' +
        '<div style="font-size:36px;margin-bottom:12px">⏳</div>' +
        '<h3>Claim pending</h3>' +
        '<p>Your claim is awaiting ' + (isFlagship ? 'manual approval (within 24h).' : 'email verification. Check your inbox.') + '</p>' +
      '</div>';
  } else {
    overlayContent =
      '<div class="teaser-card">' +
        '<div style="font-size:36px;margin-bottom:12px">🔒</div>' +
        '<h3>Unlock full intelligence</h3>' +
        '<p>You\'re seeing aggregate data only. Claim this event to access complete attendee insights, gap analysis, and matching intelligence.</p>' +
        '<a href="' + claimUrl + '" class="btn-claim">Claim This Event →</a>' +
      '</div>';
  }

  var html = headerHtml +
    '<div class="teaser-wrap">' +
      fakeStats +
      '<div class="grid2">' +
        '<div class="card teaser-blur"><div class="card-title">Attendee Breakdown</div>' + fakeTypeHtml + '</div>' +
        '<div class="card teaser-blur">' +
          '<div class="card-title">Theme Distribution</div>' +
          '<div class="theme-list">' + fakeThemes.slice(0, 8).map(function(t) { return '<span class="theme-chip">' + esc(t) + '<span class="theme-count">??</span></span>'; }).join('') + '</div>' +
        '</div>' +
      '</div>' +
      '<div class="card teaser-blur">' +
        '<div class="card-title">Match Intelligence</div>' +
        '<div style="height:80px;background:linear-gradient(90deg,var(--pL),var(--okL));border-radius:8px;opacity:0.6"></div>' +
      '</div>' +
      '<div class="teaser-overlay">' + overlayContent + '</div>' +
    '</div>';

  document.getElementById('page').innerHTML = html;
  lucide.createIcons();
}

load();
</script>
</body>
</html>
