<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Community Intelligence — EventMedium</title>
<link rel="icon" type="image/png" href="/images/em-logo.png">
<script src="https://unpkg.com/lucide@latest"></script>
<style>
:root{
  --bg:#ffffff;--bg2:#f8f8fa;--bg3:#f0f0f4;
  --heading:#1a1a2e;--accent:#6366f1;--accent2:#4f46e5;--accent-light:rgba(99,102,241,0.08);
  --text:#1a1a2e;--text2:#555;--text3:#999;
  --border:rgba(0,0,0,0.06);--border2:rgba(0,0,0,0.1);
  --green:#059669;--greenL:rgba(5,150,105,0.08);
  --amber:#d97706;--amberL:rgba(217,119,6,0.08);
  --red:#dc2626;--redL:rgba(220,38,38,0.08);
  --blue:#2563eb;--blueL:rgba(37,99,235,0.08);
  --purple:#7c3aed;--orange:#ea580c;
  --sans:system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  --mono:ui-monospace,SFMono-Regular,Menlo,monospace;
  --max:1380px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--sans);background:var(--bg2);color:var(--text);min-height:100vh}

/* ── Header ── */
.header{background:linear-gradient(135deg,var(--bg) 0%,var(--bg2) 100%);border-bottom:1px solid var(--border);padding:28px 36px 24px}
.header-inner{max-width:var(--max);margin:0 auto}
.header-row{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:16px}
.logo{display:flex;align-items:center;gap:8px;font-size:14px;font-weight:700;color:var(--heading);text-decoration:none;margin-bottom:6px}
.logo .ld{width:20px;height:20px;border-radius:5px;background:linear-gradient(135deg,var(--accent),var(--accent2))}
.logo em{color:var(--accent);font-style:normal}
.title{font-size:22px;font-weight:700;letter-spacing:-0.03em;color:var(--heading)}
.subtitle{font-size:13px;color:var(--text3);margin-top:3px}
.pill{display:inline-block;padding:3px 12px;border-radius:20px;font-size:11px;font-weight:600}
.pill-green{background:var(--greenL);color:var(--green)}
.pill-amber{background:var(--amberL);color:var(--amber)}
.pill-red{background:var(--redL);color:var(--red)}
.pill-blue{background:var(--blueL);color:var(--blue)}
.pill-accent{background:var(--accent-light);color:var(--accent)}

/* ── Buttons ── */
.btn-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.btn{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--border2);border-radius:8px;padding:8px 16px;cursor:pointer;font-size:13px;font-weight:600;font-family:var(--sans);background:var(--bg);color:var(--text2);transition:all 0.2s;text-decoration:none}
.btn:hover{border-color:rgba(99,102,241,0.3);color:var(--accent)}
.btn-pri{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn-pri:hover{background:var(--accent2);border-color:var(--accent2);color:#fff}
.btn-back{border-color:rgba(99,102,241,0.3);background:linear-gradient(135deg,rgba(99,102,241,0.04),rgba(79,70,229,0.08));color:var(--accent)}
.btn-back:hover{background:linear-gradient(135deg,rgba(99,102,241,0.08),rgba(79,70,229,0.14));border-color:var(--accent);color:var(--accent)}
.btn-sm{padding:5px 12px;font-size:12px;font-weight:600;border:1px solid var(--border2);border-radius:6px;cursor:pointer;background:var(--bg);color:var(--text2);font-family:var(--sans);transition:all 0.15s}
.btn-sm:hover{border-color:rgba(99,102,241,0.3);color:var(--accent)}
.btn-danger{color:var(--red);border-color:rgba(220,38,38,0.2)}
.btn-danger:hover{background:var(--redL);border-color:var(--red);color:var(--red)}

/* ── Body ── */
.body{max-width:var(--max);margin:0 auto;padding:28px 36px}

/* ── Tabs ── */
.tabs{display:flex;border-bottom:2px solid var(--border2);margin-bottom:32px}
.tab{padding:10px 22px 12px;font-size:14px;font-weight:500;cursor:pointer;border:none;background:transparent;color:var(--text3);font-family:var(--sans);border-bottom:2px solid transparent;margin-bottom:-2px;transition:all 0.15s}
.tab.active{font-weight:700;color:var(--accent);border-bottom-color:var(--accent)}
.tab:hover{color:var(--heading)}
.tab-content{display:none}.tab-content.active{display:block}

/* ── Grid layouts ── */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-bottom:16px}
.gfull{margin-bottom:16px}

/* ── Stat row ── */
.stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.stat-card{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:16px 18px;transition:all 0.2s}
.stat-card:hover{border-color:rgba(99,102,241,0.2);box-shadow:0 2px 12px rgba(99,102,241,0.06)}
.stat-val{font-size:28px;font-weight:700;line-height:1;color:var(--heading);letter-spacing:-0.02em}
.stat-label{font-size:10px;font-weight:700;letter-spacing:0.8px;text-transform:uppercase;color:var(--text3);margin-top:6px}
.stat-sub{font-size:11px;color:var(--text3);margin-top:3px}

/* ── Cards ── */
.card{background:var(--bg);border:1px solid var(--border);border-radius:12px;padding:24px;transition:border-color 0.2s}
.card:hover{border-color:rgba(99,102,241,0.1)}
.card-t{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text3);margin-bottom:20px}

/* ── Tables ── */
.tbl-head{display:grid;padding:0 0 10px;border-bottom:2px solid var(--border2);margin-bottom:2px;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text3)}
.tbl-row{display:grid;padding:10px 0;border-bottom:1px solid var(--border);align-items:center;font-size:13px;transition:background 0.12s}
.tbl-row:last-child{border-bottom:none}
.tbl-row:hover{background:var(--bg2)}

/* ── Insight box ── */
.insight{padding:14px 16px;background:linear-gradient(135deg,var(--accent-light),rgba(79,70,229,0.06));border-radius:8px;border-left:3px solid var(--accent);margin-top:16px}
.insight-lbl{font-size:10px;font-weight:700;color:var(--accent);margin-bottom:4px;letter-spacing:0.5px;text-transform:uppercase}
.insight-txt{font-size:13px;color:var(--text2);line-height:1.6}

/* ── Bar ── */
.bar-track{position:relative;height:6px;background:var(--bg3);border-radius:3px;overflow:hidden}
.bar-fill{position:absolute;left:0;top:0;height:100%;border-radius:3px}

/* ── Skeleton ── */
.skel{border-radius:4px;background:linear-gradient(90deg,var(--bg3) 25%,var(--bg2) 50%,var(--bg3) 75%);background-size:400% 100%;animation:shimmer 1.5s ease-in-out infinite}
@keyframes shimmer{0%{background-position:100% 50%}100%{background-position:0 50%}}

/* ── Empty state ── */
.empty-vis{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:160px;border:2px dashed var(--border2);border-radius:10px;gap:6px;color:var(--text3);font-size:13px;text-align:center;padding:32px}
.empty-vis strong{display:block;font-size:14px;color:var(--text2);margin-bottom:4px}

/* ── Ring legend ── */
.ring-wrap{display:flex;flex-direction:column;align-items:center;gap:16px}
.ring-legend{display:flex;flex-wrap:wrap;gap:10px;justify-content:center}
.ring-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text2)}

/* ── Dot ── */
.dot{width:8px;height:8px;border-radius:50%;display:inline-block;vertical-align:middle}

/* ── Supply/demand gauge ── */
.gauge-row{padding:14px 0;border-bottom:1px solid var(--border)}
.gauge-row:last-child{border-bottom:none}
.gauge-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.gauge-name{font-size:12px;font-weight:700;color:var(--heading)}
.gauge-status{font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px}
.gauge-track{display:grid;grid-template-columns:1fr 1px 1fr;height:20px;gap:0;align-items:center}
.gauge-supply{display:flex;justify-content:flex-end;height:100%}
.gauge-demand{display:flex;justify-content:flex-start;height:100%}
.gauge-divider{background:var(--border2);height:100%}
.gauge-bar{height:14px;border-radius:3px}
.gauge-sub{font-size:11px;color:var(--text3);margin-top:6px}

/* ── Opps box ── */
.opps-box{border:1px solid var(--border2);border-radius:10px;padding:20px}
.opps-t{font-size:10px;font-weight:700;letter-spacing:0.8px;text-transform:uppercase;color:var(--text3);margin-bottom:14px}
.opp-item{display:flex;gap:10px;margin-bottom:12px;font-size:13px;color:var(--text2);line-height:1.5}
.opp-item:last-child{margin-bottom:0}
.opp-bullet{width:5px;height:5px;border-radius:50%;background:var(--accent);margin-top:7px;flex-shrink:0}

/* ── Avatar ── */
.av{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0}

/* ── Search/select ── */
.search-box{background:var(--bg);border:1px solid var(--border2);border-radius:8px;padding:8px 14px;font-size:13px;font-family:var(--sans);color:var(--text);outline:none;transition:border-color 0.2s;width:200px}
.search-box:focus{border-color:var(--accent)}
.sel{background:var(--bg);border:1px solid var(--border2);border-radius:8px;padding:8px 14px;font-size:13px;font-family:var(--sans);color:var(--text);outline:none;cursor:pointer}
.sel:focus{border-color:var(--accent)}

/* ── Pagination ── */
.pager{display:flex;gap:4px;margin-top:16px;justify-content:flex-end;align-items:center;flex-wrap:wrap}
.pg{min-width:32px;height:32px;border-radius:6px;border:1px solid var(--border2);background:var(--bg);cursor:pointer;font-size:13px;font-family:var(--sans);color:var(--text2);padding:0 8px;display:inline-flex;align-items:center;justify-content:center;transition:all 0.15s}
.pg:hover{border-color:rgba(99,102,241,0.3);color:var(--accent)}
.pg.on{background:var(--accent);color:#fff;border-color:var(--accent)}
.pg:disabled{opacity:0.3;cursor:default}

/* ── D3 tooltip ── */
.d3tip{position:fixed;background:var(--heading);color:#fff;font-size:12px;line-height:1.5;padding:8px 12px;border-radius:6px;pointer-events:none;z-index:9999;max-width:180px}

/* ── Event cards ── */
.evt-list{display:flex;flex-direction:column;gap:12px}
.evt-card{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:16px 20px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap}
.evt-card-main{flex:1;min-width:0}
.evt-card-name{font-size:14px;font-weight:700;color:var(--heading);margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.evt-card-meta{font-size:12px;color:var(--text3)}
.evt-card-stat{text-align:right;flex-shrink:0}
.evt-card-count{font-size:22px;font-weight:700;color:var(--heading);line-height:1}
.evt-card-count-lbl{font-size:10px;font-weight:600;letter-spacing:0.5px;text-transform:uppercase;color:var(--text3);margin-top:2px}
.evt-card-actions{display:flex;gap:8px;flex-shrink:0}

/* ── Modal ── */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:500;display:none;align-items:center;justify-content:center;padding:24px}
.modal-bg.open{display:flex}
.modal{background:#fff;border-radius:14px;padding:32px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;box-shadow:0 24px 64px rgba(0,0,0,0.18)}
.modal h3{font-size:17px;font-weight:700;color:var(--heading);margin-bottom:20px}
.form-row{margin-bottom:16px}
.form-row label{display:block;font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.6px;margin-bottom:5px}
.form-row input,.form-row textarea,.form-row select{width:100%;padding:9px 12px;border:1px solid var(--border2);border-radius:8px;font-size:14px;font-family:var(--sans);color:var(--text);background:#fff;outline:none;transition:border-color 0.15s}
.form-row input:focus,.form-row textarea:focus{border-color:var(--accent)}
.form-row textarea{resize:vertical;min-height:80px}
.form-2col{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.theme-grid{display:flex;flex-wrap:wrap;gap:6px;margin-top:4px}
.theme-chip{padding:4px 10px;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;border:1.5px solid var(--border2);background:var(--bg2);color:var(--text2);transition:all 0.15s;user-select:none}
.theme-chip.selected{background:var(--accent);color:#fff;border-color:var(--accent)}
.modal-actions{display:flex;justify-content:flex-end;gap:10px;margin-top:24px}
.modal-cancel{padding:9px 18px;border:1px solid var(--border2);border-radius:8px;font-size:13px;font-weight:600;background:var(--bg);color:var(--text2);cursor:pointer;font-family:var(--sans)}
.modal-submit{padding:9px 22px;border:none;border-radius:8px;font-size:13px;font-weight:600;background:var(--accent);color:#fff;cursor:pointer;font-family:var(--sans);transition:background 0.15s}
.modal-submit:hover{background:var(--accent2)}
.modal-submit:disabled{opacity:0.5;cursor:not-allowed}
.modal-submit-danger{padding:9px 22px;border:none;border-radius:8px;font-size:13px;font-weight:600;background:var(--red);color:#fff;cursor:pointer;font-family:var(--sans);transition:background 0.15s}
.modal-submit-danger:hover{background:#b91c1c}
.modal-submit-danger:disabled{opacity:0.5;cursor:not-allowed}
.type-toggle-sm{display:flex;gap:8px;margin-top:4px}
.type-btn-sm{flex:1;padding:10px 12px;border:2px solid var(--border2);border-radius:8px;cursor:pointer;font-family:var(--sans);font-size:12px;font-weight:600;background:var(--bg);color:var(--text2);transition:all 0.15s;text-align:center}
.type-btn-sm.active{border-color:var(--accent);background:var(--accent-light);color:var(--accent)}

/* ── Misc ── */
.r{text-align:right}
.mono{font-family:var(--mono);font-size:12px}
.footer{border-top:1px solid var(--border);padding-top:18px;margin-top:40px;display:flex;justify-content:space-between;font-size:12px;color:var(--text3)}

/* ── Filter bar ── */
.filter-bar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:24px;padding:14px 18px;background:var(--bg);border:1px solid var(--border);border-radius:10px}
.filter-bar .sel{padding:6px 12px;font-size:12px}
.filter-bar label{font-size:10px;font-weight:700;letter-spacing:0.6px;text-transform:uppercase;color:var(--text3);margin-right:2px}

/* ── Section heading ── */
.section-t{font-size:15px;font-weight:700;letter-spacing:-0.02em;color:var(--heading);margin-bottom:14px;display:flex;align-items:center;gap:8px}

/* ── Cluster cards ── */
.cluster-card{background:var(--bg);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:14px;transition:border-color 0.2s}
.cluster-card:hover{border-color:rgba(99,102,241,0.15)}
.cluster-card.programming-trigger{border-left:3px solid var(--accent)}
.cluster-label{font-size:15px;font-weight:700;color:var(--heading);margin-bottom:6px}
.cluster-summary{font-size:13px;color:var(--text2);line-height:1.6;margin-bottom:10px}
.cluster-badges{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
.cluster-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:14px;font-size:11px;font-weight:600;background:var(--bg3);color:var(--text2)}
.cluster-framing{font-size:12px;color:var(--text3);font-style:italic;margin-bottom:12px}
.cluster-actions{display:flex;gap:8px}

/* ── Trigger cards ── */
.trigger-card{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:10px;transition:border-color 0.2s}
.trigger-card:hover{border-color:rgba(99,102,241,0.12)}
.trigger-type{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700;letter-spacing:0.5px;text-transform:uppercase;margin-bottom:6px}
.trigger-title{font-size:14px;font-weight:700;color:var(--heading);margin-bottom:4px}
.trigger-timing{font-size:12px;color:var(--text3);margin-bottom:8px}
.trigger-actions{display:flex;gap:8px;align-items:center}

/* ── Connection opp cards ── */
.conn-card{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:10px;transition:border-color 0.2s}
.conn-card:hover{border-color:rgba(99,102,241,0.12)}
.conn-rationale{font-size:13px;color:var(--text2);line-height:1.6;margin-bottom:10px}

/* ── Moment cards ── */
.moment-card{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:18px;margin-bottom:12px;transition:border-color 0.2s}
.moment-card:hover{border-color:rgba(99,102,241,0.12)}
.moment-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;flex-wrap:wrap;gap:8px}
.moment-cost{font-size:12px;font-weight:700;letter-spacing:0.3px}
.moment-cost.high{color:var(--red)}
.moment-cost.medium{color:var(--amber)}
.moment-cost.low{color:var(--green)}
.moment-age{font-size:11px;color:var(--text3)}
.moment-body{font-size:13px;color:var(--text2);line-height:1.6;margin-bottom:10px}
.moment-meta{display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin-bottom:12px}
.moment-source{font-size:11px;color:var(--text3);font-style:italic}
.moment-actions{display:flex;gap:8px}

/* ── Feed count badge ── */
.badge-count{display:inline-flex;align-items:center;justify-content:center;min-width:18px;height:18px;border-radius:9px;background:var(--accent);color:#fff;font-size:10px;font-weight:700;padding:0 5px;margin-left:4px}

/* ── Aggregate stat line ── */
.aggregate-stat{padding:10px 14px;background:var(--accent-light);border-radius:8px;font-size:12px;color:var(--accent);font-weight:600;margin-top:14px}

@media(max-width:1024px){.g3{grid-template-columns:1fr 1fr}}
@media(max-width:900px){
  .g2{grid-template-columns:1fr}
  .g3{grid-template-columns:1fr}
  .stat-row{grid-template-columns:repeat(2,1fr)}
  .header{padding:20px 16px 16px}
  .body{padding:20px 16px}
  .filter-bar{padding:10px 12px}
}
@media(max-width:500px){.stat-row{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>

<!-- ══ HEADER ══ -->
<div class="header">
  <div class="header-inner">
    <div class="header-row">
      <div>
        <a href="/communities.html" class="btn btn-back" style="margin-bottom:10px">&larr; Communities</a>
        <h1 class="title" id="commTitle"><span class="skel" style="display:inline-block;width:260px;height:24px;border-radius:4px;vertical-align:middle"></span></h1>
        <div class="subtitle" id="commSub">&nbsp;</div>
      </div>
      <div class="btn-row">
        <button class="btn" id="nevBtn" onclick="openNev()" style="display:none">Nev &#10022;</button>
        <a class="btn" id="signalsBtn" href="#" style="display:none">Signals &#9889;<span class="badge-count" id="feedCountBadge" style="display:none">0</span></a>
      </div>
    </div>
  </div>
</div>

<!-- ══ BODY ══ -->
<div class="body">

  <!-- ── Filter bar ── -->
  <div class="filter-bar" id="filterBar">
    <label>Region</label>
    <select class="sel" id="filterRegion">
      <option value="">All regions</option>
      <option value="APAC">APAC</option>
      <option value="EMEA">EMEA</option>
      <option value="Americas">Americas</option>
      <option value="ANZ">ANZ</option>
      <option value="UK">UK</option>
      <option value="EU">EU</option>
      <option value="NA">North America</option>
    </select>
    <label>Theme</label>
    <select class="sel" id="filterTheme">
      <option value="">All themes</option>
    </select>
    <label>Action</label>
    <select class="sel" id="filterAction">
      <option value="">All actions</option>
      <option value="hiring">Hiring</option>
      <option value="raising">Raising</option>
      <option value="selling">Selling</option>
      <option value="buying">Buying</option>
      <option value="partnering">Partnering</option>
      <option value="advising">Advising</option>
      <option value="investing">Investing</option>
      <option value="speaking">Speaking</option>
    </select>
    <label>Period</label>
    <select class="sel" id="filterPeriod">
      <option value="7d">7 days</option>
      <option value="30d" selected>30 days</option>
      <option value="90d">90 days</option>
    </select>
  </div>

  <!-- ── Section 1: Network Pulse + Your Community ── -->
  <div class="g2" id="pulseGrid">
    <div class="card" id="pulseCard">
      <div class="card-t">Network Pulse</div>
      <div id="pulseContent">
        <div class="skel" style="height:120px;border-radius:8px"></div>
      </div>
    </div>
    <div class="card" id="communityCard">

<script>
// ── Bootstrap ──────────────────────────────────────────────────────────────────
var token = localStorage.getItem('auth_token');
if (!token) { window.location.href = '/auth.html'; }

var params = new URLSearchParams(window.location.search);
var COMMUNITY_ID = params.get('id') || params.get('community') || params.get('slug');
if (!COMMUNITY_ID) { window.location.href = '/communities.html'; }
document.getElementById('footerCommunityId').textContent = COMMUNITY_ID;

var communityType = null;
var communityName = '';

// ── Theme taxonomy (canonical list) ──────────────────────────────────────────
var CANONICAL_THEMES = [
  'AI','Fintech','Cybersecurity','Enterprise SaaS','Web3','Quantum','Robotics','IoT','Hardware',
  'Climate','Health','Education','Media & Entertainment','Real Estate','Food & Agriculture',
  'Supply Chain','Space','Defence',
  'Growth & GTM','Impact & Social','Venture & Capital','Data & Analytics',
  'Privacy & Regulation','Infrastructure & Cloud','Marketplace & Commerce','Travel & Mobility'
];

// Populate theme dropdown
(function(){
  var sel = document.getElementById('filterTheme');
  CANONICAL_THEMES.forEach(function(t){
    var o = document.createElement('option');
    o.value = t; o.textContent = t;
    sel.appendChild(o);
  });
})();

// ── Helpers ────────────────────────────────────────────────────────────────────
function esc(s){ if(!s) return ''; var d=document.createElement('div'); d.textContent=s; return d.innerHTML; }
function relDate(s){ if(!s) return ''; var d=Math.floor((Date.now()-new Date(s))/86400000); if(d<1) return 'today'; if(d===1) return 'yesterday'; if(d<7) return d+'d ago'; if(d<30) return Math.floor(d/7)+'w ago'; return Math.floor(d/30)+'mo ago'; }
function hdr(){ return { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' }; }

function costDots(cost){
  if(!cost) return '';
  var c = cost.toLowerCase();
  if(c === 'high') return '<span class="moment-cost high">\u25CF\u25CF\u25CF HIGH</span>';
  if(c === 'medium') return '<span class="moment-cost medium">\u25CF\u25CF MEDIUM</span>';
  return '<span class="moment-cost low">\u25CF LOW</span>';
}

function confidencePill(conf){
  if(!conf) return '';
  var c = (conf+'').toLowerCase();
  if(c === 'high' || conf >= 0.8) return '<span class="pill pill-green">High confidence</span>';
  if(c === 'medium' || conf >= 0.5) return '<span class="pill pill-amber">Medium confidence</span>';
  return '<span class="pill pill-red">Low confidence</span>';
}

function triggerTypeBadge(type){
  var t = (type||'').toLowerCase();
  var colors = {
    'conference': { bg: 'var(--blueL)', color: 'var(--blue)' },
    'meetup': { bg: 'var(--greenL)', color: 'var(--green)' },
    'workshop': { bg: 'var(--amberL)', color: 'var(--amber)' },
    'webinar': { bg: 'rgba(124,58,237,0.08)', color: 'var(--purple)' },
    'dinner': { bg: 'rgba(234,88,12,0.08)', color: 'var(--orange)' }
  };
  var s = colors[t] || { bg: 'var(--bg3)', color: 'var(--text2)' };
  return '<span class="trigger-type" style="background:'+s.bg+';color:'+s.color+'">'+esc(type||'event')+'</span>';
}

// ── Filter state persistence ─────────────────────────────────────────────────
var FILTER_KEY = 'em_dash_filters_' + COMMUNITY_ID;

function saveFilters(){
  var state = {
    region: document.getElementById('filterRegion').value,
    theme: document.getElementById('filterTheme').value,
    action: document.getElementById('filterAction').value,
    period: document.getElementById('filterPeriod').value
  };
  try { localStorage.setItem(FILTER_KEY, JSON.stringify(state)); } catch(e){}
}

function restoreFilters(){
  try {
    var s = JSON.parse(localStorage.getItem(FILTER_KEY));
    if(!s) return;
    if(s.region) document.getElementById('filterRegion').value = s.region;
    if(s.theme) document.getElementById('filterTheme').value = s.theme;
    if(s.action) document.getElementById('filterAction').value = s.action;
    if(s.period) document.getElementById('filterPeriod').value = s.period;
  } catch(e){}
}

function getFilterParams(){
  var r = document.getElementById('filterRegion').value;
  var t = document.getElementById('filterTheme').value;
  var a = document.getElementById('filterAction').value;
  var p = document.getElementById('filterPeriod').value;
  var q = [];
  if(r) q.push('region='+encodeURIComponent(r));
  if(t) q.push('theme='+encodeURIComponent(t));
  if(a) q.push('action='+encodeURIComponent(a));
  if(p) q.push('period='+encodeURIComponent(p));
  return q.length ? '?'+q.join('&') : '';
}

restoreFilters();

// Bind filter changes
['filterRegion','filterTheme','filterAction','filterPeriod'].forEach(function(id){
  document.getElementById(id).addEventListener('change', function(){
    saveFilters();
    loadAll();
  });
});

// ── Data loading ─────────────────────────────────────────────────────────────
async function apiFetch(url){
  var r = await fetch(url, { headers: hdr() });
  if(r.status === 401){ window.location.href = '/auth.html'; return null; }
  if(!r.ok) throw new Error('HTTP '+r.status);
  return r.json();
}

async function loadPulse(){
  try {
    var data = await apiFetch('/api/community/'+COMMUNITY_ID+'/pulse'+getFilterParams());
    renderPulse(data);
  } catch(e){
    console.error('Pulse load error:', e);
    document.getElementById('pulseContent').innerHTML = '<div class="empty-vis"><i data-lucide="activity" style="width:28px;height:28px;opacity:0.4"></i><strong>Could not load pulse data</strong>Check your connection and try again</div>';
    if(typeof lucide!=='undefined') lucide.createIcons();
  }
}

async function loadFeeds(){
  try {
    var data = await apiFetch('/api/integrations/'+COMMUNITY_ID+'/feeds');
    var feeds = Array.isArray(data) ? data : (data.feeds || []);
    var count = feeds.length;
    var badge = document.getElementById('feedCountBadge');
    if(count > 0){
      badge.textContent = count;
      badge.style.display = 'inline-flex';
    } else {
      badge.style.display = 'none';
    }
    renderCommunityCard(count, feeds);
  } catch(e){
    console.error('Feeds load error:', e);
    renderCommunityCard(0, []);
  }
}

async function loadTriggers(){
  try {
    var data = await apiFetch('/api/community/'+COMMUNITY_ID+'/event-triggers');
    renderTriggers(data);
  } catch(e){
    console.error('Triggers load error:', e);
    document.getElementById('triggersList').innerHTML = '<div class="empty-vis"><i data-lucide="calendar" style="width:28px;height:28px;opacity:0.4"></i><strong>No event triggers found</strong>Triggers will appear as signals are processed</div>';
    document.getElementById('connectionsList').innerHTML = '<div class="empty-vis"><i data-lucide="link" style="width:28px;height:28px;opacity:0.4"></i><strong>No connection opportunities yet</strong>Opportunities emerge from signal analysis</div>';
    if(typeof lucide!=='undefined') lucide.createIcons();
  }
}

async function loadTriggerStats(){
  try {
    var data = await apiFetch('/api/community/'+COMMUNITY_ID+'/match-trigger-stats');
    if(data && data.accepted != null && data.total != null){
      document.getElementById('triggerAggregate').innerHTML = '<div class="aggregate-stat">'+data.accepted+' of '+data.total+' triggers this month led to accepted connections</div>';
    }
  } catch(e){
    console.error('Trigger stats load error:', e);
  }
}

async function loadMoments(){
  if(communityType !== 'alumni_network') return;
  document.getElementById('momentsSection').style.display = 'block';
  var period = document.getElementById('momentsPeriod').value;
  try {
    var data = await apiFetch('/api/community/'+COMMUNITY_ID+'/member-moments?period='+period);
    renderMoments(data);
  } catch(e){
    console.error('Moments load error:', e);
    document.getElementById('momentsList').innerHTML = '<div class="empty-vis"><i data-lucide="users" style="width:28px;height:28px;opacity:0.4"></i><strong>No member moments found</strong>Moments will appear as member signals are processed</div>';
    if(typeof lucide!=='undefined') lucide.createIcons();
  }
}

document.getElementById('momentsPeriod').addEventListener('change', function(){ loadMoments(); });

async function loadAll(){
  loadPulse();
  loadFeeds();
  loadTriggers();
  loadTriggerStats();
  loadMoments();
}

// ── Initial load — fetch community info then everything ──────────────────────
async function init(){
  try {
    // Try pulse first to get community info
    var data = await apiFetch('/api/community/'+COMMUNITY_ID+'/pulse'+getFilterParams());
    if(data && data.community){
      communityName = data.community.name || '';
      communityType = data.community.community_type || data.community.type || null;
      document.title = communityName + ' \u00b7 Intelligence';
      document.getElementById('commTitle').textContent = communityName ? communityName + ' intelligence' : 'Community intelligence';
      document.getElementById('commSub').textContent = communityType ? communityType.replace(/_/g,' ') : '';
    } else {
      document.getElementById('commTitle').textContent = 'Community intelligence';
    }
    renderPulse(data);

    // Show header buttons
    document.getElementById('nevBtn').style.display = 'inline-flex';
    var sigBtn = document.getElementById('signalsBtn');
    sigBtn.href = '/signal-marketplace.html?community='+COMMUNITY_ID;
    sigBtn.style.display = 'inline-flex';

    // Show moments section for alumni networks
    if(communityType === 'alumni_network'){
      document.getElementById('momentsSection').style.display = 'block';
    }

    // Load remaining sections
    loadFeeds();
    loadTriggers();
    loadTriggerStats();
    loadMoments();
  } catch(e){
    console.error('Init error:', e);
    document.getElementById('commTitle').textContent = 'Community intelligence';
    document.getElementById('pulseContent').innerHTML = '<div class="empty-vis"><i data-lucide="activity" style="width:28px;height:28px;opacity:0.4"></i><strong>Could not load dashboard</strong>Check your connection and try again</div>';
    if(typeof lucide!=='undefined') lucide.createIcons();
    // Still try other endpoints
    document.getElementById('nevBtn').style.display = 'inline-flex';
    var sigBtn = document.getElementById('signalsBtn');
    sigBtn.href = '/signal-marketplace.html?community='+COMMUNITY_ID;
    sigBtn.style.display = 'inline-flex';
    loadFeeds();
    loadTriggers();
    loadTriggerStats();
  }
}

// ── Render: Pulse ────────────────────────────────────────────────────────────
function renderPulse(data){
  var el = document.getElementById('pulseContent');
  if(!data || !data.pulse){
    el.innerHTML = '<div class="empty-vis"><i data-lucide="activity" style="width:28px;height:28px;opacity:0.4"></i><strong>No pulse data available</strong>Pulse data appears once signals are flowing</div>';
    if(typeof lucide!=='undefined') lucide.createIcons();
    return;
  }
  var p = data.pulse;
  var heat = p.heat_score != null ? p.heat_score : (p.score || 0);
  var maxHeat = p.max_heat || 100;
  var pctVal = Math.min(100, Math.round((heat/maxHeat)*100));
  var delta = p.delta || p.change || '';
  var deltaSign = '';
  if(typeof delta === 'number'){ deltaSign = delta > 0 ? '+' : ''; delta = deltaSign + delta; }
  var domAction = p.dominant_action || p.top_action || '';

  var barColor = pctVal >= 70 ? 'var(--green)' : pctVal >= 40 ? 'var(--amber)' : 'var(--red)';

  var html = '';
  html += '<div style="display:flex;align-items:baseline;gap:12px;margin-bottom:14px">';
  html += '<span class="stat-val" style="font-size:36px">'+esc(''+Math.round(heat))+'</span>';
  html += '<span style="font-size:13px;color:var(--text3)">heat score</span>';
  if(delta) html += '<span class="pill '+(String(delta).indexOf('-')===0?'pill-red':'pill-green')+'">'+esc(''+delta)+'</span>';
  html += '</div>';
  html += '<div class="bar-track" style="height:8px;margin-bottom:14px"><div class="bar-fill" style="width:'+pctVal+'%;background:'+barColor+'"></div></div>';
  if(domAction){
    html += '<div style="font-size:12px;color:var(--text3)">Dominant action: <strong style="color:var(--heading)">'+esc(domAction)+'</strong></div>';
  }

  // Show cluster count and signal count if available
  if(data.clusters){
    html += '<div style="margin-top:12px;font-size:12px;color:var(--text3)">'+data.clusters.length+' signal clusters active</div>';
    // Render clusters
    renderClusters(data.clusters);
  }

  el.innerHTML = html;
}

// ── Render: Community card ──────────────────────────────────────────────────
function renderCommunityCard(feedCount, feeds){
  var el = document.getElementById('communityContent');
  var activeCanisters = 0;
  // Count from pulse data if available
  if(feeds && feeds.length){
    activeCanisters = feeds.filter(function(f){ return f.active || f.status === 'active'; }).length;
  }

  var html = '';
  html += '<div style="display:flex;gap:24px;margin-bottom:16px;flex-wrap:wrap">';
  html += '<div><div class="stat-val">'+activeCanisters+'</div><div class="stat-label">Active canisters</div></div>';
  html += '<div><div class="stat-val">'+feedCount+'</div><div class="stat-label">Connected feeds</div></div>';
  html += '</div>';
  html += '<a href="/signal-marketplace.html?community='+COMMUNITY_ID+'" class="btn btn-sm" style="margin-top:4px">Manage feeds &#9889;</a>';

  el.innerHTML = html;
}

// ── Render: Clusters ────────────────────────────────────────────────────────
function renderClusters(clusters){
  var el = document.getElementById('clustersList');
  if(!clusters || !clusters.length){
    el.innerHTML = '<div class="empty-vis"><i data-lucide="layers" style="width:28px;height:28px;opacity:0.4"></i><strong>No signal clusters detected</strong>Clusters will form as more signals flow in</div>';
    if(typeof lucide!=='undefined') lucide.createIcons();
    return;
  }

  var html = '';
  clusters.forEach(function(c){
    var isProg = c.programming_trigger || c.is_programming_trigger;
    var strength = c.strength || c.score || 0;
    var maxStrength = c.max_strength || 100;
    var strengthPct = Math.min(100, Math.round((strength/maxStrength)*100));
    var barColor = strengthPct >= 70 ? 'var(--green)' : strengthPct >= 40 ? 'var(--amber)' : 'var(--accent)';

    html += '<div class="cluster-card'+(isProg?' programming-trigger':'')+'">';
    html += '<div class="cluster-label">'+esc(c.label || c.name || 'Unnamed cluster')+'</div>';

    // Strength bar
    html += '<div class="bar-track" style="height:5px;margin-bottom:10px;max-width:200px"><div class="bar-fill" style="width:'+strengthPct+'%;background:'+barColor+'"></div></div>';

    // Theme chip
    if(c.theme){
      html += '<span class="theme-chip selected" style="margin-bottom:8px;cursor:default">'+esc(c.theme)+'</span> ';
    }

    // Summary
    if(c.summary || c.editorial_summary){
      html += '<div class="cluster-summary">'+esc(c.summary || c.editorial_summary)+'</div>';
    }

    // Action breakdown badges
    var actions = c.action_breakdown || c.actions || {};
    var actionKeys = Object.keys(actions);
    if(actionKeys.length){
      html += '<div class="cluster-badges">';
      actionKeys.forEach(function(k){
        html += '<span class="cluster-badge">'+esc(k)+' &times;'+actions[k]+'</span>';
      });
      html += '</div>';
    }

    // Supply/demand framing
    if(c.supply_demand_framing || c.framing){
      html += '<div class="cluster-framing">'+esc(c.supply_demand_framing || c.framing)+'</div>';
    }

    // Action buttons
    html += '<div class="cluster-actions">';
    html += '<button class="btn btn-sm" onclick="curateEvent(\''+esc(c.id || '')+'\')">Curate event</button>';
    html += '<button class="btn btn-sm" onclick="draftBrief(\''+esc(c.id || '')+'\')">Draft content brief</button>';
    html += '</div>';

    html += '</div>';
  });

  el.innerHTML = html;
  if(typeof lucide!=='undefined') lucide.createIcons();
}

// ── Render: Event Triggers + Connection Opportunities ───────────────────────
function renderTriggers(data){
  var triggers = data ? (data.triggers || data.event_triggers || []) : [];
  var connections = data ? (data.connections || data.connection_opportunities || []) : [];

  // Event triggers
  var tEl = document.getElementById('triggersList');
  if(!triggers.length){
    tEl.innerHTML = '<div class="empty-vis"><i data-lucide="calendar" style="width:28px;height:28px;opacity:0.4"></i><strong>No event triggers found</strong>Triggers will appear as signals are processed</div>';
  } else {
    var tHtml = '';
    triggers.forEach(function(t){
      tHtml += '<div class="trigger-card">';
      tHtml += triggerTypeBadge(t.type || t.trigger_type);
      tHtml += '<div class="trigger-title">'+esc(t.title || t.name)+'</div>';
      if(t.timing || t.date){
        tHtml += '<div class="trigger-timing">'+esc(t.timing || t.date)+'</div>';
      }
      tHtml += '<div class="trigger-actions">';
      tHtml += confidencePill(t.confidence);
      tHtml += ' <button class="btn btn-sm btn-pri" onclick="planEvent(\''+esc(t.id || '')+'\')">Plan event</button>';
      tHtml += '</div>';
      tHtml += '</div>';
    });
    tEl.innerHTML = tHtml;
  }

  // Connection opportunities
  var cEl = document.getElementById('connectionsList');
  if(!connections.length){
    cEl.innerHTML = '<div class="empty-vis"><i data-lucide="link" style="width:28px;height:28px;opacity:0.4"></i><strong>No connection opportunities yet</strong>Opportunities emerge from signal analysis</div>';
  } else {
    var cHtml = '';
    connections.forEach(function(c){
      cHtml += '<div class="conn-card">';
      if(c.signal_rationale || c.rationale){
        cHtml += '<div class="conn-rationale">'+esc(c.signal_rationale || c.rationale)+'</div>';
      }
      cHtml += '<button class="btn btn-sm" onclick="surfaceToMembers(\''+esc(c.id || '')+'\')">Surface to members &rarr;</button>';
      cHtml += '</div>';
    });
    cEl.innerHTML = cHtml;
  }

  if(typeof lucide!=='undefined') lucide.createIcons();
}

// ── Render: Member Moments ──────────────────────────────────────────────────
function renderMoments(data){
  var moments = Array.isArray(data) ? data : (data ? (data.moments || []) : []);
  var el = document.getElementById('momentsList');

  if(!moments.length){
    el.innerHTML = '<div class="empty-vis"><i data-lucide="users" style="width:28px;height:28px;opacity:0.4"></i><strong>No member moments found</strong>Moments will appear as member signals are processed</div>';
    if(typeof lucide!=='undefined') lucide.createIcons();
    return;
  }

  // Sort by cost desc then recency
  var costOrder = { high: 3, medium: 2, low: 1 };
  moments.sort(function(a,b){
    var ca = costOrder[(a.cost||'low').toLowerCase()] || 0;
    var cb = costOrder[(b.cost||'low').toLowerCase()] || 0;
    if(cb !== ca) return cb - ca;
    return new Date(b.created_at || b.date || 0) - new Date(a.created_at || a.date || 0);
  });

  var html = '';
  moments.forEach(function(m){
    html += '<div class="moment-card">';

    // Header: cost + age
    html += '<div class="moment-header">';
    html += costDots(m.cost);
    html += '<span class="moment-age">'+relDate(m.created_at || m.date)+'</span>';
    html += '</div>';

    // Meta: theme chip + jurisdiction badge
    html += '<div class="moment-meta">';
    if(m.theme){
      html += '<span class="theme-chip selected" style="cursor:default">'+esc(m.theme)+'</span>';
    }
    if(m.jurisdiction){
      html += '<span class="pill pill-blue">'+esc(m.jurisdiction)+'</span>';
    }
    html += '</div>';

    // Editorial body (never raw text, no individual names)
    if(m.editorial_copy || m.summary || m.body){
      html += '<div class="moment-body">'+esc(m.editorial_copy || m.summary || m.body)+'</div>';
    }

    // Source
    if(m.source || m.source_label){
      html += '<div class="moment-source">Source: '+esc(m.source || m.source_label)+'</div>';
    }

    // Actions
    html += '<div class="moment-actions">';
    html += '<button class="btn btn-sm" onclick="openNoteModal(\''+esc(m.id || '')+'\')">Note</button>';
    html += '<button class="btn btn-sm btn-pri" onclick="surfaceToMembers(\''+esc(m.id || '')+'\')">Surface to members</button>';
    html += '</div>';

    html += '</div>';
  });

  el.innerHTML = html;
  if(typeof lucide!=='undefined') lucide.createIcons();
}

// ── Actions ─────────────────────────────────────────────────────────────────
function openNev(){
  // Navigate to Nev chat or open Nev modal
  window.location.href = '/nev.html?community='+COMMUNITY_ID;
}

function curateEvent(clusterId){
  window.location.href = '/create-event.html?community='+COMMUNITY_ID+(clusterId ? '&cluster='+clusterId : '');
}

function draftBrief(clusterId){
  window.location.href = '/content-brief.html?community='+COMMUNITY_ID+(clusterId ? '&cluster='+clusterId : '');
}

function planEvent(triggerId){
  window.location.href = '/create-event.html?community='+COMMUNITY_ID+(triggerId ? '&trigger='+triggerId : '');
}

async function surfaceToMembers(itemId){
  if(!itemId) return;
  try {
    var r = await fetch('/api/community/'+COMMUNITY_ID+'/suggest-match', {
      method: 'POST',
      headers: hdr(),
      body: JSON.stringify({ item_id: itemId })
    });
    if(!r.ok) throw new Error('HTTP '+r.status);
    // Find the button that was clicked and update it
    event.target.textContent = 'Surfaced!';
    event.target.disabled = true;
    setTimeout(function(){ event.target.textContent = 'Surface to members'; event.target.disabled = false; }, 2000);
  } catch(e){
    console.error('Surface to members error:', e);
    alert('Failed to surface to members. Please try again.');
  }
}

function openNoteModal(momentId){
  document.getElementById('noteMomentId').value = momentId;
  document.getElementById('noteText').value = '';
  document.getElementById('noteModal').classList.add('open');
}

function closeNoteModal(){
  document.getElementById('noteModal').classList.remove('open');
}

async function submitNote(){
  var momentId = document.getElementById('noteMomentId').value;
  var text = document.getElementById('noteText').value.trim();
  if(!text) return;

  try {
    await fetch('/api/community/'+COMMUNITY_ID+'/member-moments/'+momentId+'/notes', {
      method: 'POST',
      headers: hdr(),
      body: JSON.stringify({ note: text })
    });
    closeNoteModal();
  } catch(e){
    console.error('Note submit error:', e);
    alert('Failed to save note. Please try again.');
  }
}

// ── Kick off ────────────────────────────────────────────────────────────────
init();
</script>
